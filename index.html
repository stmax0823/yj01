<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手2.0</title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手2.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #F0ECDD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-w: 480px; margin: 0 auto; background-color: #F0ECDD; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#F0ECDD', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#23354D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        const INITIAL_DESTINATIONS = {
            '韓國': { '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門'], '釜山': ['西面', '南浦洞', '海雲台'] },
            '日本': { '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿'], '大阪': ['梅田', '難波', '心齋橋'] },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        };
        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'TAMBURINS', 'Mardi Mercredi'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康是美', '家樂福', '新光三越']
        };
        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期 > 6個月) & 簽證', checked: false },
            { id: 2, text: '外幣現金 & 信用卡 (確認海外回饋與開通)', checked: false },
            { id: 3, text: '當地網卡 / eSIM / 電信漫遊設定', checked: false },
            { id: 4, text: '萬用轉接頭 & 行動電源、充電線', checked: false },
            { id: 5, text: '隨身常備藥 (感冒、腸胃、暈車、止痛)', checked: false },
            { id: 6, text: '個人盥洗用品 / 保養品 / 防曬', checked: false },
            { id: 7, text: '機票與住宿憑證 (建議存一份截圖)', checked: false },
            { id: 8, text: '摺疊環保袋 (購物備用)', checked: false },
            { id: 9, text: '輕便雨具 / 摺疊傘', checked: false },
            { id: 10, text: '旅遊平安險 / 不便險憑證', checked: false }
        ];

        // 修正後的匯率換算邏輯 (更彈性支援乘除算)
        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            // 判斷匯率基準：若是像日圓、韓元(1台幣換多外幣)則除以rate；美金歐元則乘以換算率(或除以小於1的rate)
            // 這裡遵循原設定：韓元42(除以42), 美金0.031(除以0.031) -> 100美金 / 0.031 = 3225台幣
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        const CreatableSelect = ({ label, options, value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            const handleSave = () => { if (newValue.trim()) { onAddOption(newValue.trim()); onChange(newValue.trim()); } setIsAdding(false); setNewValue(''); };

            if (isAdding) {
                return (
                    <div className="flex flex-col gap-1 mb-3">
                        <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label} (自訂新增)</label>
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 rounded-lg border text-sm" value={newValue} onChange={(e) => setNewValue(e.target.value)} autoFocus />
                            <button onClick={handleSave} className="p-2 rounded-lg text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-check"></i></button>
                            <button onClick={() => setIsAdding(false)} className="p-2 rounded-lg bg-gray-300 text-gray-700"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-1 mb-3">
                    <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label}</label>
                    <select className="p-2 rounded-lg border bg-white text-sm" style={{ color: COLORS.darkText }} value={value} onChange={(e) => { if (e.target.value === '__ADD_NEW__') setIsAdding(true); else onChange(e.target.value); }}>
                        <option value="" disabled>{placeholder}</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeight: 'bold' }}>+ 手動輸入新選項</option>
                    </select>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('list'); 
            const [toastMessage, setToastMessage] = useState('');
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 💾 狀態初始化 (嚴格鎖定 LocalStorage，並加上版號避免與舊資料衝突)
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6')) || INITIAL_ITEM_TYPES);

            // 自動存檔機制
            useEffect(() => {
                localStorage.setItem('app_destinations_v6', JSON.stringify(destinations));
                localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip));
                localStorage.setItem('app_currency_v6', JSON.stringify(currency));
                localStorage.setItem('app_exchange_rate_v6', String(exchangeRate));
                localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary));
                localStorage.setItem('app_stores_v6', JSON.stringify(stores));
                localStorage.setItem('app_must_eats_v6', JSON.stringify(mustEats));
                localStorage.setItem('app_must_buys_v6', JSON.stringify(mustBuys));
                localStorage.setItem('app_shopping_list_v6', JSON.stringify(shoppingList));
                localStorage.setItem('app_split_members_v6', JSON.stringify(splitMembers));
                localStorage.setItem('app_split_expenses_v6', JSON.stringify(splitExpenses));
                localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList));
                localStorage.setItem('app_food_types_v6', JSON.stringify(foodTypes));
                localStorage.setItem('app_item_types_v6', JSON.stringify(itemTypes));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            // 行程 Modal
            const [addToItinModal, setAddToItinModal] = useState({ isOpen: false, item: null });
            const [modalDayChoice, setModalDayChoice] = useState('Day 1');
            const [modalCustomDay, setModalCustomDay] = useState('');
            const [modalTime, setModalTime] = useState('12:00');

            const uniqueDays = useMemo(() => {
                const days = Array.from(new Set(itinerary.map(i => i.day)));
                return days.length > 0 ? days.sort() : ['Day 1'];
            }, [itinerary]);

            const confirmAddToItinerary = () => {
                const finalDay = modalDayChoice === '__CUSTOM__' ? modalCustomDay : modalDayChoice;
                if (!finalDay) return;
                setItinerary([...itinerary, {
                    id: Date.now(), day: finalDay, time: modalTime,
                    title: addToItinModal.item?.name || addToItinModal.item?.notes || '未命名行程',
                    address: addToItinModal.item?.address || '', mapUrl: addToItinModal.item?.url || '', transport: ''
                }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setAddToItinModal({ isOpen: false, item: null }); setModalCustomDay('');
                showToast("成功安排至行程中！");
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手2.0_備份檔_${currentTrip.country}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份檔已下載！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        showToast("🎉 資料匯入成功！");
                    } catch (err) { showToast("備份檔資料損毀！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            // ==========================================
            // 各頁面渲染元件
            // ==========================================

            // --- 介面渲染: 目的地 ---
            const RenderDestination = () => (
                <div className="p-4 pb-24 space-y-6">
                    <div className="bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                        <i className="fa-solid fa-plane-departure absolute -right-6 -bottom-6 opacity-20 text-[100px]"></i>
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程</h2>
                        <div className="mt-4">
                            <span className="text-sm opacity-90">目的地國家</span>
                            <div className="text-4xl font-black mb-1">{currentTrip.country || '尚未設定'}</div>
                            <span className="text-sm opacity-90">主要城市</span>
                            <div className="text-2xl font-bold">{currentTrip.city || '尚未設定'}</div>
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-location-dot text-[18px]" style={{color: COLORS.mediumBlue}}></i> 設定目的地
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">設定後將作為您清單的預設地點。資料已啟動自動儲存！</p>
                        <CreatableSelect label="旅遊國家" options={Object.keys(destinations)} value={currentTrip.country} onChange={(v) => { setCurrentTrip({country: v, city: ''}); const c = CURRENCIES.find(x => ['KRW','JPY','USD','THB','TWD','CNY'].includes(x.code) && (v==='韓國'&&x.code==='KRW' || v==='日本'&&x.code==='JPY' || v==='美國'&&x.code==='USD' || v==='泰國'&&x.code==='THB' || v==='台灣'&&x.code==='TWD' || v==='中國'&&x.code==='CNY')); if(c) handleCurrencyChange(c.code); }} onAddOption={(newOpt) => { setDestinations({...destinations, [newOpt]: {}}); setStores({...stores, [newOpt]: []}); }} placeholder="選擇國家..." />
                        <div className={`${!currentTrip.country ? 'opacity-50 pointer-events-none' : ''}`}>
                            <CreatableSelect label="地區 / 城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} placeholder={currentTrip.country ? "選擇城市..." : "請先選擇國家"} />
                        </div>
                    </div>

                    {/* 匯率與資料管理工具 */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                        <h3 className="font-bold flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-coins text-[18px]" style={{color: COLORS.mediumBlue}}></i> 匯率工具與備份
                        </h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-xs font-bold block mb-1">目前幣別</label>
                                <select className="w-full p-2 border rounded-lg bg-white text-sm" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.name})</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold block mb-1">換算匯率基準</label>
                                <input type="number" step="0.0001" className="w-full p-2 border rounded-lg text-sm" value={exchangeRate} onChange={(e) => setExchangeRate(Number(e.target.value))} />
                            </div>
                        </div>
                        <hr />
                        <div className="grid grid-cols-2 gap-2 pt-1">
                            <button onClick={handleExportData} className="py-2 px-3 bg-gray-100 text-gray-700 font-bold rounded-lg text-xs flex items-center justify-center gap-1"><i className="fa-solid fa-download"></i> 下載備份檔</button>
                            <label className="py-2 px-3 bg-gray-100 text-gray-700 font-bold rounded-lg text-xs flex items-center justify-center gap-1 cursor-pointer text-center">
                                <i className="fa-solid fa-upload"></i> 匯入備份檔
                                <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                            </label>
                        </div>
                    </div>
                </div>
            );

            // --- 介面渲染: 行程 ---
            const RenderItinerary = () => {
                const [showAddForm, setShowAddForm] = useState(false);
                const [newItem, setNewItem] = useState({ day: uniqueDays[0] || 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '' });
                const [editingId, setEditingId] = useState(null);
                const [editItem, setEditItem] = useState(null);

                const handleAdd = () => {
                    if (!newItem.title) return;
                    setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setNewItem({ day: newItem.day, time: '10:00', title: '', address: '', transport: '', mapUrl: '' });
                    setShowAddForm(false); showToast("新增行程成功！");
                };

                const handleSaveEdit = () => {
                    if (!editItem.title) return;
                    setItinerary(itinerary.map(i => i.id === editingId ? editItem : i).sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setEditingId(null); setEditItem(null); showToast("修改完成！");
                };

                return (
                    <div className="p-4 pb-24">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>我的行程規劃</h2>
                            <button onClick={() => { setShowAddForm(!showAddForm); setEditingId(null); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                                {showAddForm ? '取消新增' : <><i className="fa-solid fa-plus text-[14px]"></i> 新增行程</>}
                            </button>
                        </div>
                        {showAddForm && (
                            <div className="p-4 mb-6 rounded-lg shadow-sm bg-white border" style={{ border: `1px solid ${COLORS.lightBlue}` }}>
                                <h3 className="font-bold mb-3 text-sm">新增行程節點</h3>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <input type="text" placeholder="天數 (例: Day 1)" className="p-2 border rounded-lg text-sm" value={newItem.day} onChange={e => setNewItem({...newItem, day: e.target.value})} />
                                    <input type="time" className="p-2 border rounded-lg text-sm" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                                </div>
                                <input type="text" placeholder="行程標題 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                <input type="text" placeholder="詳細地址 (選填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.address} onChange={e => setNewItem({...newItem, address: e.target.value})} />
                                <input type="text" placeholder="自訂地圖網址" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.mapUrl} onChange={e => setNewItem({...newItem, mapUrl: e.target.value})} />
                                <input type="text" placeholder="交通方式" className="w-full p-2 border rounded-lg text-sm mb-3" value={newItem.transport} onChange={e => setNewItem({...newItem, transport: e.target.value})} />
                                <button onClick={handleAdd} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>儲存行程</button>
                            </div>
                        )}
                        <div className="space-y-4">
                            {itinerary.map((item) => (
                                <div key={item.id} className="p-4 rounded-xl shadow-sm bg-white border-l-4" style={{ borderColor: COLORS.mediumBlue }}>
                                    {editingId === item.id ? (
                                        <div className="flex flex-col gap-2">
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="text" className="p-2 border rounded-lg text-sm" value={editItem.day} onChange={e => setEditItem({...editItem, day: e.target.value})} />
                                                <input type="time" className="p-2 border rounded-lg text-sm" value={editItem.time} onChange={e => setEditItem({...editItem, time: e.target.value})} />
                                            </div>
                                            <input type="text" placeholder="標題" className="w-full p-2 border rounded-lg text-sm" value={editItem.title} onChange={e => setEditItem({...editItem, title: e.target.value})} />
                                            <input type="text" placeholder="地址" className="w-full p-2 border rounded-lg text-sm" value={editItem.address} onChange={e => setEditItem({...editItem, address: e.target.value})} />
                                            <input type="text" placeholder="交通" className="w-full p-2 border rounded-lg text-sm" value={editItem.transport} onChange={e => setEditItem({...editItem, transport: e.target.value})} />
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={handleSaveEdit} className="flex-1 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>儲存</button>
                                                <button onClick={() => setEditingId(null)} className="flex-1 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-xs">取消</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-xs font-bold px-2 py-1 rounded-full mr-2" style={{ backgroundColor: COLORS.bg, color: COLORS.darkText }}>{item.day}</span>
                                                    <span className="font-bold text-sm" style={{ color: COLORS.darkText }}>{item.time} {item.title}</span>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button onClick={() => { setEditingId(item.id); setEditItem(item); setShowAddForm(false); }} className="text-gray-400"><i className="fa-solid fa-pen text-[14px]"></i></button>
                                                    <button onClick={() => setItinerary(itinerary.filter(i => i.id !== item.id))} className="text-gray-400"><i className="fa-solid fa-trash text-[14px]"></i></button>
                                                </div>
                                            </div>
                                            {(item.address || item.mapUrl) && (
                                                <div className="mt-3 flex items-start gap-2 text-xs text-gray-600">
                                                    <i className="fa-solid fa-location-dot mt-0.5" style={{ color: COLORS.lightBlue }}></i>
                                                    <div className="flex-1">
                                                        {item.address && <p className={item.mapUrl ? "mb-2" : ""}>{item.address}</p>}
                                                        <div className="flex flex-wrap gap-2 mt-1">
                                                            {item.mapUrl && <a href={item.mapUrl} target="_blank" rel="noreferrer" className="text-[10px] flex items-center gap-1 font-bold px-2.5 py-1 rounded-md shadow-sm text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-link"></i> 開啟地圖</a>}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            {item.transport && (
                                                <div className="mt-2 flex items-start gap-2 text-xs text-gray-600">
                                                    <i className="fa-solid fa-location-arrow mt-0.5" style={{ color: COLORS.lightBlue }}></i>
                                                    <p>{item.transport}</p>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>
                            ))}
                            {itinerary.length === 0 && <p className="text-center text-gray-500 mt-10 text-xs">尚無行程，從上方新增吧！</p>}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 必去必買 (修正並補齊遺失代碼) ---
            const RenderMustGo = () => {
                const [showForm, setShowForm] = useState(false);
                const [eatForm, setEatForm] = useState({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: '', image: '' });
                const [buyForm, setBuyForm] = useState({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: '', image: '' });

                const handleImageUpload = (e, formType) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    compressImage(file, (base64Img) => {
                        if (formType === 'eat') setEatForm({ ...eatForm, image: base64Img });
                        else setBuyForm({ ...buyForm, image: base64Img });
                    });
                };

                const handleAddEat = () => {
                    if (!eatForm.name) return;
                    setMustEats([...mustEats, { ...eatForm, currency: eatForm.currency || currency.code, id: Date.now() }]);
                    setEatForm({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: '', image: '' });
                    setShowForm(false); showToast("新增美食成功！");
                };

                const handleAddBuy = () => {
                    if (!buyForm.notes) return;
                    setMustBuys([...mustBuys, { ...buyForm, currency: buyForm.currency || currency.code, id: Date.now() }]);
                    setBuyForm({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: '', image: '' });
                    setShowForm(false); showToast("新增商品成功！");
                };

                return (
                    <div className="p-4 pb-24">
                        <div className="flex rounded-lg overflow-hidden mb-4 border" style={{ borderColor: COLORS.mediumBlue }}>
                            <button className={`flex-1 py-2 font-bold text-xs ${mustGoType === 'eat' ? 'text-white' : ''}`} style={{ backgroundColor: mustGoType === 'eat' ? COLORS.mediumBlue : 'transparent', color: mustGoType === 'eat' ? '#fff' : COLORS.darkText }} onClick={() => { setMustGoType('eat'); setShowForm(false); }}>🍽️ 必吃美食</button>
                            <button className={`flex-1 py-2 font-bold text-xs ${mustGoType === 'buy' ? 'text-white' : ''}`} style={{ backgroundColor: mustGoType === 'buy' ? COLORS.mediumBlue : 'transparent', color: mustGoType === 'buy' ? '#fff' : COLORS.darkText }} onClick={() => { setMustGoType('buy'); setShowForm(false); }}>🛍️ 必買清單</button>
                        </div>
                        <button onClick={() => setShowForm(!showForm)} className="w-full flex justify-center items-center gap-2 py-3 rounded-lg font-bold mb-6 shadow-sm text-xs" style={{ backgroundColor: COLORS.lightBlue, color: COLORS.darkText }}>
                            {showForm ? '取消新增' : <><i className="fa-solid fa-plus text-[16px]"></i> 新增 {mustGoType === 'eat' ? '必吃' : '必買'}</>}
                        </button>
                        
                        {showForm && mustGoType === 'eat' && (
                            <div className="bg-white p-4 rounded-xl shadow mb-6 border space-y-3" style={{ borderColor: COLORS.mediumBlue }}>
                                <label className="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-dashed bg-slate-50 cursor-pointer" style={{ borderColor: COLORS.lightBlue }}>
                                    {eatForm.image ? (
                                        <div className="relative w-full">
                                            <img src={eatForm.image} alt="preview" className="w-full h-32 object-cover rounded-lg" />
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center text-gray-500 text-xs">
                                            <i className="fa-solid fa-camera text-xl mb-1"></i> 上傳美食照片
                                        </div>
                                    )}
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'eat')} className="hidden" />
                                </label>
                                <input type="text" placeholder="美食店名 (必填)" className="w-full p-2 border rounded-lg text-sm" value={eatForm.name} onChange={e => setEatForm({...eatForm, name: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="城市" className="p-2 border rounded-lg text-sm" value={eatForm.city} onChange={e => setEatForm({...eatForm, city: e.target.value})} />
                                    <input type="text" placeholder="區域" className="p-2 border rounded-lg text-sm" value={eatForm.district} onChange={e => setEatForm({...eatForm, district: e.target.value})} />
                                </div>
                                <CreatableSelect label="種類" options={foodTypes} value={eatForm.type} onChange={v => setEatForm({...eatForm, type: v})} onAddOption={v => setFoodTypes([...foodTypes, v])} placeholder="選擇種類..." />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="預估消費" className="p-2 border rounded-lg text-sm" value={eatForm.cost} onChange={e => setEatForm({...eatForm, cost: e.target.value})} />
                                    <select className="p-2 border rounded-lg text-sm bg-white" value={eatForm.currency || currency.code} onChange={e => setEatForm({...eatForm, currency: e.target.value})}>
                                        {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                    </select>
                                </div>
                                <input type="text" placeholder="地圖網址 / 連結" className="w-full p-2 border rounded-lg text-sm" value={eatForm.url} onChange={e => setEatForm({...eatForm, url: e.target.value})} />
                                <button onClick={handleAddEat} className="w-full py-2 bg-emerald-600 text-white rounded-lg font-bold text-sm">確認新增</button>
                            </div>
                        )}

                        {showForm && mustGoType === 'buy' && (
                            <div className="bg-white p-4 rounded-xl shadow mb-6 border space-y-3" style={{ borderColor: COLORS.mediumBlue }}>
                                <label className="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-dashed bg-slate-50 cursor-pointer" style={{ borderColor: COLORS.lightBlue }}>
                                    {buyForm.image ? (
                                        <div className="relative w-full">
                                            <img src={buyForm.image} alt="preview" className="w-full h-32 object-cover rounded-lg" />
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center text-gray-500 text-xs">
                                            <i className="fa-solid fa-camera text-xl mb-1"></i> 上傳商品照片
                                        </div>
                                    )}
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'buy')} className="hidden" />
                                </label>
                                <input type="text" placeholder="商品名稱 / 備註 (必填)" className="w-full p-2 border rounded-lg text-sm" value={buyForm.notes} onChange={e => setBuyForm({...buyForm, notes: e.target.value})} />
                                <CreatableSelect label="購買商店" options={stores[currentTrip.country] || []} value={buyForm.store} onChange={v => setBuyForm({...buyForm, store: v})} onAddOption={v => setStores({...stores, [currentTrip.country]: [...(stores[currentTrip.country]||[]), v]})} placeholder="選擇商店..." />
                                <CreatableSelect label="品項種類" options={itemTypes} value={buyForm.type} onChange={v => setBuyForm({...buyForm, type: v})} onAddOption={v => setItemTypes([...itemTypes, v])} placeholder="選擇種類..." />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="預估金額" className="p-2 border rounded-lg text-sm" value={buyForm.cost} onChange={e => setBuyForm({...buyForm, cost: e.target.value})} />
                                    <select className="p-2 border rounded-lg text-sm bg-white" value={buyForm.currency || currency.code} onChange={e => setBuyForm({...buyForm, currency: e.target.value})}>
                                        {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                    </select>
                                </div>
                                <button onClick={handleAddBuy} className="w-full py-2 bg-emerald-600 text-white rounded-lg font-bold text-sm">確認新增</button>
                            </div>
                        )}

                        {/* 清單卡片渲染 */}
                        <div className="space-y-4">
                            {mustGoType === 'eat' ? (
                                mustEats.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl shadow-sm overflow-hidden flex border">
                                        {item.image && <img src={item.image} className="w-24 h-24 object-cover flex-shrink-0" />}
                                        <div className="p-3 flex-1 flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start">
                                                    <h4 className="font-bold text-sm text-slate-800">{item.name}</h4>
                                                    <button onClick={() => setMustEats(mustEats.filter(x => x.id !== item.id))} className="text-gray-400 text-xs hover:text-red-500"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-0.5">{item.city} {item.district} · <span className="bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">{item.type}</span></p>
                                            </div>
                                            <div className="flex justify-between items-center mt-2">
                                                <span className="text-xs font-bold text-amber-600">{item.cost ? `${item.currency} ${item.cost}` : '未填價格'}</span>
                                                <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="text-[10px] bg-slate-800 text-white px-2 py-1 rounded font-bold"><i className="fa-solid fa-calendar-plus"></i> 排入行程</button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                mustBuys.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl shadow-sm overflow-hidden flex border">
                                        {item.image && <img src={item.image} className="w-24 h-24 object-cover flex-shrink-0" />}
                                        <div className="p-3 flex-1 flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start">
                                                    <h4 className="font-bold text-sm text-slate-800">{item.notes}</h4>
                                                    <button onClick={() => setMustBuys(mustBuys.filter(x => x.id !== item.id))} className="text-gray-400 text-xs hover:text-red-500"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-0.5">{item.store} · <span className="bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">{item.type}</span></p>
                                            </div>
                                            <div className="flex justify-between items-center mt-2">
                                                <span className="text-xs font-bold text-indigo-600">{item.cost ? `${item.currency} ${item.cost}` : '未填價格'}</span>
                                                <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="text-[10px] bg-slate-800 text-white px-2 py-1 rounded font-bold"><i className="fa-solid fa-calendar-plus"></i> 排入行程</button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                            {((mustGoType==='eat' && mustEats.length===0) || (mustGoType==='buy' && mustBuys.length===0)) && <p className="text-center text-xs text-gray-400 mt-10">目前清單空空如也，趕快新增吧！</p>}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 記帳與拆帳 ---
            const RenderSplit = () => {
                const [expForm, setExpForm] = useState({ purpose: '', amount: '', payer: splitMembers[0] || '自己', type: '均分', details: {} });
                const [newMember, setNewMember] = useState('');

                const handleAddExpense = () => {
                    if (!expForm.purpose || !expForm.amount) return;
                    setSplitExpenses([...splitExpenses, { ...expForm, id: Date.now(), amount: Number(expForm.amount) }]);
                    setExpForm({ purpose: '', amount: '', payer: splitMembers[0] || '自己', type: '均分', details: {} });
                    showToast("記帳成功！");
                };

                // 計算每個人應收應付的總和結果
                const balances = useMemo(() => {
                    const bal = {};
                    splitMembers.forEach(m => bal[m] = 0);
                    splitExpenses.forEach(exp => {
                        const share = exp.amount / splitMembers.length;
                        splitMembers.forEach(m => {
                            if (m === exp.payer) bal[m] += (exp.amount - share);
                            else bal[m] -= share;
                        });
                    });
                    return bal;
                }, [splitExpenses, splitMembers]);

                return (
                    <div className="p-4 pb-24 space-y-6">
                        <div className="bg-white p-4 rounded-xl shadow-sm border space-y-3">
                            <h3 className="font-bold text-sm flex items-center gap-1"><i className="fa-solid fa-users text-indigo-500"></i> 成員管理</h3>
                            <div className="flex flex-wrap gap-2">
                                {splitMembers.map(m => (
                                    <span key={m} className="bg-indigo-50 text-indigo-800 px-2.5 py-1 rounded-full text-xs font-medium flex items-center gap-1">
                                        {m} <button onClick={() => setSplitMembers(splitMembers.filter(x => x!==m))} className="hover:text-red-500">×</button>
                                    </span>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input type="text" placeholder="新增旅伴姓名" className="flex-1 p-2 border rounded-lg text-xs" value={newMember} onChange={e=>setNewMember(e.target.value)} />
                                <button onClick={()=>{ if(newMember.trim()){setSplitMembers([...splitMembers, newMember.trim()]); setNewMember('');}}} className="px-3 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg">新增</button>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border space-y-3">
                            <h3 className="font-bold text-sm">新增一筆消費</h3>
                            <input type="text" placeholder="消費項目 (例: 慶州烤肉)" className="w-full p-2 border rounded-lg text-xs" value={expForm.purpose} onChange={e=>setExpForm({...expForm, purpose: e.target.value})} />
                            <div className="grid grid-cols-2 gap-2">
                                <input type="number" placeholder="金額" className="p-2 border rounded-lg text-xs" value={expForm.amount} onChange={e=>setExpForm({...expForm, amount: e.target.value})} />
                                <select className="p-2 border rounded-lg text-xs bg-white" value={expForm.payer} onChange={e=>setExpForm({...expForm, payer: e.target.value})}>
                                    {splitMembers.map(m => <option key={m} value={m}>{m} 付款</option>)}
                                </select>
                            </div>
                            <button onClick={handleAddExpense} className="w-full py-2 bg-slate-800 text-white font-bold rounded-lg text-xs">加入記帳</button>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border space-y-3">
                            <h3 className="font-bold text-sm flex items-center gap-1"><i className="fa-solid fa-calculator text-emerald-500"></i> 分帳計算結果</h3>
                            <div className="space-y-2">
                                {Object.entries(balances).map(([name, bal]) => (
                                    <div key={name} className="flex justify-between items-center text-xs py-1 border-b">
                                        <span className="font-medium text-slate-700">{name}</span>
                                        <span className={`font-bold ${bal >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                            {bal >= 0 ? `應收 NT$ ${Math.ceil(bal)}` : `應付 NT$ ${Math.abs(Math.floor(bal))}`}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 行李清單 ---
            const RenderPrepList = () => {
                const [newTodo, setNewTodo] = useState('');
                const handleAddTodo = () => {
                    if (!newTodo.trim()) return;
                    setPrepList([...prepList, { id: Date.now(), text: newTodo.trim(), checked: false }]);
                    setNewTodo('');
                };
                const toggleCheck = (id) => {
                    setPrepList(prepList.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
                };

                return (
                    <div className="p-4 pb-24 space-y-4">
                        <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>行李檢查與行前清單</h2>
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="自訂新增準備物品..." className="flex-1 p-2 border rounded-lg text-sm bg-white" value={newTodo} onChange={e=>setNewTodo(e.target.value)} />
                            <button onClick={handleAddTodo} className="px-4 bg-slate-800 text-white rounded-lg font-bold text-sm"><i className="fa-solid fa-plus"></i></button>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm p-4 border divide-y divide-gray-100">
                            {prepList.map(item => (
                                <div key={item.id} className="flex items-center justify-between py-3 cursor-pointer" onClick={() => toggleCheck(item.id)}>
                                    <div className="flex items-center gap-3">
                                        <i className={`fa-regular ${item.checked ? 'fa-circle-check text-emerald-600' : 'fa-circle text-gray-300'} text-[18px]`}></i>
                                        <span className={`text-sm ${item.checked ? 'line-through text-gray-400' : 'text-slate-700'}`}>{item.text}</span>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setPrepList(prepList.filter(x => x.id !== item.id)); }} className="text-gray-300 hover:text-rose-500 text-xs"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    {/* 頂部輕量化狀態列 */}
                    <header className="p-4 bg-white/80 backdrop-blur sticky top-0 z-40 flex justify-between items-center border-b border-gray-100">
                        <h1 className="font-black text-slate-800 tracking-wide flex items-center gap-1.5 text-base">✈️ 旅遊小幫手 2.0</h1>
                        <span className="text-xs bg-slate-100 px-2.5 py-1 rounded-full font-bold text-slate-600 shadow-sm">
                            {currentTrip.country || '未設定'} · {currency.code}
                        </span>
                    </header>

                    {/* 內文主區塊 */}
                    <main className="content-area no-scrollbar">
                        {activeTab === 'destination' && <RenderDestination />}
                        {activeTab === 'itinerary' && <RenderItinerary />}
                        {activeTab === 'list' && <RenderMustGo />}
                        {activeTab === 'split' && <RenderSplit />}
                        {activeTab === 'prep' && <RenderPrepList />}
                    </main>

                    {/* 快顯提示 (Toast Notification) */}
                    {toastMessage && (
                        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white font-medium text-xs px-4 py-2.5 rounded-full shadow-lg z-50 flex items-center gap-1.5 animate-bounce">
                            <i className="fa-solid fa-circle-check text-emerald-400"></i> {toastMessage}
                        </div>
                    )}

                    {/* 排入行程彈出視窗 (Modal Popup) */}
                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-4 animate-in fade-in zoom-in-95 duration-150">
                                <h3 className="font-bold text-base text-slate-800 flex items-center gap-1.5"><i className="fa-solid fa-calendar-days text-indigo-500"></i> 將項目編排至行程</h3>
                                <hr />
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs font-bold block mb-1">選擇加入天數</label>
                                        <select className="w-full p-2 border rounded-lg bg-white text-sm" value={modalDayChoice} onChange={e => setModalDayChoice(e.target.value)}>
                                            {uniqueDays.map(d => <option key={d} value={d}>{d}</option>)}
                                            <option value="__CUSTOM__">+ 手動建立新天數</option>
                                        </select>
                                    </div>
                                    {modalDayChoice === '__CUSTOM__' && (
                                        <input type="text" placeholder="手動輸入天數名稱 (例: Day 4)" className="w-full p-2 border rounded-lg text-sm" value={modalCustomDay} onChange={e => setModalCustomDay(e.target.value)} />
                                    )}
                                    <div>
                                        <label className="text-xs font-bold block mb-1">設定時間點</label>
                                        <input type="time" className="w-full p-2 border rounded-lg text-sm" value={modalTime} onChange={e => setModalTime(e.target.value)} />
                                    </div>
                                </div>
                                <div className="flex gap-2 pt-2">
                                    <button onClick={confirmAddToItinerary} className="flex-1 py-2 bg-slate-800 text-white rounded-lg font-bold text-sm">確認編排</button>
                                    <button onClick={() => setAddToItinModal({ isOpen: false, item: null })} className="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg font-bold text-sm">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 底部導覽功能列 */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white border-t border-gray-100 grid grid-cols-5 p-2 z-40 pb-safe">
                        <button onClick={() => setActiveTab('destination')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition-colors ${activeTab === 'destination' ? 'text-slate-800 bg-slate-50 font-bold' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-earth-asia text-[18px] mb-0.5"></i><span className="text-[10px]">目的地</span>
                        </button>
                        <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition-colors ${activeTab === 'itinerary' ? 'text-slate-800 bg-slate-50 font-bold' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-route text-[18px] mb-0.5"></i><span className="text-[10px]">行程</span>
                        </button>
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition-colors ${activeTab === 'list' ? 'text-slate-800 bg-slate-50 font-bold' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-heart text-[18px] mb-0.5"></i><span className="text-[10px]">清單</span>
                        </button>
                        <button onClick={() => setActiveTab('split')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition-colors ${activeTab === 'split' ? 'text-slate-800 bg-slate-50 font-bold' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-wallet text-[18px] mb-0.5"></i><span className="text-[10px]">分帳</span>
                        </button>
                        <button onClick={() => setActiveTab('prep')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition-colors ${activeTab === 'prep' ? 'text-slate-800 bg-slate-50 font-bold' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-clipboard-list text-[18px] mb-0.5"></i><span className="text-[10px]">行前</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
