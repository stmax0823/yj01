<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI 智能旅遊規劃小幫手</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // ✅ 核心修正 1：絕對不要用 import 語法。在 CDN 環境下，直接從全域變數 React 抓取 Hook
        const { useState, useEffect } = React;

        // 模擬天氣數據
        const mockWeatherData = {
            "台北": { temp: "26°C", condition: "多雲時晴", advice: "適合戶外活動，帶把傘備用。" },
            "東京": { temp: "15°C", condition: "陣雨", advice: "氣溫偏低且有雨，出門記得攜帶雨具並注意保暖。" },
            "京都": { temp: "16°C", condition: "陰天", advice: "體感稍涼，建議穿著薄外套。" },
            "大阪": { temp: "18°C", condition: "晴天", advice: "天氣晴朗舒適，非常適合環球影城行程！" },
            "首爾": { temp: "12°C", condition: "晴時多雲", advice: "早晚溫差大，建議採用洋蔥式穿法。" }
        };

        // 模擬景點推薦數據
        const mockAttractions = {
            "台北": ["台北 101", "故宮博物院", "士林夜市", "陽明山國家公園"],
            "東京": ["淺草寺", "東京鐵塔", "澀谷十字路口", "東京迪士尼樂園"],
            "京都": ["清水寺", "伏見稻荷大社", "金閣寺", "嵐山竹林"],
            "大阪": ["大阪城", "道頓堀", "日本環球影城", "心齋橋"],
            "首爾": ["景福宮", "明洞商圈", "N首爾塔", "北村韓屋村"]
        };

        function App() {
            const [city, setCity] = useState("東京");
            const [weather, setWeather] = useState(mockWeatherData["東京"]);
            const [attractions, setAttractions] = useState(mockAttractions["東京"]);
            const [itinerary, setItinerary] = useState([]);
            const [newLocation, setNewLocation] = useState("");

            // 當切換城市時，自動更新天氣與景點
            useEffect(() => {
                if (mockWeatherData[city]) {
                    setWeather(mockWeatherData[city]);
                    setAttractions(mockAttractions[city]);
                }
            }, [city]);

            // 處理手動新增行程景點
            const handleAddItinerary = (e) => {
                e.preventDefault();
                if (!newLocation.trim()) return;
                setItinerary([...itinerary, { id: Date.now(), text: newLocation.trim() }]);
                setNewLocation("");
            };

            // 刪除行程中的景點
            const handleDeleteItinerary = (id) => {
                setItinerary(itinerary.filter(item => item.id !== id));
            };

            return (
                <div class="max-w-4xl mx-auto p-4 md:p-8">
                    {/* 頁首標題 */}
                    <header class="text-center mb-8">
                        <h1 class="text-3xl font-bold text-indigo-600 flex justify-center items-center gap-2">
                            🧭 AI 智能旅遊規劃小幫手
                        </h1>
                        <p class="text-slate-500 mt-2">一鍵掌握即時天氣、推薦景點，輕鬆打造你的專屬行程</p>
                    </header>

                    {/* 城市選擇器 */}
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-100 flex items-center gap-4">
                        <label class="font-medium text-slate-700 whitespace-nowrap">想去哪裡玩？</label>
                        <select 
                            value={city} 
                            onChange={(e) => setCity(e.target.value)}
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition"
                        >
                            <option value="東京">🇯🇵 東京 (Tokyo)</option>
                            <option value="京都">🇯🇵 京都 (Kyoto)</option>
                            <option value="大阪">🇯🇵 大阪 (Osaka)</option>
                            <option value="台北">🇹🇼 台北 (Taipei)</option>
                            <option value="首爾">🇰🇷 首爾 (Seoul)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* 左側：即時天氣看板 */}
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                                    ☀️ 當地即時天氣 ({city})
                                </h3>
                                <div class="flex items-center gap-4 my-4">
                                    <span class="text-4xl font-extrabold text-slate-800">{weather.temp}</span>
                                    <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-sm font-medium">
                                        {weather.condition}
                                    </span>
                                </div>
                                <p class="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100 mt-2">
                                    💡 <strong>小建議：</strong>{weather.advice}
                                </p>
                            </div>
                        </div>

                        {/* 中間：熱門景點推薦 */}
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 md:col-span-2">
                            <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                                📍 {city} 熱門必訪景點
                            </h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {attractions.map((place, index) => (
                                    <div 
                                        key={index} 
                                        class="p-3 bg-slate-50 hover:bg-indigo-50 rounded-lg border border-slate-100 flex justify-between items-center group transition cursor-pointer"
                                        onClick={() => {
                                            if (!itinerary.some(item => item.text === place)) {
                                                setItinerary([...itinerary, { id: Date.now(), text: place }]);
                                            }
                                        }}
                                    >
                                        <span class="text-slate-700 font-medium">{place}</span>
                                        <span class="text-xs text-indigo-500 opacity-0 group-hover:opacity-100 transition">
                                            + 加入行程
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 下方：我的專屬行程規劃 */}
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mt-6">
                        <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                            📝 我的專屬行程清單
                        </h3>

                        {/* 新增行程輸入框 */}
                        <form onSubmit={handleAddItinerary} class="flex gap-2 mb-4">
                            <input 
                                type="text" 
                                value={newLocation}
                                onChange={(e) => setNewLocation(e.target.value)}
                                placeholder="輸入自訂景點或從上方點選加入..."
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:border-indigo-500 transition"
                            />
                            <button 
                                type="submit"
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition whitespace-nowrap"
                            >
                                新增景點
                            </button>
                        </form>

                        {/* 行程列表 */}
                        {itinerary.length === 0 ? (
                            <div class="text-center py-8 text-slate-400 border-2 border-dashed border-slate-100 rounded-xl">
                                目前還沒有安排行程，點選上方推薦景點或手動新增吧！
                            </div>
                        ) : (
                            <div class="space-y-2">
                                {itinerary.map((item, index) => (
                                    <div key={item.id} class="flex justify-between items-center p-3 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg transition">
                                        <div class="flex items-center gap-3">
                                            <span class="w-6 h-6 flex items-center justify-center bg-indigo-100 text-indigo-600 rounded-full text-xs font-bold">
                                                {index + 1}
                                            </span>
                                            <span class="text-slate-700 font-medium">{item.text}</span>
                                        </div>
                                        <button 
                                            type="button"
                                            onClick={() => handleDeleteItinerary(item.id)}
                                            class="text-rose-500 hover:text-rose-700 text-sm font-medium px-2 py-1 rounded hover:bg-rose-50 transition"
                                        >
                                            刪除
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ====== ✅ 核心修正 2：乾淨正確的 React 18 渲染機制，移除所有拼寫錯誤的髒程式碼 ======
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
