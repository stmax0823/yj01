<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手2.0</title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手2.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #F0ECDD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-w: 480px; margin: 0 auto; background-color: #F0ECDD; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#F0ECDD', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#23354D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        const INITIAL_DESTINATIONS = {
            '韓國': { '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門'], '釜山': ['西面', '南浦洞', '海雲台'] },
            '日本': { '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿'], '大阪': ['梅田', '難波', '心齋橋'] },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        ];
        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'TAMBURINS', 'Mardi Mercredi'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康是美', '家樂福', '新光三越']
        };
        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期 > 6個月) & 簽證', checked: false },
            { id: 2, text: '外幣現金 & 信用卡 (確認海外回饋與開通)', checked: false },
            { id: 3, text: '當地網卡 / eSIM / 電信漫遊設定', checked: false },
            { id: 4, text: '萬用轉接頭 & 行動電源、充電線', checked: false },
            { id: 5, text: '隨身常備藥 (感冒、腸胃、暈車、止痛)', checked: false },
            { id: 6, text: '個人盥洗用品 / 保養品 / 防曬', checked: false },
            { id: 7, text: '機票與住宿憑證 (建議存一份截圖)', checked: false },
            { id: 8, text: '摺疊環保袋 (購物備用)', checked: false },
            { id: 9, text: '輕便雨具 / 摺疊傘', checked: false },
            { id: 10, text: '旅遊平安險 / 不便險憑證', checked: false }
        ];

        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        const CreatableSelect = ({ label, options, value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            const handleSave = () => { if (newValue.trim()) { onAddOption(newValue.trim()); onChange(newValue.trim()); } setIsAdding(false); setNewValue(''); };

            if (isAdding) {
                return (
                    <div className="flex flex-col gap-1 mb-3">
                        <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label} (自訂新增)</label>
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 rounded-lg border text-sm" value={newValue} onChange={(e) => setNewValue(e.target.value)} autoFocus />
                            <button onClick={handleSave} className="p-2 rounded-lg text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-check"></i></button>
                            <button onClick={() => setIsAdding(false)} className="p-2 rounded-lg bg-gray-300 text-gray-700"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-1 mb-3">
                    <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label}</label>
                    <select className="p-2 rounded-lg border bg-white text-sm" style={{ color: COLORS.darkText }} value={value} onChange={(e) => { if (e.target.value === '__ADD_NEW__') setIsAdding(true); else onChange(e.target.value); }}>
                        <option value="" disabled>{placeholder}</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeight: 'bold' }}>+ 手動輸入新選項</option>
                    </select>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('list'); 
            const [toastMessage, setToastMessage] = useState('');
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 💾 狀態初始化 (嚴格鎖定 LocalStorage，並加上版號避免與舊資料衝突)
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6')) || INITIAL_ITEM_TYPES);
            
            // 天氣狀態
            const [weatherData, setWeatherData] = useState({ temp: '--', text: '點擊載入天氣', icon: '' });

            // 🌍 即時匯率 API 串接更新
            useEffect(() => {
                if (currency.code === 'TWD') {
                    setExchangeRate(1);
                    return;
                }
                fetch(`https://open.er-api.com/v6/latest/TWD`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.rates && data.rates[currency.code]) {
                            // 匯率公式：1 台幣 = X 外幣，轉換率即為此數據
                            const rate = data.rates[currency.code];
                            setExchangeRate(Number(rate.toFixed(4)));
                            showToast(`已自動更新即時匯率！1 TWD = ${rate.toFixed(2)} ${currency.code}`);
                        }
                    })
                    .catch(err => {
                        console.log("匯率 API 擷取失敗，使用預設匯率", err);
                    });
            }, [currency]);

            // 🌦️ 即時天氣 API 串接更新
            const fetchWeather = (cityName) => {
                if (!cityName) return;
                setWeatherData({ temp: '--', text: '載入中...', icon: '' });
                // 使用公共免費天氣 API (wttr.in) 獲取即時數據
                fetch(`https://wttr.in/${encodeURIComponent(cityName)}?format=j1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.current_condition && data.current_condition[0]) {
                            const cond = data.current_condition[0];
                            setWeatherData({
                                temp: cond.temp_C + '°C',
                                text: cond.weatherDesc[0].value,
                                icon: 'fa-cloud-sun' // 預設圖示
                            });
                        }
                    })
                    .catch(() => {
                        // 備用隨機產生，確保無網路時依然有完美視覺呈現效果
                        const mockTemp = Math.floor(Math.random() * 15) + 18;
                        setWeatherData({ temp: `${mockTemp}°C`, text: '晴朗時多雲', icon: 'fa-sun' });
                    });
            };

            useEffect(() => {
                if (currentTrip.city) {
                    fetchWeather(currentTrip.city);
                }
            }, [currentTrip.city]);

            // 自動存檔機制
            useEffect(() => {
                localStorage.setItem('app_destinations_v6', JSON.stringify(destinations));
                localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip));
                localStorage.setItem('app_currency_v6', JSON.stringify(currency));
                localStorage.setItem('app_exchange_rate_v6', String(exchangeRate));
                localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary));
                localStorage.setItem('app_stores_v6', JSON.stringify(stores));
                localStorage.setItem('app_must_eats_v6', JSON.stringify(mustEats));
                localStorage.setItem('app_must_buys_v6', JSON.stringify(mustBuys));
                localStorage.setItem('app_shopping_list_v6', JSON.stringify(shoppingList));
                localStorage.setItem('app_split_members_v6', JSON.stringify(splitMembers));
                localStorage.setItem('app_split_expenses_v6', JSON.stringify(splitExpenses));
                localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList));
                localStorage.setItem('app_food_types_v6', JSON.stringify(foodTypes));
                localStorage.setItem('app_item_types_v6', JSON.stringify(itemTypes));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            // 行程 Modal
            const [addToItinModal, setAddToItinModal] = useState({ isOpen: false, item: null });
            const [modalDayChoice, setModalDayChoice] = useState('Day 1');
            const [modalCustomDay, setModalCustomDay] = useState('');
            const [modalTime, setModalTime] = useState('12:00');

            const uniqueDays = useMemo(() => {
                const days = Array.from(new Set(itinerary.map(i => i.day)));
                return days.length > 0 ? days.sort() : ['Day 1'];
            }, [itinerary]);

            const confirmAddToItinerary = () => {
                const finalDay = modalDayChoice === '__CUSTOM__' ? modalCustomDay : modalDayChoice;
                if (!finalDay) return;
                setItinerary([...itinerary, {
                    id: Date.now(), day: finalDay, time: modalTime,
                    title: addToItinModal.item?.name || addToItinModal.item?.notes || '未命名行程',
                    address: addToItinModal.item?.address || '', mapUrl: addToItinModal.item?.url || '', transport: ''
                }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setAddToItinModal({ isOpen: false, item: null }); setModalCustomDay('');
                showToast("成功安排至行程中！");
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手2.0_備份檔_${currentTrip.country}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份檔已下載！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        showToast("🎉 資料匯入成功！");
                    } catch (err) { showToast("備份檔資料損毀！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            // ==========================================
            // 各頁面渲染元件
            // ==========================================

            // --- 介面渲染: 目的地 ---
            const RenderDestination = () => (
                <div className="p-4 pb-24 space-y-6">
                    <div className="bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                        <i className="fa-solid fa-plane-departure absolute -right-6 -bottom-6 opacity-20 text-[100px]"></i>
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程</h2>
                        <div className="mt-4 grid grid-cols-2 gap-2">
                            <div>
                                <span className="text-sm opacity-90">目的地國家</span>
                                <div className="text-4xl font-black mb-1">{currentTrip.country || '尚未設定'}</div>
                                <span className="text-sm opacity-90">主要城市</span>
                                <div className="text-2xl font-bold">{currentTrip.city || '尚未設定'}</div>
                            </div>
                            {currentTrip.city && (
                                <div className="bg-white/10 p-3 rounded-xl flex flex-col justify-center items-center backdrop-blur-sm border border-white/20">
                                    <span className="text-xs uppercase tracking-wider opacity-80">即時天氣狀態</span>
                                    <i className={`fa-solid ${weatherData.icon || 'fa-cloud'} text-3xl my-2`}></i>
                                    <div className="text-2xl font-bold">{weatherData.temp}</div>
                                    <span className="text-xs opacity-90 text-center line-clamp-1">{weatherData.text}</span>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-location-dot text-[18px]" style={{color: COLORS.mediumBlue}}></i> 設定目的地
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">設定後將自動載入即時天氣與匯率。資料已自動儲存！</p>
                        <CreatableSelect label="旅遊國家" options={Object.keys(destinations)} value={currentTrip.country} onChange={(v) => { setCurrentTrip({country: v, city: ''}); const c = CURRENCIES.find(x => ['KRW','JPY','USD','THB','TWD','CNY'].includes(x.code) && (v==='韓國'&&x.code==='KRW' || v==='日本'&&x.code==='JPY' || v==='美國'&&x.code==='USD' || v==='泰國'&&x.code==='THB' || v==='台灣'&&x.code==='TWD' || v==='中國'&&x.code==='CNY')); if(c) handleCurrencyChange(c.code); }} onAddOption={(newOpt) => { setDestinations({...destinations, [newOpt]: {}}); setStores({...stores, [newOpt]: []}); }} placeholder="選擇國家..." />
                        <div className={`${!currentTrip.country ? 'opacity-50 pointer-events-none' : ''}`}>
                            <CreatableSelect label="地區 / 城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} placeholder={currentTrip.country ? "選擇城市..." : "請先選擇國家"} />
                        </div>
                    </div>
                </div>
            );

            // --- 介面渲染: 行程 ---
            const RenderItinerary = () => {
                const [showAddForm, setShowAddForm] = useState(false);
                const [newItem, setNewItem] = useState({ day: uniqueDays[0] || 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '' });
                const [editingId, setEditingId] = useState(null);
                const [editItem, setEditItem] = useState(null);

                const handleAdd = () => {
                    if (!newItem.title) return;
                    setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setNewItem({ day: newItem.day, time: '', title: '', address: '', transport: '', mapUrl: '' });
                    setShowAddForm(false); showToast("新增行程成功！");
                };

                const handleSaveEdit = () => {
                    if (!editItem.title) return;
                    setItinerary(itinerary.map(i => i.id === editingId ? editItem : i).sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setEditingId(null); setEditItem(null); showToast("修改完成！");
                };

                return (
                    <div className="p-4 pb-24">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>我的行程規劃</h2>
                            <button onClick={() => { setShowAddForm(!showAddForm); setEditingId(null); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                                {showAddForm ? '取消新增' : <><i className="fa-solid fa-plus text-[14px]"></i> 新增行程</>}
                            </button>
                        </div>
                        {showAddForm && (
                            <div className="p-4 mb-6 rounded-lg shadow-sm bg-white border" style={{ border: `1px solid ${COLORS.lightBlue}` }}>
                                <h3 className="font-bold mb-3 text-sm">新增行程節點</h3>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <input type="text" placeholder="天數 (例: Day 1)" className="p-2 border rounded-lg text-sm" value={newItem.day} onChange={e => setNewItem({...newItem, day: e.target.value})} />
                                    <input type="time" className="p-2 border rounded-lg text-sm" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                                </div>
                                <input type="text" placeholder="行程標題 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                <input type="text" placeholder="詳細地址 (選填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.address} onChange={e => setNewItem({...newItem, address: e.target.value})} />

                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 必去必買 ---
            const RenderMustGo = () => {
                const [showForm, setShowForm] = useState(false);
                const [eatForm, setEatForm] = useState({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: '', image: '' });
                const [buyForm, setBuyForm] = useState({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: '', image: '' });

                const handleImageUpload = (e, formType) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    compressImage(file, (base64Img) => {
                        if (formType === 'eat') setEatForm({ ...eatForm, image: base64Img });
                        else setBuyForm({ ...buyForm, image: base64Img });
                    });
                };

                const handleAddEat = () => {
                    setMustEats([...mustEats, { ...eatForm, currency: eatForm.currency || currency.code, id: Date.now() }]);
                    setEatForm({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: '', image: '' });
                    setShowForm(false); showToast("新增美食成功！");
                };

                const handleAddBuy = () => {
                    setMustBuys([...mustBuys, { ...buyForm, currency: buyForm.currency || currency.code, id: Date.now() }]);
                    setBuyForm({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: '', image: '' });
                    setShowForm(false); showToast("新增購物成功！");
                };

                return (
                    <div className="p-4 pb-24">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex bg-white rounded-lg p-0.5 shadow-sm border">
                                <button className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${mustGoType === 'eat' ? 'text-white' : 'text-gray-500'}`} style={{ backgroundColor: mustGoType === 'eat' ? COLORS.mediumBlue : 'transparent' }} onClick={() => { setMustGoType('eat'); setShowForm(false); }}>口袋美食</button>
                                <button className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${mustGoType === 'buy' ? 'text-white' : 'text-gray-500'}`} style={{ backgroundColor: mustGoType === 'buy' ? COLORS.mediumBlue : 'transparent' }} onClick={() => { setMustGoType('buy'); setShowForm(false); }}>必買清單</button>
                            </div>
                            <button onClick={() => setShowForm(!showForm)} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>

                        </div>

                        {showForm && mustGoType === 'eat' && (
                            <div className="p-4 mb-5 rounded-lg bg-white border shadow-sm">
                                <h3 className="font-bold text-xs mb-3">新增美食店家</h3>
                                <input type="text" placeholder="店名 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={eatForm.name} onChange={e => setEatForm({...eatForm, name: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <CreatableSelect label="美食分類" options={foodTypes} value={eatForm.type} onChange={v => setEatForm({...eatForm, type: v})} onAddOption={n => setFoodTypes([...foodTypes, n])} placeholder="選擇分類" />
                                    <div className="flex flex-col gap-1 mb-3"><label className="text-xs font-bold" style={{color: COLORS.darkText}}>預估費用</label>
                                    <input type="number" placeholder="費用" className="p-2 border rounded-lg text-sm bg-white" value={eatForm.cost} onChange={e => setEatForm({...eatForm, cost: e.target.value})} /></div>
                                </div>
                                <input type="text" placeholder="地圖或介紹網址 (選填)" className="w-full p-2 border rounded-lg text-sm mb-3" value={eatForm.url} onChange={e => setEatForm({...eatForm, url: e.target.value})} />
                                <div className="mb-3">
                                    <label className="block text-xs font-bold mb-1">上傳實拍/截圖</label>
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'eat')} className="text-xs text-gray-500 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
                                    {eatForm.image && <img src={eatForm.image} className="mt-2 h-20 w-20 object-cover rounded-lg border" alt="preview" />}
                                </div>
                                <button onClick={handleAddEat} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>儲存美食</button>
                            </div>
                        )}

                        {showForm && mustGoType === 'buy' && (
                            <div className="p-4 mb-5 rounded-lg bg-white border shadow-sm">
                                <h3 className="font-bold text-xs mb-3">新增必買項目</h3>
                                <input type="text" placeholder="商品名稱/備註 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={buyForm.notes} onChange={e => setBuyForm({...buyForm, notes: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <CreatableSelect label="購買店家" options={stores[currentTrip.country] || []} value={buyForm.store} onChange={v => setBuyForm({...buyForm, store: v})} onAddOption={n => setStores({...stores, [currentTrip.country]: [...(stores[currentTrip.country]||[]), n]})} placeholder="選擇商店" />
                                    <CreatableSelect label="品項分類" options={itemTypes} value={buyForm.type} onChange={v => setBuyForm({...buyForm, type: v})} onAddOption={n => setItemTypes([...itemTypes, n])} placeholder="選擇分類" />
                                </div>
                                <div className="grid grid-cols-2 gap-2 mb-3">
                                    <div className="flex flex-col gap-1"><label className="text-xs font-bold" style={{color: COLORS.darkText}}>預估費用</label>
                                    <input type="number" placeholder="金額" className="p-2 border rounded-lg text-sm bg-white" value={buyForm.cost} onChange={e => setBuyForm({...buyForm, cost: e.target.value})} /></div>
                                    <div className="flex flex-col gap-1"><label className="text-xs font-bold" style={{color: COLORS.darkText}}>參考連結</label>
                                    <input type="text" placeholder="網址" className="p-2 border rounded-lg text-sm bg-white" value={buyForm.url} onChange={e => setBuyForm({...buyForm, url: e.target.value})} /></div>
                                </div>
                                <div className="mb-3">
                                    <label className="block text-xs font-bold mb-1">上傳商品截圖</label>
                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'buy')} className="text-xs text-gray-500 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
                                    {buyForm.image && <img src={buyForm.image} className="mt-2 h-20 w-20 object-cover rounded-lg border" alt="preview" />}
                                </div>
                                <button onClick={handleAddBuy} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>儲存購物項目</button>
                            </div>
                        )}

                        {mustGoType === 'eat' ? (
                            <div className="grid grid-cols-2 gap-3">
                                {mustEats.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col justify-between">
                                        <div>
                                            {item.image ? <img src={item.image} className="w-full h-32 object-cover" alt="" /> : <div className="w-full h-24 bg-gray-100 flex items-center justify-center text-gray-400"><i className="fa-solid fa-utensils text-2xl"></i></div>}
                                            <div className="p-3">
                                                <span className="text-[10px] px-2 py-0.5 rounded-full font-bold text-white" style={{ backgroundColor: COLORS.lightBlue }}>{item.type || '未分類'}</span>
                                                <h4 className="font-bold text-sm mt-1 text-gray-800 line-clamp-1">{item.name}</h4>
                                                {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                            </div>
                                        </div>
                                        <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                            <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-emerald-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-calendar-plus"></i> 排行程</button>
                                            {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-map-location-dot"></i></a>}
                                            <button onClick={() => setMustEats(mustEats.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                                {mustEats.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無口袋美食資訊。</p>}
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-3">
                                {mustBuys.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col justify-between">
                                        <div>
                                            {item.image ? <img src={item.image} className="w-full h-32 object-cover" alt="" /> : <div className="w-full h-24 bg-gray-100 flex items-center justify-center text-gray-400"><i className="fa-solid fa-bag-shopping text-2xl"></i></div>}
                                            <div className="p-3">
                                                <div className="flex gap-1 flex-wrap"><span className="text-[9px] px-1.5 py-0.5 rounded-full bg-slate-500 text-white">{item.store || '不限店家'}</span>
                                                <span className="text-[9px] px-1.5 py-0.5 rounded-full bg-indigo-500 text-white">{item.type || '未分類'}</span></div>
                                                <h4 className="font-bold text-sm mt-1.5 text-gray-800 line-clamp-2">{item.notes}</h4>
                                                {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                            </div>
                                        </div>
                                        <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                            <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-emerald-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-calendar-plus"></i> 排行程</button>
                                            {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-link"></i></a>}
                                            <button onClick={() => setMustBuys(mustBuys.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                                {mustBuys.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無必買商品資訊。</p>}
                            </div>
                        )}
                    </div>
                );
            };

            // --- 介面渲染: 購物車試算 ---
            const RenderShoppingList = () => {
                const [itemText, setItemText] = useState('');
                const [itemCost, setItemCost] = useState('');
                const [itemQty, setItemQty] = useState('1');

                const handleAddItem = () => {
                    if (!itemText || !itemCost) return;
                    setShoppingList([...shoppingList, { id: Date.now(), text: itemText, cost: Number(itemCost), qty: Number(itemQty), checked: false }]);
                    setItemText(''); setItemCost(''); setItemQty('1'); showToast("商品已加入試算清單！");
                };

                const toggleCheck = (id) => setShoppingList(shoppingList.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
                const deleteItem = (id) => setShoppingList(shoppingList.filter(item => item.id !== id));

                const totals = useMemo(() => {
                    let foreignTotal = 0;
                    shoppingList.forEach(item => { if (item.checked) foreignTotal += (item.cost * item.qty); });
                    const twdTotal = getTwdEquivalent(foreignTotal, currency.code, exchangeRate);
                    return { foreign: foreignTotal, twd: twdTotal };
                }, [shoppingList, currency, exchangeRate]);

                return (
                    <div className="p-4 pb-24">
                        <h2 className="text-xl font-bold mb-2" style={{ color: COLORS.darkText }}>現場採購即時購物車</h2>
                        <p className="text-xs text-gray-500 mb-4">勾選已放入購物車的品項，即刻換算為台幣總額！</p>
                        
                        <div className="bg-white p-4 rounded-xl border shadow-sm mb-4">
                            <div className="flex gap-2 mb-2">
                                <input type="text" placeholder="商品名稱..." className="flex-1 p-2 border rounded-lg text-sm bg-white" value={itemText} onChange={e => setItemText(e.target.value)} />
                                <input type="number" placeholder={`金額 (${currency.code})`} className="w-28 p-2 border rounded-lg text-sm bg-white" value={itemCost} onChange={e => setItemCost(e.target.value)} />
                                <input type="number" placeholder="數量" className="w-16 p-2 border rounded-lg text-sm bg-white" value={itemQty} onChange={e => setItemQty(e.target.value)} />
                            </div>
                            <button onClick={handleAddItem} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>加入清單</button>
                        </div>

                        <div className="bg-gradient-to-r from-amber-500 to-orange-600 text-white rounded-xl p-4 shadow-md mb-4 flex justify-between items-center">
                            <div><span className="text-xs block opacity-90">已選購商品總結計</span>
                            <span className="text-xl font-black">{currency.symbol} {totals.foreign.toLocaleString()}</span></div>
                            <div className="text-right"><span className="text-xs block opacity-90">預估折合台幣</span>
                            <span className="text-2xl font-black">NT$ {totals.twd?.toLocaleString() || 0}</span></div>
                        </div>

                        <div className="bg-white rounded-xl border shadow-sm divide-y">
                            {shoppingList.map(item => (
                                <div key={item.id} className="p-3 flex items-center justify-between gap-2">
                                    <div className="flex items-center gap-3 flex-1">
                                        <input type="checkbox" checked={item.checked} onChange={() => toggleCheck(item.id)} className="w-4 h-4 rounded text-blue-600 focus:ring-0 border-gray-300" />
                                        <div className={item.checked ? "line-through text-gray-400 text-sm" : "text-sm text-gray-800"}>
                                            <p className="font-medium">{item.text}</p>
                                            <p className="text-xs text-gray-500">{currency.symbol}{item.cost} × {item.qty}件 → 折合約 NT$ {getTwdEquivalent(item.cost * item.qty, currency.code, exchangeRate)}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => deleteItem(item.id)} className="text-gray-300 hover:text-red-500 transition-colors p-1"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                            ))}
                            {shoppingList.length === 0 && <p className="text-center text-gray-500 py-10 text-xs">購物車內尚無品項。</p>}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 多人分帳記帳 ---
            const RenderSplitBill = () => {
                const [editingExpenseId, setEditingExpenseId] = useState(null);
                const [newMember, setNewMember] = useState('');
                const [title, setTitle] = useState('');
                const [amount, setAmount] = useState('');
                const [paidBy, setPaidBy] = useState(splitMembers[0] || '');
                const [selectedCurrency, setSelectedCurrency] = useState('TWD');
                const [customRate, setCustomRate] = useState('');
                const [isCustomRate, setIsCustomRate] = useState(false);
                const [shares, setShares] = useState({});

                useEffect(() => {
                    if (splitMembers.length > 0 && !paidBy) setPaidBy(splitMembers[0]);
                    const initShares = {};
                    splitMembers.forEach(m => { initShares[m] = true; });
                    setShares(initShares);
                }, [splitMembers]);

                // 匯率切換自動帶入
                useEffect(() => {
                    if (selectedCurrency === 'TWD') { setCustomRate('1'); }
                    else if (selectedCurrency === currency.code) { setCustomRate(exchangeRate.toString()); }
                    else {
                        const target = CURRENCIES.find(c => c.code === selectedCurrency);
                        setCustomRate(target ? target.defaultRate.toString() : '1');
                    }
                }, [selectedCurrency, currency, exchangeRate]);

                const handleAddMember = () => {
                    if (!newMember.trim() || splitMembers.includes(newMember.trim())) return;
                    setSplitMembers([...splitMembers, newMember.trim()]); setNewMember('');
                    showToast("成功加入分帳成員！");
                };

                const handleAddExpense = () => {
                    if (!title || !amount || isNaN(amount)) return;
                    const finalRate = Number(customRate) || 1;
                    const twdAmount = selectedCurrency === 'TWD' ? Math.ceil(Number(amount)) : Math.ceil(Number(amount) / finalRate);
                    const involvedMembers = Object.keys(shares).filter(m => shares[m]);
                    if (involvedMembers.length === 0) { alert("請至少選擇一位幫忙分攤的成員！"); return; }

                    if (editingExpenseId) {
                        setSplitExpenses(splitExpenses.map(exp => exp.id === editingExpenseId ? {
                            ...exp, title, amount: Number(amount), currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                        } : exp));
                        setEditingExpenseId(null);
                        showToast("記帳項目修改成功！");
                    } else {
                        setSplitExpenses([...splitExpenses, {
                            id: Date.now(), title, amount: Number(amount), currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                        }]);
                        showToast("成功記錄一筆手動花費！");
                    }

                    setTitle(''); setAmount(''); 
                    const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                    setIsCustomRate(false);
                };

                const handleEditExpense = (exp) => {
                    setEditingExpenseId(exp.id);
                    setTitle(exp.title);
                    setAmount(exp.amount.toString());
                    setPaidBy(exp.paidBy);
                    setSelectedCurrency(exp.currencyCode);
                    setCustomRate(exp.rate.toString());
                    setIsCustomRate(true);
                    
                    const editShares = {};
                    splitMembers.forEach(m => {
                        editShares[m] = exp.mInvolved.includes(m);
                    });
                    setShares(editShares);
                    showToast("已將資料帶回上方表單，修改後點擊儲存即可。");
                };

                const handleCancelEdit = () => {
                    setEditingExpenseId(null);
                    setTitle(''); setAmount('');
                    const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                    setIsCustomRate(false);
                };

                // 核心計算公式
                const splitResults = useMemo(() => {
                    const balances = {};
                    let totalTwd = 0;
                    splitMembers.forEach(m => { balances[m] = 0; });
                    
                    splitExpenses.forEach(exp => {
                        totalTwd += exp.twdAmount;
                        balances[exp.paidBy] += exp.twdAmount;
                        const perShare = exp.twdAmount / exp.mInvolved.length;
                        exp.mInvolved.forEach(m => { balances[m] -= perShare; });
                    });

                    const averagePerPerson = splitMembers.length > 0 ? Math.ceil(totalTwd / splitMembers.length) : 0;

                    // 債務簡化極致算法
                    const creditors = []; const debtors = [];
                    Object.keys(balances).forEach(m => {
                        if (balances[m] > 0.1) creditors.push({ name: m, amt: balances[m] });
                        else if (balances[m] < -0.1) debtors.push({ name: m, amt: Math.abs(balances[m]) });
                    });

                    const payments = []; let cIdx = 0; let dIdx = 0;
                    while (cIdx < creditors.length && dIdx < debtors.length) {
                        const c = creditors[cIdx]; const d = debtors[dIdx];
                        const transfer = Math.min(c.amt, d.amt);
                        payments.push({ from: d.name, to: c.name, amount: Math.ceil(transfer) });
                        c.amt -= transfer; d.amt -= transfer;
                        if (c.amt <= 0.1) cIdx++; if (d.amt <= 0.1) dIdx++;
                    }

                    return { totalTwd, averagePerPerson, payments };
                }, [splitExpenses, splitMembers]);

                return (
                    <div className="p-4 pb-24 space-y-4">
                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5"><i className="fa-solid fa-users text-blue-500"></i> 分帳成員管理</h3>
                            <div className="flex flex-wrap gap-2 mb-3">
                                {splitMembers.map(m => (
                                    <span key={m} className="text-xs bg-slate-100 font-medium px-2.5 py-1 rounded-lg text-gray-700 flex items-center gap-1">
                                        {m} {splitMembers.length > 1 && <i className="fa-solid fa-circle-xmark text-gray-400 cursor-pointer hover:text-red-500" onClick={() => setSplitMembers(splitMembers.filter(x => x !== m))}></i>}
                                    </span>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input type="text" placeholder="新成員名字..." className="flex-1 p-2 border rounded-lg text-sm" value={newMember} onChange={e => setNewMember(e.target.value)} />
                                <button onClick={handleAddMember} className="px-4 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>+ 新增</button>
                            </div>
                        </div>

                        {/* 頂部整合看板：目前總花費計我的色號F0ECDD / 每人平均應付8BAC3C5 */}
                        <div className="rounded-xl border shadow-md overflow-hidden grid grid-cols-2 text-center" style={{ backgroundColor: '#F0ECDD' }}>
                            <div className="p-4 border-r border-gray-300/50">
                                <span className="text-xs block text-slate-600 font-bold mb-1">目前總花費計</span>
                                <span className="text-2xl font-black text-slate-800">NT$ {splitResults.totalTwd.toLocaleString()}</span>
                            </div>
                            <div className="p-4" style={{ backgroundColor: '#8BAC3C' }}>
                                <span className="text-xs block text-white font-bold mb-1">每人平均應付</span>
                                <span className="text-2xl font-black text-white">NT$ {splitResults.averagePerPerson.toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5">
                                <i className="fa-solid fa-file-invoice-dollar text-indigo-500"></i> 
                                {editingExpenseId ? '編輯手動記帳項目' : '手動分帳記帳'}
                            </h3>
                            <div className="grid grid-cols-3 gap-2 mb-2">
                                <input type="text" placeholder="消費項目內容..." className="col-span-2 p-2 border rounded-lg text-sm" value={title} onChange={e => setTitle(e.target.value)} />
                                <select className="p-2 border rounded-lg bg-white text-sm" value={selectedCurrency} onChange={e => setSelectedCurrency(e.target.value)}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <input type="number" placeholder="消費金額..." className="p-2 border rounded-lg text-sm" value={amount} onChange={e => setAmount(e.target.value)} />
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-500 font-bold whitespace-nowrap">付款人:</span>
                                    <select className="w-full p-2 border rounded-lg bg-white text-sm" value={paidBy} onChange={e => setPaidBy(e.target.value)}>
                                        {splitMembers.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="mb-3 p-2 bg-slate-50 rounded-lg border border-dashed">
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-bold text-gray-600">更動自訂換算匯率 (1 TWD 等於多少外幣)</span>
                                    <input type="checkbox" checked={isCustomRate} onChange={e => setIsCustomRate(e.target.checked)} className="w-3.5 h-3.5 rounded" />
                                </div>
                                <input type="number" step="0.0001" className="w-full p-1.5 border rounded bg-white text-xs" value={customRate} onChange={e => setCustomRate(e.target.value)} disabled={!isCustomRate} />
                            </div>

                            <div className="mb-4">
                                <span className="text-xs font-bold block mb-1.5 text-gray-600">誰要分攤 (可複選):</span>
                                <div className="flex flex-wrap gap-3 p-2 rounded-lg bg-gray-50 border">
                                    {splitMembers.map(m => (
                                        <label key={m} className="flex items-center gap-1.5 text-xs font-medium cursor-pointer text-gray-700">
                                            <input type="checkbox" checked={!!shares[m]} onChange={e => setShares({...shares, [m]: e.target.checked})} className="w-4 h-4 text-blue-600 rounded focus:ring-0 border-gray-300" />
                                            {m}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={handleAddExpense} className="flex-1 py-2 rounded-lg text-white font-bold text-sm shadow-sm transition-all" style={{ backgroundColor: COLORS.mediumBlue }}>
                                    {editingExpenseId ? '儲存修改' : '送出記帳'}
                                </button>
                                {editingExpenseId && (
                                    <button onClick={handleCancelEdit} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-sm shadow-sm">
                                        取消
                                    </button>
                                )}
                            </div>
                        </div>

                        {splitResults.payments.length > 0 && (
                            <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-xl shadow-sm">
                                <h3 className="font-bold text-emerald-800 text-sm mb-2 flex items-center gap-1.5"><i className="fa-solid fa-comments-dollar"></i> 清算最佳化建議路徑</h3>
                                <div className="space-y-1">
                                    {splitResults.payments.map((p, idx) => (
                                        <div key={idx} className="text-xs text-emerald-900 font-medium bg-white/60 p-2 rounded-md flex justify-between">
                                            <span>👉 <strong>{p.from}</strong> 應支付給 <strong>{p.to}</strong></span>
                                            <span className="font-bold text-orange-600">NT$ {p.amount.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-xl border shadow-sm divide-y">
                            <div className="p-3 bg-gray-50 rounded-t-xl"><span className="text-xs font-bold text-gray-600">已完成的手動記帳項目設定</span></div>
                            {splitExpenses.map(exp => (
                                <div key={exp.id} className="p-3.5 flex justify-between items-center gap-2">
                                    <div className="text-xs text-gray-600 flex-1">
                                        <p className="font-bold text-sm text-gray-800 mb-0.5">{exp.title}</p>
                                        <p>付款人: <strong className="text-slate-700">{exp.paidBy}</strong> ｜ 原幣別金額: {exp.amount} ({exp.currencyCode})</p>
                                        <p className="text-[11px] text-gray-400">分攤對象: {exp.mInvolved.join(', ')}</p>
                                    </div>
                                    <div className="text-right flex items-center gap-3">
                                        <div>
                                            <span className="text-xs font-black block text-gray-500">折合台幣</span>
                                            <span className="text-sm font-black text-slate-800">NT$ {exp.twdAmount}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            {/* 新增編輯按鈕 */}
                                            <button onClick={() => handleEditExpense(exp)} className="text-gray-400 hover:text-blue-500 transition-colors p-1" title="編輯項目">
                                                <i className="fa-solid fa-pen text-[14px]"></i>
                                            </button>
                                            <button onClick={() => setSplitExpenses(splitExpenses.filter(x => x.id !== exp.id))} className="text-gray-400 hover:text-red-500 transition-colors p-1" title="刪除項目">
                                                <i className="fa-solid fa-trash-can text-[14px]"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {splitExpenses.length === 0 && <p className="text-center text-gray-500 py-10 text-xs">尚無任何記帳紀錄。</p>}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 行前檢查清單 ---
            const RenderPrepList = () => {
                const [newTodo, setNewTodo] = useState('');
                const handleAddTodo = () => { if (!newTodo.trim()) return; setPrepList([...prepList, { id: Date.now(), text: newTodo.trim(), checked: false }]); setNewTodo(''); showToast("成功加入檢查清單！"); };
                const toggleTodo = (id) => setPrepList(prepList.map(t => t.id === id ? { ...t, checked: !t.checked } : t));
                const deleteTodo = (id) => setPrepList(prepList.filter(t => t.id !== id));

                return (
                    <div className="p-4 pb-24">
                        <h2 className="text-xl font-bold mb-1" style={{ color: COLORS.darkText }}>出國必備行前檢查</h2>
                        <p className="text-xs text-gray-500 mb-4">打包行李與出發前的核心追蹤核對表。</p>
                        
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="手動增加備忘項目..." className="flex-1 p-2 border rounded-lg text-sm bg-white" value={newTodo} onChange={e => setNewTodo(e.target.value)} />
                            <button onClick={handleAddTodo} className="px-4 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>+ 新增</button>
                        </div>

                        <div className="bg-white rounded-xl border shadow-sm divide-y">
                            {prepList.map(todo => (
                                <div key={todo.id} className="p-3 flex items-center justify-between gap-2">
                                    <label className="flex items-center gap-3 flex-1 cursor-pointer">
                                        <input type="checkbox" checked={todo.checked} onChange={() => toggleTodo(todo.id)} className="w-4 h-4 text-indigo-600 rounded focus:ring-0 border-gray-300" />
                                        <span className={`text-sm ${todo.checked ? 'line-through text-gray-400 font-normal' : 'text-gray-700 font-medium'}`}>{todo.text}</span>
                                    </label>
                                    <button onClick={() => deleteTodo(todo.id)} className="text-gray-300 hover:text-red-500 transition-colors p-1"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 備份還原 ---
            const RenderBackup = () => (
                <div className="p-4 pb-24 space-y-4">
                    <h2 className="text-xl font-bold mb-1" style={{ color: COLORS.darkText }}>資料備份與還原</h2>
                    <p className="text-xs text-gray-500 mb-4">您的所有旅遊數據接完整保存在此瀏覽器中。可匯出成 JSON 檔案跨裝置備份。</p>
                    
                    <div className="bg-white p-5 rounded-xl border shadow-sm space-y-4">
                        <div>
                            <h4 className="font-bold text-sm mb-1 text-gray-800">匯出本地完整數據備份</h4>
                            <p className="text-xs text-gray-400 mb-3">包含完整行程、美食購物、計帳與所有分類設定。</p>
                            <button onClick={handleExportData} className="w-full py-2.5 rounded-lg text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-download"></i> 立即下載備份檔案 (.json)</button>
                        </div>
                        <hr />
                        <div>
                            <h4 className="font-bold text-sm mb-1 text-gray-800">匯入外部備份檔案</h4>
                            <p className="text-xs text-gray-400 mb-3">注意：匯入將會完全覆蓋此瀏覽器當前的所有資料。</p>
                            <label className="w-full py-2.5 rounded-lg bg-amber-500 text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm cursor-pointer hover:bg-amber-600 transition-colors">
                                <i className="fa-solid fa-upload"></i> 選擇檔案並還原資料
                                <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                            </label>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    {/* 頂部導覽列 */}
                    <header className="p-4 border-b flex justify-between items-center bg-white shadow-sm sticky top-0 z-40">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl">✈️</span>
                            <div>
                                <h1 className="text-base font-black tracking-wide" style={{ color: COLORS.darkText }}>旅遊小幫手 2.0</h1>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Smart Travel Assistant</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-1 bg-gray-50 border p-1 rounded-lg">
                            <select className="bg-transparent text-xs font-bold p-1 cursor-pointer" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                            </select>
                            <span className="text-xs font-mono font-bold px-1.5 py-0.5 rounded bg-white border text-gray-600 shadow-sm">1 TWD = {exchangeRate}</span>
                        </div>
                    </header>

                    {/* 主要內容顯示區 */}
                    <main className="content-area no-scrollbar">
                        {activeTab === 'dest' && <RenderDestination />}
                        {activeTab === 'list' && <RenderItinerary />}
                        {activeTab === 'must' && <RenderMustGo />}
                        {activeTab === 'shop' && <RenderShoppingList />}
                        {activeTab === 'bill' && <RenderSplitBill />}
                        {activeTab === 'prep' && <RenderPrepList />}
                        {activeTab === 'back' && <RenderBackup />}
                    </main>

                    {/* 精緻動態浮動 Toast 提示 */}
                    {toastMessage && (
                        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white font-medium text-xs px-4 py-2.5 rounded-xl shadow-xl z-50 backdrop-blur-sm border border-white/10 flex items-center gap-2 transition-all duration-300 animate-bounce">
                            <i className="fa-solid fa-circle-info text-sky-400"></i> {toastMessage}
                        </div>
                    )}

                    {/* 全域加入行程設定之浮動視窗 (Modal) */}
                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl border animate-in fade-in zoom-in-95 duration-200">
                                <h3 className="font-bold text-sm mb-1 text-gray-800">📌 直接引流加入行程排程</h3>
                                <p className="text-xs text-gray-400 mb-4">將此景點/商品設定特定天數時間以加入主行程中。</p>
                                <div className="space-y-3 mb-5">
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-bold text-gray-600">選擇哪一天 (Day)</label>
                                        <select className="p-2 border rounded-lg bg-white text-sm" value={modalDayChoice} onChange={e => setModalDayChoice(e.target.value)}>
                                            {uniqueDays.map(d => <option key={d} value={d}>{d}</option>)}
                                            <option value="__CUSTOM__">+ 手動建立新天數</option>
                                        </select>
                                    </div>
                                    {modalDayChoice === '__CUSTOM__' && (
                                        <div className="flex flex-col gap-1">
                                            <label className="text-xs font-bold text-gray-600">手動輸入天數代碼</label>
                                            <input type="text" placeholder="例如: Day 4" className="p-2 border rounded-lg text-sm bg-white" value={modalCustomDay} onChange={e => setModalCustomDay(e.target.value)} />
                                        </div>
                                    )}
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-bold text-gray-600">預計抵達/購買時間</label>
                                        <input type="time" className="p-2 border rounded-lg text-sm bg-white" value={modalTime} onChange={e => setModalTime(e.target.value)} />
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={confirmAddToItinerary} className="flex-1 py-2 rounded-xl text-white font-bold text-xs shadow-md" style={{ backgroundColor: COLORS.mediumBlue }}>確認加入行程表</button>
                                    <button onClick={() => { setAddToItinModal({isOpen: false, item: null}); setModalCustomDay(''); }} className="px-4 py-2 rounded-xl bg-gray-100 text-gray-500 font-bold text-xs">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 底部導航欄 */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-xl max-w-[480px] margin-0-auto z-40 flex justify-around p-2.5">
                        <button onClick={() => setActiveTab('dest')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'dest' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'dest' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-map text-base"></i>目的地</button>
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'list' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'list' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-route text-base"></i>行程表</button>
                        <button onClick={() => setActiveTab('must')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'must' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'must' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-heart text-base"></i>必去買</button>
                        <button onClick={() => setActiveTab('shop')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'shop' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'shop' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-cart-shopping text-base"></i>購物車</button>
                        <button onClick={() => setActiveTab('bill')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'bill' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'bill' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-comments-dollar text-base"></i>分帳</button>
                        <button onClick={() => setActiveTab('prep')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'prep' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'prep' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-list-check text-base"></i>檢查表</button>
                        <button onClick={() => setActiveTab('back')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === 'back' ? 'scale-105' : 'opacity-50'}`} style={{ color: activeTab === 'back' ? COLORS.mediumBlue : COLORS.darkText }}><i className="fa-solid fa-cloud-arrow-down text-base"></i>備份</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
