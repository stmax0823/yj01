<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手3.0</title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手3.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

     <style>
        body { margin: 0; padding: 0; background-color: #E8ECEF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-width: 480px; margin: 0 auto; background-color: #E8ECEF; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; overflow-x: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
        .animate-slide { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* 新版航班專屬樣式 */
        .clear-btn { cursor: pointer; color: #94a3b8; transition: color 0.2s; z-index: 10; }
        .clear-btn:hover { color: #e11d48; }
        /* 防止圖片載入閃爍 */
        img { content-visibility: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#E8ECEF', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#495B7D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        const INITIAL_DESTINATIONS = {
            '韓國': { '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門', '漢南洞', '益善洞', '三清洞', '梨泰院', '蠶室'], '釜山': ['西面', '南浦洞', '海雲台', '廣安里', '甘川文化村', '影島', '機張'], '濟州島': ['濟州市區', '西歸浦', '涯月邑', '城山日出峰'] },
            '日本': { '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿', '上野', '秋葉原', '六本木', '台場', '池袋'], '大阪': ['梅田', '難波', '心齋橋', '道頓堀', '天王寺', '通天閣', '環球影城'], '京都': ['祇園', '河原町', '清水寺', '嵐山', '伏見稻荷', '金閣寺', '宇治'] },
            '中國': { '北京': ['故宮/天安門', '王府井', '三里屯', '什剎海', '頤和園'], '上海': ['外灘', '陸家嘴', '南京路', '田子坊', '靜安寺', '新天地'], '成都': ['春熙路', '寬窄巷子', '錦里', '武侯祠', '熊貓基地'] },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        };

        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'EMart', 'TAMBURINS', 'Mardi Mercredi', 'ALAND'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT', '大國藥妝', '無印良品', 'Uniqlo'],
            '中國': ['盒馬鮮生', '名創優品 (MINISO)', '喜茶 HEYTEA', '霸王茶姬', '三隻松鼠'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康是美', '家樂福', '新光三越']
        };

        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品', '3C'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期六個月以上)', checked: false, category: '重要證件' },
            { id: 2, text: '簽證 / 台胞證', checked: false, category: '重要證件' },
            { id: 3, text: '機票 / 登機證 (電子或紙本)', checked: false, category: '重要證件' },
            { id: 4, text: '身分證 / 駕照', checked: false, category: '重要證件' },
            { id: 5, text: '信用卡 (確認已開通海外刷卡)', checked: false, category: '財務' },
            { id: 6, text: '外幣現金', checked: false, category: '財務' },
            { id: 7, text: '手機 & 充電線', checked: false, category: '電子產品' },
            { id: 8, text: '行動電源 (放隨身行李)', checked: false, category: '電子產品' },
            { id: 9, text: '萬用轉接頭', checked: false, category: '電子產品' },
            { id: 10, text: '換洗衣物 (依天數)', checked: false, category: '生活衣物' },
            { id: 11, text: '好走的鞋子', checked: false, category: '生活衣物' },
            { id: 12, text: '常備藥品 (腸胃、感冒、暈車藥)', checked: false, category: '其他' },
            { id: 13, text: '個人盥洗用品 / 保養品', checked: false, category: '其他' }
        ];

        // --- 全域輔助函數 ---
        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        // ==========================================
        // 全域共用元件
        // ==========================================
        const CreatableSelect = ({ label, options, value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            
            const handleSave = (e) => { 
                if(e) e.preventDefault();
                if (newValue.trim()) { 
                    onAddOption(newValue.trim()); 
                    onChange(newValue.trim()); 
                } 
                setIsAdding(false); 
                setNewValue(''); 
            };

            return (
                <div className="flex flex-col gap-1 min-w-0">
                    <label className="text-xs font-bold truncate" style={{ color: COLORS.darkText }}>
                        {isAdding ? `${label} (自訂新增)` : label}
                    </label>
                    {isAdding ? (
                        <div className="flex gap-1">
                            <input 
                                type="text" 
                                className="flex-1 p-2 rounded-lg border text-sm min-w-0 outline-none" 
                                value={newValue} 
                                onChange={(e) => setNewValue(e.target.value)} 
                                autoFocus 
                                onKeyDown={(e) => e.key === 'Enter' && handleSave(e)}
                            />
                            <button type="button" onClick={handleSave} className="w-8 h-8 shrink-0 rounded-lg text-white flex items-center justify-center" style={{ backgroundColor: COLORS.mediumBlue }}>
                                <i className="fa-solid fa-check text-xs"></i>
                            </button>
                            <button type="button" onClick={() => setIsAdding(false)} className="w-8 h-8 shrink-0 rounded-lg bg-gray-300 text-gray-700 flex items-center justify-center">
                                <i className="fa-solid fa-xmark text-xs"></i>
                            </button>
                        </div>
                    ) : (
                        <select 
                            className="w-full p-2 rounded-lg border bg-white text-sm outline-none" 
                            style={{ color: COLORS.darkText }} 
                            value={value} 
                            onChange={(e) => { 
                                if (e.target.value === '__ADD_NEW__') setIsAdding(true); 
                                else onChange(e.target.value); 
                            }}
                        >
                            <option value="" disabled>{placeholder}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                            <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeight: 'bold' }}>+ 手動輸入新選項</option>
                        </select>
                    )}
                </div>
            );
        };

        // ==========================================
        // 獨立子頁面元件
        // ==========================================

        const RenderDestination = ({ currentTrip, setCurrentTrip, destinations, setDestinations, stores, setStores, weatherData, handleCurrencyChange }) => (
            <div className="p-4 pb-24 space-y-6">
                <div className="bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                    <i className="fa-solid fa-plane-departure absolute -right-6 -bottom-6 opacity-20 text-[100px]"></i>
                    <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程</h2>
                    <div className="mt-4 grid grid-cols-2 gap-2">
                        <div>
                            <span className="text-sm opacity-90">目的地國家</span>
                            <div className="text-4xl font-black mb-1">{currentTrip.country || '尚未設定'}</div>
                            <span className="text-sm opacity-90">主要城市</span>
                            <div className="text-2xl font-bold">{currentTrip.city || '尚未設定'}</div>
                        </div>
                        {currentTrip.city && (
                            <div className="bg-white/10 p-3 rounded-xl flex flex-col justify-center items-center backdrop-blur-sm border border-white/20">
                                <span className="text-xs uppercase tracking-wider opacity-80">即時天氣狀態</span>
                                <i className={`fa-solid ${weatherData.icon || 'fa-cloud'} text-3xl my-2`}></i>
                                <div className="text-2xl font-bold">{weatherData.temp}</div>
                                <span className="text-xs opacity-90 text-center line-clamp-1">{weatherData.text}</span>
                            </div>
                        )}
                    </div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                        <i className="fa-solid fa-location-dot text-[18px]" style={{color: COLORS.mediumBlue}}></i> 設定目的地
                    </h3>
                    <p className="text-xs text-gray-500 mb-4">設定後將自動載入即時天氣與匯率</p>
                    <CreatableSelect label="旅遊國家" options={Object.keys(destinations)} value={currentTrip.country} onChange={(v) => { setCurrentTrip({country: v, city: ''}); const c = CURRENCIES.find(x => ['KRW','JPY','USD','THB','TWD','CNY'].includes(x.code) && (v==='韓國'&&x.code==='KRW' || v==='日本'&&x.code==='JPY' || v==='美國'&&x.code==='USD' || v==='泰國'&&x.code==='THB' || v==='台灣'&&x.code==='TWD' || v==='中國'&&x.code==='CNY')); if(c) handleCurrencyChange(c.code); }} onAddOption={(newOpt) => { setDestinations({...destinations, [newOpt]: {}}); setStores({...stores, [newOpt]: []}); }} placeholder="選擇國家..." />
                    <div className={`mt-3 ${!currentTrip.country ? 'opacity-50 pointer-events-none' : ''}`}>
                        <CreatableSelect label="地區 / 城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} placeholder={currentTrip.country ? "選擇城市..." : "請先選擇國家"} />
                    </div>
                </div>
            </div>
        );

        const RenderItinerary = ({ itinerary, setItinerary, uniqueDays, showToast }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [newItem, setNewItem] = useState({ day: uniqueDays[0] || 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '', image: null, notes: '' });
            const [editingId, setEditingId] = useState(null);
            const [editItem, setEditItem] = useState(null);

            const handleItineraryImageUpload = (e, isEdit = false) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imageData = event.target?.result;
                        if (isEdit) { setEditItem({...editItem, image: imageData}); } 
                        else { setNewItem({...newItem, image: imageData}); }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAdd = () => {
                if (!newItem.title) return;
                setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setNewItem({ day: newItem.day, time: '', title: '', address: '', transport: '', mapUrl: '', image: null, notes: '' });
                setShowAddForm(false); showToast("新增行程成功！");
            };

            const handleSaveEdit = () => {
                if (!editItem.title) return;
                setItinerary(itinerary.map(i => i.id === editingId ? editItem : i).sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setEditingId(null); setEditItem(null); showToast("修改完成！");
            };

            const groupedItinerary = useMemo(() => {
                return itinerary.reduce((acc, curr) => {
                    (acc[curr.day] = acc[curr.day] || []).push(curr);
                    return acc;
                }, {});
            }, [itinerary]);

            return (
                <div className="p-4 pb-24">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>我的行程規劃</h2>
                        <button onClick={() => { setShowAddForm(!showAddForm); setEditingId(null); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                            {showAddForm ? '取消新增' : <><i className="fa-solid fa-plus text-[14px]"></i> 新增行程</>}
                        </button>
                    </div>
                    {showAddForm && (
                        <div className="p-4 mb-6 rounded-lg shadow-sm bg-white border" style={{ border: `1px solid ${COLORS.lightBlue}` }}>
                            <h3 className="font-bold mb-3 text-sm">新增行程節點</h3>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <input type="text" placeholder="天數 (例: Day 1)" className="p-2 border rounded-lg text-sm" value={newItem.day} onChange={e => setNewItem({...newItem, day: e.target.value})} />
                                <input type="time" className="p-2 border rounded-lg text-sm" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                            </div>
                            <input type="text" placeholder="行程標題 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                            <input type="text" placeholder="詳細地址 (選填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.address} onChange={e => setNewItem({...newItem, address: e.target.value})} />
                            <input type="text" placeholder="自訂地圖網址" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.mapUrl} onChange={e => setNewItem({...newItem, mapUrl: e.target.value})} />
                            <input type="text" placeholder="交通方式" className="w-full p-2 border rounded-lg text-sm mb-3" value={newItem.transport} onChange={e => setNewItem({...newItem, transport: e.target.value})} />
                            
                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-100 space-y-3 mb-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">行程備註</label>
                                    <textarea placeholder="點此輸入備註內容..." className="w-full p-2 border rounded-lg text-sm resize-none bg-white" rows="2" value={newItem.notes} onChange={e => setNewItem({...newItem, notes: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">行程照片</label>
                                    <div className="flex items-center gap-3">
                                        <label className="flex-1 flex items-center justify-center gap-2 p-2 border-2 border-dashed rounded-lg text-xs font-bold text-gray-400 cursor-pointer hover:bg-white hover:text-blue-500 hover:border-blue-200 transition-all">
                                            <i className="fa-solid fa-camera text-sm"></i> {newItem.image ? '更換照片' : '點此上傳照片'}
                                            <input type="file" accept="image/*" onChange={(e) => handleItineraryImageUpload(e, false)} className="hidden" />
                                        </label>
                                        {newItem.image && (
                                            <div className="relative group">
                                                <img src={newItem.image} className="w-12 h-12 object-cover rounded-lg border shadow-sm" alt="preview" />
                                                <button onClick={() => setNewItem({...newItem, image: null})} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-xmark"></i></button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            <button onClick={handleAdd} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>儲存行程</button>
                        </div>
                    )}
                    
                    <div className="space-y-6">
                        {Object.keys(groupedItinerary).sort().map(day => (
                            <div key={day}>
                                <h3 className="font-bold text-lg mb-3 flex items-center gap-2" style={{ color: COLORS.mediumBlue }}>📅 {day}</h3>
                                <div className="space-y-4">
                                    {groupedItinerary[day].map((item) => (
                                        <div key={item.id} className="p-4 rounded-xl shadow-sm bg-white border-l-4" style={{ borderColor: COLORS.mediumBlue }}>
                                            {editingId === item.id ? (
                                                <div className="flex flex-col gap-2">
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <input type="text" className="p-2 border rounded-lg text-sm" value={editItem.day} onChange={e => setEditItem({...editItem, day: e.target.value})} />
                                                        <input type="time" className="p-2 border rounded-lg text-sm" value={editItem.time} onChange={e => setEditItem({...editItem, time: e.target.value})} />
                                                    </div>
                                                    <input type="text" placeholder="標題" className="w-full p-2 border rounded-lg text-sm" value={editItem.title} onChange={e => setEditItem({...editItem, title: e.target.value})} />
                                                    <input type="text" placeholder="地址" className="w-full p-2 border rounded-lg text-sm" value={editItem.address} onChange={e => setEditItem({...editItem, address: e.target.value})} />
                                                    <input type="text" placeholder="交通" className="w-full p-2 border rounded-lg text-sm mb-3" value={editItem.transport} onChange={e => setEditItem({...editItem, transport: e.target.value})} />
                                                    
                                                    <div className="bg-gray-50 p-3 rounded-xl border border-gray-100 space-y-3 mb-3">
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">行程備註</label>
                                                            <textarea placeholder="點此輸入備註內容..." className="w-full p-2 border rounded-lg text-sm resize-none bg-white" rows="2" value={editItem.notes || ''} onChange={e => setEditItem({...editItem, notes: e.target.value})} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">行程照片</label>
                                                            <div className="flex items-center gap-3">
                                                                <label className="flex-1 flex items-center justify-center gap-2 p-2 border-2 border-dashed rounded-lg text-xs font-bold text-gray-400 cursor-pointer hover:bg-white hover:text-blue-500 hover:border-blue-200 transition-all">
                                                                    <i className="fa-solid fa-camera text-sm"></i> {editItem.image ? '更換照片' : '點此上傳照片'}
                                                                    <input type="file" accept="image/*" onChange={(e) => handleItineraryImageUpload(e, true)} className="hidden" />
                                                                </label>
                                                                {editItem.image && (
                                                                    <div className="relative group">
                                                                        <img src={editItem.image} className="w-12 h-12 object-cover rounded-lg border shadow-sm" alt="preview" />
                                                                        <button onClick={() => setEditItem({...editItem, image: null})} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-xmark"></i></button>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 mt-2">
                                                        <button onClick={handleSaveEdit} className="flex-1 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>儲存</button>

                                                                </div>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {item.transport && (
                                                        <div className="mt-2 flex items-start gap-2 text-xs text-gray-600">
                                                            <i className="fa-solid fa-location-arrow mt-0.5" style={{ color: COLORS.lightBlue }}></i>
                                                            <p>{item.transport}</p>
                                                        </div>
                                                    )}
                                                    {item.image && (
                                                        <div className="mt-3">
                                                            <img src={item.image} className="w-full h-40 object-cover rounded-lg border shadow-sm" alt="itinerary" />
                                                        </div>
                                                    )}
                                                    {item.notes && (
                                                        <div className="mt-2 p-2 bg-yellow-50 rounded-lg border border-yellow-200">
                                                            <p className="text-xs text-gray-700"><span className="font-bold text-yellow-700">📝 備註：</span> {item.notes}</p>
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                        {itinerary.length === 0 && <p className="text-center text-gray-500 mt-10 text-xs">尚無行程，從上方新增吧！</p>}
                    </div>
                </div>
            );
        };

        const RenderMustGo = ({
            currentTrip, currency, stores, setStores, mustEats, setMustEats, mustBuys, setMustBuys,
            shoppingList, setShoppingList, foodTypes, setFoodTypes, itemTypes, setItemTypes,
            showToast, mustGoType, setMustGoType, setAddToItinModal
        }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingMustGoId, setEditingMustGoId] = useState(null);
            const [eatForm, setEatForm] = useState({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: currency.code, image: '' });
            
            // 💡 1. 必買清單的 state 新增了 date 欄位
            const [buyForm, setBuyForm] = useState({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: currency.code, image: '', date: '' });

            const handleImageUpload = (e, formType) => {
                const file = e.target.files[0];
                if (!file) return;
                compressImage(file, (base64Img) => {
                    if (formType === 'eat') setEatForm({ ...eatForm, image: base64Img });
                    else setBuyForm({ ...buyForm, image: base64Img });
                });
            };

            const handleAddEat = () => {
                if (!eatForm.name) return;
                if (editingMustGoId) {
                    setMustEats(mustEats.map(e => e.id === editingMustGoId ? { ...eatForm, id: e.id } : e));
                    setEditingMustGoId(null);
                    showToast("美食資訊已更新！");
                } else {
                    setMustEats([...mustEats, { ...eatForm, id: Date.now() }]);
                    showToast("新增美食成功！");
                }
                setEatForm({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: currency.code, image: '' });
                setShowForm(false);
            };

            const handleAddBuy = () => {
                if (!buyForm.notes) return;
                if (editingMustGoId) {
                    setMustBuys(mustBuys.map(b => b.id === editingMustGoId ? { ...buyForm, id: b.id } : b));
                    setEditingMustGoId(null);
                    showToast("商品資訊已更新！");
                } else {
                    setMustBuys([...mustBuys, { ...buyForm, id: Date.now() }]);
                    showToast("新增商品成功！");
                }
                // 💡 2. 儲存後一併清空 date 欄位
                setBuyForm({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: currency.code, image: '', date: '' });
                setShowForm(false);
            };

            const handleEditMustGo = (item, type) => {
                setMustGoType(type);
                setEditingMustGoId(item.id);
                if (type === 'eat') setEatForm({ ...item });
                else setBuyForm({ ...item });
                setShowForm(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAddToCart = (item) => {
                const newItem = {
                    id: Date.now(),
                    text: item.notes || item.name,
                    cost: Number(item.cost) || 0,
                    qty: 1,
                    checked: false,
                    image: item.image || null,
                    notes: '',
                    // 💡 3. 加入購物車時自動把設定好的日期帶過去
                    date: item.date || '' 
                };
                setShoppingList([...shoppingList, newItem]);
                showToast("已加入購物車清單！");
            };

            return (
                <div className="p-4 pb-24">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex bg-white rounded-lg p-0.5 shadow-sm border">
                            <button className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${mustGoType === 'eat' ? 'text-white' : 'text-gray-500'}`} style={{ backgroundColor: mustGoType === 'eat' ? COLORS.mediumBlue : 'transparent' }} onClick={() => { setMustGoType('eat'); setShowForm(false); }}>口袋美食</button>
                            <button className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${mustGoType === 'buy' ? 'text-white' : 'text-gray-500'}`} style={{ backgroundColor: mustGoType === 'buy' ? COLORS.mediumBlue : 'transparent' }} onClick={() => { setMustGoType('buy'); setShowForm(false); }}>必買清單</button>
                        </div>
                        <button onClick={() => setShowForm(!showForm)} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                            {showForm ? '取消' : <><i className="fa-solid fa-plus text-[14px]"></i> 新增</>}
                        </button>
                    </div>

                    {showForm && mustGoType === 'eat' && (
                        <div className="p-4 mb-5 rounded-lg bg-white border shadow-sm">
                            <h3 className="font-bold text-xs mb-3">新增美食店家</h3>
                            <input type="text" placeholder="店名 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2 outline-none min-w-0" value={eatForm.name} onChange={e => setEatForm({...eatForm, name: e.target.value})} />
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <CreatableSelect label="美食分類" options={foodTypes} value={eatForm.type} onChange={v => setEatForm({...eatForm, type: v})} onAddOption={n => setFoodTypes([...foodTypes, n])} placeholder="選擇分類" />
                                
                                <div className="flex flex-col gap-1 w-full min-w-0">
                                    <label className="text-xs font-bold text-gray-700">預估費用</label>
                                    <div className="flex gap-2 w-full min-w-0">
                                        <select className="w-20 p-2 border rounded-lg text-xs bg-white shrink-0 outline-none" value={eatForm.currency} onChange={e => setEatForm({...eatForm, currency: e.target.value})}>
                                            {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                        </select>
                                        <input type="number" placeholder="金額" className="flex-1 p-2 border rounded-lg text-sm bg-white min-w-0 outline-none" value={eatForm.cost} onChange={e => setEatForm({...eatForm, cost: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex flex-col gap-1 w-full min-w-0 mb-3">
                                <label className="text-xs font-bold text-gray-700">地圖或介紹網址 (選填)</label>
                                <input type="text" placeholder="網址" className="w-full p-2 border rounded-lg text-sm outline-none min-w-0" value={eatForm.url} onChange={e => setEatForm({...eatForm, url: e.target.value})} />
                            </div>

                            <div className="mb-3 w-full min-w-0">
                                <label className="block text-xs font-bold mb-1">上傳實拍/截圖</label>
                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'eat')} className="text-xs text-gray-500 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 min-w-0" />
                                {eatForm.image && <img src={eatForm.image} className="mt-2 h-20 w-20 object-cover rounded-lg border" alt="preview" />}
                            </div>
                            <button onClick={handleAddEat} className="w-full py-2 rounded-lg text-white font-bold text-sm shadow-sm transition-all active:scale-95" style={{ backgroundColor: COLORS.mediumBlue }}>儲存美食</button>
                        </div>
                    )}

                    {showForm && mustGoType === 'buy' && (
                        <div className="p-4 mb-5 rounded-lg bg-white border shadow-sm">
                            <h3 className="font-bold text-xs mb-3">新增必買項目</h3>
                            
                            <input type="text" placeholder="商品名稱/備註 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2 outline-none min-w-0" value={buyForm.notes} onChange={e => setBuyForm({...buyForm, notes: e.target.value})} />
                            
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <CreatableSelect label="購買店家" options={stores[currentTrip.country] || []} value={buyForm.store} onChange={v => setBuyForm({...buyForm, store: v})} onAddOption={n => setStores({...stores, [currentTrip.country]: [...(stores[currentTrip.country]||[]), n]})} placeholder="選擇商店" />
                                <CreatableSelect label="品項分類" options={itemTypes} value={buyForm.type} onChange={v => setBuyForm({...buyForm, type: v})} onAddOption={n => setItemTypes([...itemTypes, n])} placeholder="選擇分類" />
                            </div>

                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div className="flex flex-col gap-1 w-full min-w-0">
                                    <label className="text-xs font-bold text-gray-700">預估費用</label>
                                    <div className="flex gap-2 w-full min-w-0">
                                        <select className="w-20 p-2 border rounded-lg text-xs bg-white shrink-0 outline-none" value={buyForm.currency} onChange={e => setBuyForm({...buyForm, currency: e.target.value})}>
                                            {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                        </select>
                                        <input type="number" placeholder="金額" className="flex-1 p-2 border rounded-lg text-sm bg-white min-w-0 outline-none" value={buyForm.cost} onChange={e => setBuyForm({...buyForm, cost: e.target.value})} />
                                    </div>
                                </div>
                                
                                <div className="flex flex-col gap-1 w-full min-w-0">
                                    <label className="text-xs font-bold text-gray-700">參考連結</label>
                                    <input type="text" placeholder="網址" className="w-full p-2 border rounded-lg text-sm bg-white outline-none min-w-0" value={buyForm.url} onChange={e => setBuyForm({...buyForm, url: e.target.value})} />
                                </div>
                            </div>
                            
                            {/* 💡 4. 新增的日期輸入欄位 */}
                            <div className="flex flex-col gap-1 w-full min-w-0 mb-3">
                                <label className="text-xs font-bold text-gray-700">預定購買日期 (選填)</label>
                                <input type="date" className="w-full p-2 border rounded-lg text-sm bg-white outline-none min-w-0 text-gray-600" value={buyForm.date || ''} onChange={e => setBuyForm({...buyForm, date: e.target.value})} />
                            </div>

                            <div className="mb-3 w-full min-w-0">
                                <label className="block text-xs font-bold mb-1">上傳商品截圖</label>
                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'buy')} className="text-xs text-gray-500 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 min-w-0" />
                                {buyForm.image && <img src={buyForm.image} className="mt-2 h-20 w-20 object-cover rounded-lg border" alt="preview" />}
                            </div>
                            <button onClick={handleAddBuy} className="w-full py-2 rounded-lg text-white font-bold text-sm shadow-sm transition-all active:scale-95" style={{ backgroundColor: COLORS.mediumBlue }}>儲存購物項目</button>
                        </div>
                    )}

                    {mustGoType === 'eat' ? (
                        <div className="grid grid-cols-2 gap-3">
                            {mustEats.map(item => (
                                <div key={item.id} className="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col justify-between animate-slide">
                                    <div>
                                        {item.image ? <img src={item.image} className="w-full h-32 object-cover" alt="" /> : <div className="w-full h-24 bg-gray-100 flex items-center justify-center text-gray-400"><i className="fa-solid fa-utensils text-2xl"></i></div>}
                                        <div className="p-3">
                                            <span className="text-[10px] px-2 py-0.5 rounded-full font-bold text-white" style={{ backgroundColor: COLORS.lightBlue }}>{item.type || '未分類'}</span>
                                            <h4 className="font-bold text-sm mt-1 text-gray-800 line-clamp-1">{item.name}</h4>
                                            {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                        </div>
                                    </div>
                                    <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                        <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-emerald-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-calendar-plus"></i> 排行程</button>
                                        <button onClick={() => handleEditMustGo(item, 'eat')} className="p-1 text-xs bg-indigo-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-pen"></i></button>
                                        {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-map-location-dot"></i></a>}
                                        <button onClick={() => setMustEats(mustEats.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                            {mustEats.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無口袋美食資訊。</p>}
                        </div>
                    ) : (
                        <div className="grid grid-cols-2 gap-3">
                            {mustBuys.map(item => (
                                <div key={item.id} className="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col justify-between animate-slide">
                                    <div>
                                        {item.image ? <img src={item.image} className="w-full h-32 object-cover" alt="" /> : <div className="w-full h-24 bg-gray-100 flex items-center justify-center text-gray-400"><i className="fa-solid fa-bag-shopping text-2xl"></i></div>}
                                        <div className="p-3">
                                            {/* 💡 5. 在標籤區塊加上日期的顯示 (若有設定的話) */}
                                            <div className="flex gap-1 flex-wrap">
                                                <span className="text-[9px] px-1.5 py-0.5 rounded-full bg-slate-500 text-white">{item.store || '不限店家'}</span>
                                                <span className="text-[9px] px-1.5 py-0.5 rounded-full bg-indigo-500 text-white">{item.type || '未分類'}</span>
                                                {item.date && <span className="text-[9px] px-1.5 py-0.5 rounded-full bg-teal-500 text-white shadow-sm"><i className="fa-regular fa-calendar mr-1"></i>{item.date}</span>}
                                            </div>
                                            <h4 className="font-bold text-sm mt-1.5 text-gray-800 line-clamp-2">{item.notes}</h4>
                                            {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                        </div>
                                    </div>
                                    <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                        <button onClick={() => handleAddToCart(item)} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-orange-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-cart-plus"></i> 購物車</button>
                                        <button onClick={() => handleEditMustGo(item, 'buy')} className="p-1 text-xs bg-indigo-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-pen"></i></button>
                                        {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-link"></i></a>}
                                        <button onClick={() => setMustBuys(mustBuys.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                            {mustBuys.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無必買商品資訊。</p>}
                        </div>
                    )}
                </div>
            );
        };

        const RenderShoppingList = ({ shoppingList, setShoppingList, currency, exchangeRate, showToast, handleCurrencyChange }) => {
            const [itemText, setItemText] = useState('');
            const [itemCost, setItemCost] = useState('');
            const [itemQty, setItemQty] = useState('1');
            const [itemImage, setItemImage] = useState(null);
            const [itemNotes, setItemNotes] = useState('');
            const [itemDate, setItemDate] = useState(''); 
            const [editingId, setEditingId] = useState(null);

            const handleAddItem = () => {
                if (!itemText || !itemCost) return;
                if (editingId) {
                    setShoppingList(shoppingList.map(item => item.id === editingId ? { ...item, text: itemText, cost: Number(itemCost), qty: Number(itemQty), image: itemImage, notes: itemNotes, date: itemDate } : item));
                    setEditingId(null);
                    showToast("商品已更新！");
                } else {
                    setShoppingList([...shoppingList, { id: Date.now(), text: itemText, cost: Number(itemCost), qty: Number(itemQty), checked: false, image: itemImage, notes: itemNotes, date: itemDate }]);
                    showToast("商品已加入試算清單！");
                }
                setItemText(''); setItemCost(''); setItemQty('1'); setItemImage(null); setItemNotes(''); setItemDate('');
            };

            const handleEdit = (item) => {
                setEditingId(item.id);
                setItemText(item.text);
                setItemCost(item.cost.toString());
                setItemQty(item.qty.toString());
                setItemImage(item.image || null);
                setItemNotes(item.notes || '');
                setItemDate(item.date || ''); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setItemText('');
                setItemCost('');
                setItemQty('1');
                setItemImage(null);
                setItemNotes('');
                setItemDate(''); 
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) compressImage(file, (base64) => setItemImage(base64));
            };

            const toggleCheck = (id) => setShoppingList(shoppingList.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
            const deleteItem = (id) => {
                if (editingId === id) cancelEdit();
                setShoppingList(shoppingList.filter(item => item.id !== id));
            };

            const totals = useMemo(() => {
                let foreignTotal = 0;
                shoppingList.forEach(item => { if (item.checked) foreignTotal += (item.cost * item.qty); });
                const twdTotal = getTwdEquivalent(foreignTotal, currency.code, exchangeRate);
                return { foreign: foreignTotal, twd: twdTotal };
            }, [shoppingList, currency, exchangeRate]);

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-xl font-bold mb-2" style={{ color: COLORS.darkText }}>購物車</h2>
                    <p className="text-xs text-gray-500 mb-4">勾選已放入購物車的品項，即刻換算為台幣總額！</p>
                    
                    <div className="bg-white p-4 rounded-xl border shadow-sm mb-4">
                        <div className="flex justify-between items-center mb-3 pb-3 border-b">
                            <span className="text-xs font-bold text-gray-600">購物幣別</span>
                            <select className="bg-gray-50 text-xs font-bold px-2 py-1 rounded border outline-none" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                            </select>
                        </div>
                        <div className="space-y-2 mb-3">
                            <input type="text" placeholder="商品名稱..." className="w-full p-2 border rounded-lg text-sm bg-white" value={itemText} onChange={e => setItemText(e.target.value)} />
                            
                            <div className="flex gap-2">
                                <input type="number" placeholder={`金額 (${currency.code})`} className="w-1/3 p-2 border rounded-lg text-sm bg-white" value={itemCost} onChange={e => setItemCost(e.target.value)} />
                                <input type="number" placeholder="數量" className="w-1/4 p-2 border rounded-lg text-sm bg-white" value={itemQty} onChange={e => setItemQty(e.target.value)} />
                                <input type="date" className="flex-1 p-2 border rounded-lg text-sm bg-white text-gray-600 outline-none" value={itemDate} onChange={e => setItemDate(e.target.value)} />
                            </div>

                            <textarea placeholder="備註 (選填)" className="w-full p-2 border rounded-lg text-sm bg-white resize-none" rows="2" value={itemNotes} onChange={e => setItemNotes(e.target.value)} />
                            <div className="flex items-center gap-2">
                                <label className="flex-1 flex items-center justify-center gap-2 p-2 border-2 border-dashed rounded-lg text-xs font-bold text-gray-400 cursor-pointer hover:bg-gray-50">
                                    <i className="fa-solid fa-camera"></i> {itemImage ? '更換圖片' : '上傳商品圖片'}
                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                </label>
                                {itemImage && (
                                    <div className="relative">
                                        <img src={itemImage} className="w-10 h-10 object-cover rounded-lg border" alt="preview" />
                                        <button onClick={() => setItemImage(null)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px]"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleAddItem} className="flex-1 py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                                {editingId ? '儲存修改' : '加入清單'}
                            </button>
                            {editingId && (
                                <button onClick={cancelEdit} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-sm">取消</button>
                            )}
                        </div>
                    </div>

                    <div className="text-white rounded-xl p-4 shadow-md mb-4 border" style={{ backgroundColor: '#23354D', borderColor: '#23354D' }}>
                        <div className="flex justify-between items-center">
                            <div>
                                <span className="text-xs block font-bold text-white/80 mb-1">已選購商品</span>
                                <span className="text-sm text-white/60">{shoppingList.filter(i => i.checked).length} 件</span>
                            </div>
                            <div className="text-right">
                                <span className="text-xs block font-bold text-white/80 mb-1">預估總計 (NT$)</span>
                                <span className="text-2xl font-black text-white">NT$ {totals.twd?.toLocaleString() || 0}</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl border shadow-sm divide-y">
                        {shoppingList.map(item => (
                            <div key={item.id} className="p-3 flex items-center justify-between gap-2 hover:bg-gray-50/50 transition-colors">
                                <div className="flex items-center gap-3 flex-1">
                                    <input type="checkbox" checked={item.checked} onChange={() => toggleCheck(item.id)} className="w-4.5 h-4.5 rounded text-blue-600 focus:ring-0 border-gray-300" />
                                    {item.image && <img src={item.image} className="w-12 h-12 object-cover rounded-lg border shadow-sm" alt="" />}
                                    <div className={item.checked ? "line-through text-gray-400 text-sm" : "text-sm text-gray-800"}>
                                        <div className="flex items-center gap-2">
                                            <p className="font-bold">{item.text}</p>
                                            {item.date && <span className="text-[9px] bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded font-bold"><i className="fa-regular fa-calendar mr-1"></i>{item.date}</span>}
                                        </div>
                                        <p className="text-xs text-gray-500">{currency.symbol}{item.cost} × {item.qty}件 → 折合約 NT$ {getTwdEquivalent(item.cost * item.qty, currency.code, exchangeRate).toLocaleString()}</p>
                                        {item.notes && <p className="text-[11px] text-blue-500 mt-1 italic font-medium">📄 {item.notes}</p>}
                                    </div>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => handleEdit(item)} className="text-gray-200 hover:text-blue-500 transition-colors p-1"><i className="fa-solid fa-pen text-xs"></i></button>
                                    <button onClick={() => deleteItem(item.id)} className="text-gray-200 hover:text-red-500 transition-colors p-1"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                </div>
                            </div>
                        ))}
                        {shoppingList.length === 0 && <p className="text-center text-gray-300 py-12 text-xs italic">購物車內尚無品項。</p>}
                    </div>
                </div>
            );
        };

        const RenderSplitBill = ({ splitMembers, setSplitMembers, splitExpenses, setSplitExpenses, currency, exchangeRate, showToast }) => {
            const [editingExpenseId, setEditingExpenseId] = useState(null);
            const [newMember, setNewMember] = useState('');
            const [title, setTitle] = useState('');
            const [amount, setAmount] = useState('');
            const [expenseDate, setExpenseDate] = useState(''); 
            const [paidBy, setPaidBy] = useState(splitMembers[0] || '');
            const [selectedCurrency, setSelectedCurrency] = useState('TWD');
            const [customRate, setCustomRate] = useState('');
            const [isCustomRate, setIsCustomRate] = useState(false);
            const [shares, setShares] = useState({});

            useEffect(() => {
                if (splitMembers.length > 0 && !paidBy) setPaidBy(splitMembers[0]);
                const initShares = {};
                splitMembers.forEach(m => { initShares[m] = true; });
                setShares(initShares);
            }, [splitMembers]);

            useEffect(() => {
                if (selectedCurrency === 'TWD') { setCustomRate('1'); }
                else if (selectedCurrency === currency.code) { setCustomRate(exchangeRate.toString()); }
                else {
                    const target = CURRENCIES.find(c => c.code === selectedCurrency);
                    setCustomRate(target ? target.defaultRate.toString() : '1');
                }
            }, [selectedCurrency, currency, exchangeRate]);

            const handleAddMember = () => {
                if (!newMember.trim() || splitMembers.includes(newMember.trim())) return;
                setSplitMembers([...splitMembers, newMember.trim()]); setNewMember('');
                showToast("成功加入分帳成員！");
            };

            const handleAddExpense = () => {
                if (!title || !amount || isNaN(amount)) return;
                const finalRate = Number(customRate) || 1;
                const twdAmount = selectedCurrency === 'TWD' ? Math.ceil(Number(amount)) : Math.ceil(Number(amount) / finalRate);
                const involvedMembers = Object.keys(shares).filter(m => shares[m]);
                if (involvedMembers.length === 0) { alert("請至少選擇一位幫忙分攤的成員！"); return; }

                if (editingExpenseId) {
                    setSplitExpenses(splitExpenses.map(exp => exp.id === editingExpenseId ? {
                        ...exp, title, amount: Number(amount), date: expenseDate, currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                    } : exp));
                    setEditingExpenseId(null);
                    showToast("記帳項目修改成功！");
                } else {
                    setSplitExpenses([...splitExpenses, {
                        id: Date.now(), title, amount: Number(amount), date: expenseDate, currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                    }]);
                    showToast("成功記錄一筆手動花費！");
                }

                setTitle(''); setAmount(''); setExpenseDate('');
                const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                setIsCustomRate(false);
            };

            const handleEditExpense = (exp) => {
                setEditingExpenseId(exp.id);
                setTitle(exp.title);
                setAmount(exp.amount.toString());
                setExpenseDate(exp.date || '');
                setPaidBy(exp.paidBy);
                setSelectedCurrency(exp.currencyCode);
                setCustomRate(exp.rate.toString());
                setIsCustomRate(true);
                
                const editShares = {};
                splitMembers.forEach(m => {
                    editShares[m] = exp.mInvolved.includes(m);
                });
                setShares(editShares);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingExpenseId(null);
                setTitle(''); setAmount(''); setExpenseDate('');
                const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                setIsCustomRate(false);
            };

            const splitResults = useMemo(() => {
                const balances = {};
                let totalTwd = 0;
                splitMembers.forEach(m => { balances[m] = 0; });
                
                splitExpenses.forEach(exp => {
                    totalTwd += exp.twdAmount;
                    balances[exp.paidBy] += exp.twdAmount;
                    const perShare = exp.twdAmount / exp.mInvolved.length;
                    exp.mInvolved.forEach(m => { balances[m] -= perShare; });
                });

                const averagePerPerson = splitMembers.length > 0 ? Math.ceil(totalTwd / splitMembers.length) : 0;

                const creditors = []; const debtors = [];
                Object.keys(balances).forEach(m => {
                    if (balances[m] > 0.1) creditors.push({ name: m, amt: balances[m] });
                    else if (balances[m] < -0.1) debtors.push({ name: m, amt: Math.abs(balances[m]) });
                });

                const payments = []; let cIdx = 0; let dIdx = 0;
                while (cIdx < creditors.length && dIdx < debtors.length) {
                    const c = creditors[cIdx]; const d = debtors[dIdx];
                    const transfer = Math.min(c.amt, d.amt);
                    payments.push({ from: d.name, to: c.name, amount: Math.ceil(transfer) });
                    c.amt -= transfer; d.amt -= transfer;
                    if (c.amt <= 0.1) cIdx++; if (d.amt <= 0.1) dIdx++;
                }

                return { totalTwd, averagePerPerson, payments };
            }, [splitExpenses, splitMembers]);

            return (
                <div className="p-4 pb-24 space-y-4">
                    <div className="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5"><i className="fa-solid fa-users text-blue-500"></i> 分帳成員管理</h3>
                        <div className="flex flex-wrap gap-2 mb-3">
                            {splitMembers.map(m => (
                                <span key={m} className="text-xs bg-slate-100 font-medium px-2.5 py-1 rounded-lg text-gray-700 flex items-center gap-1">
                                    {m} {splitMembers.length > 1 && <i className="fa-solid fa-circle-xmark text-gray-400 cursor-pointer hover:text-red-500" onClick={() => setSplitMembers(splitMembers.filter(x => x !== m))}></i>}
                                </span>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <input type="text" placeholder="新成員名字..." className="flex-1 p-2 border rounded-lg text-sm" value={newMember} onChange={e => setNewMember(e.target.value)} />
                            <button onClick={handleAddMember} className="px-4 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>+ 新增</button>
                        </div>
                    </div>

                    <div className="rounded-xl border shadow-md overflow-hidden grid grid-cols-2 text-center" style={{ backgroundColor: '#23354D' }}>
                        <div className="p-4 border-r border-white/20">
                            <span className="text-xs block text-white font-bold mb-1">目前總花費計</span>
                            <span className="text-2xl font-black text-white">NT$ {splitResults.totalTwd.toLocaleString()}</span>
                        </div>
                        <div className="p-4" style={{ backgroundColor: '#8BA3C5' }}>
                            <span className="text-xs block text-white font-bold mb-1">每人平均應付</span>
                            <span className="text-2xl font-black text-white">NT$ {splitResults.averagePerPerson.toLocaleString()}</span>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl border shadow-sm">
                        <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5">
                            <i className="fa-solid fa-file-invoice-dollar text-indigo-500"></i> 
                            {editingExpenseId ? '編輯手動記帳項目' : '手動分帳記帳'}
                        </h3>
                        <div className="grid grid-cols-3 gap-2 mb-2">
                            <input type="text" placeholder="消費項目內容..." className="col-span-2 p-2 border rounded-lg text-sm" value={title} onChange={e => setTitle(e.target.value)} />
                            <select className="p-2 border rounded-lg bg-white text-sm" value={selectedCurrency} onChange={e => setSelectedCurrency(e.target.value)}>
                                {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                            </select>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-2 mb-2">
                            <input type="number" placeholder="消費金額..." className="p-2 border rounded-lg text-sm" value={amount} onChange={e => setAmount(e.target.value)} />
                            <input type="date" className="p-2 border rounded-lg text-sm bg-white text-gray-600" value={expenseDate} onChange={e => setExpenseDate(e.target.value)} />
                        </div>
                        <div className="flex items-center gap-2 mb-2">
                            <span className="text-xs text-gray-500 font-bold whitespace-nowrap">付款人:</span>
                            <select className="w-full p-2 border rounded-lg bg-white text-sm" value={paidBy} onChange={e => setPaidBy(e.target.value)}>
                                {splitMembers.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        </div>

                        <div className="mb-3 p-2 bg-slate-50 rounded-lg border border-dashed">
                            <div className="flex justify-between items-center mb-1.5">
                                <span className="text-xs font-bold text-gray-600">更動自訂換算匯率 (1 TWD 等於多少外幣)</span>
                                <input type="checkbox" checked={isCustomRate} onChange={e => setIsCustomRate(e.target.checked)} className="w-3.5 h-3.5 rounded" />
                            </div>
                            <input type="number" step="0.0001" className="w-full p-1.5 border rounded bg-white text-xs" value={customRate} onChange={e => setCustomRate(e.target.value)} disabled={!isCustomRate} />
                        </div>

                        <div className="mb-4">
                            <span className="text-xs font-bold block mb-1.5 text-gray-600">誰要分攤 (可複選):</span>
                            <div className="flex flex-wrap gap-3 p-2 rounded-lg bg-gray-50 border">
                                {splitMembers.map(m => (
                                    <label key={m} className="flex items-center gap-1.5 text-xs font-medium cursor-pointer text-gray-700">
                                        <input type="checkbox" checked={!!shares[m]} onChange={e => setShares({...shares, [m]: e.target.checked})} className="w-4 h-4 text-blue-600 rounded focus:ring-0 border-gray-300" />
                                        {m}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="flex gap-2">
                            <button onClick={handleAddExpense} className="flex-1 py-2 rounded-lg text-white font-bold text-sm shadow-sm transition-all" style={{ backgroundColor: COLORS.mediumBlue }}>
                                {editingExpenseId ? '儲存修改' : '送出記帳'}
                            </button>
                            {editingExpenseId && (
                                <button onClick={handleCancelEdit} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-sm shadow-sm">
                                    取消
                                </button>
                            )}
                        </div>
                    </div>

                    {splitResults.payments.length > 0 && (
                        <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-xl shadow-sm">
                            <h3 className="font-bold text-emerald-800 text-sm mb-2 flex items-center gap-1.5"><i className="fa-solid fa-comments-dollar"></i> 清算最佳化建議路徑</h3>
                            <div className="space-y-1">
                                {splitResults.payments.map((p, idx) => (
                                    <div key={idx} className="text-xs text-emerald-900 font-medium bg-white/60 p-2 rounded-md flex justify-between">
                                        <span>👉 <strong>{p.from}</strong> 應支付給 <strong>{p.to}</strong></span>
                                        <span className="font-bold text-orange-600">NT$ {p.amount.toLocaleString()}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-xl border shadow-sm divide-y">
                        <div className="p-3 bg-gray-50 rounded-t-xl"><span className="text-xs font-bold text-gray-600">已完成的手動記帳項目設定</span></div>
                        {splitExpenses.map(exp => (
                            <div key={exp.id} className="p-3.5 flex justify-between items-center gap-2">
                                <div className="text-xs text-gray-600 flex-1">
                                    <p className="font-bold text-sm text-gray-800 mb-0.5">{exp.title}</p>
                                    <p>
                                        {exp.date && <span className="mr-2 text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded"><i className="fa-regular fa-calendar"></i> {exp.date}</span>}
                                        付款人: <strong className="text-slate-700">{exp.paidBy}</strong> ｜ 原幣別: {exp.amount} ({exp.currencyCode})
                                    </p>
                                    <p className="text-[11px] text-gray-400 mt-0.5">分攤對象: {exp.mInvolved.join(', ')}</p>
                                </div>
                                <div className="text-right flex items-center gap-3">
                                    <div>
                                        <span className="text-xs font-black block text-gray-500">折合台幣</span>
                                        <span className="text-sm font-black text-slate-800">NT$ {exp.twdAmount}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleEditExpense(exp)} className="text-gray-400 hover:text-blue-500 transition-colors p-1" title="編輯項目">
                                            <i className="fa-solid fa-pen text-[14px]"></i>
                                        </button>
                                        <button onClick={() => setSplitExpenses(splitExpenses.filter(x => x.id !== exp.id))} className="text-gray-400 hover:text-red-500 transition-colors p-1" title="刪除項目">
                                            <i className="fa-solid fa-trash-can text-[14px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {splitExpenses.length === 0 && <p className="text-center text-gray-500 py-10 text-xs">尚無任何記帳紀錄。</p>}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 新增：航班資訊元件 (0625版本)
        // ==========================================
        const RenderFlightInfo = ({ flightInfo, setFlightInfo, showToast }) => {
            const GLOBAL_AIRPORTS = [
                "TPE - 台北/桃園", "TSA - 台北/松山", "KHH - 高雄/小港", "RMQ - 台中/清泉崗",
                "NRT - 東京/成田", "HND - 東京/羽田", "KIX - 大阪/關西", "FUK - 福岡", "CTS - 札幌/新千歲", "OKA - 沖繩/那霸",
                "ICN - 首爾/仁川", "GMP - 首爾/金浦", "PUS - 釜山/金海", "CJU - 濟州島",
                "HKG - 香港", "MFM - 澳門", "SIN - 新加坡/樟宜", "BKK - 曼谷/素萬那普", "DMK - 曼谷/廊曼",
                "KUL - 吉隆坡", "SGN - 胡志明市", "HAN - 河內", "MNL - 馬尼拉", "CGK - 雅加達",
                "LHR - 倫敦/希斯洛", "CDG - 巴黎/戴高樂", "FRA - 法蘭克福", "AMS - 阿姆斯特丹", "MUC - 慕尼黑", 
                "MAD - 馬德里", "FCO - 羅馬/達文西", "IST - 伊斯坦堡",
                "JFK - 紐約/甘迺迪", "LAX - 洛杉磯", "SFO - 舊金山", "SEA - 西雅圖", "ORD - 芝加哥/歐海爾", 
                "YVR - 溫哥華", "YYZ - 多倫多", "HNL - 夏威夷/檀香山",
                "SYD - 雪梨", "MEL - 墨爾本", "AKL - 奧克蘭", "DXB - 杜拜", "DOH - 杜哈"
            ];

            const AIRLINE_DB = {
                '大韓航空': { code: 'KE', bg: '0064B0' }, '韓亞航空': { code: 'OZ', bg: '4A4843' },
                '濟州航空': { code: '7C', bg: 'FF5000' }, '德威航空': { code: 'TW', bg: 'D22C2A' },
                '真航空': { code: 'LJ', bg: '009000' }, '首爾航空': { code: 'RS', bg: '00B0B9' },
                '釜山航空': { code: 'BX', bg: '003B7E' }, '中華航空': { code: 'CI', bg: '0D8ABC' },
                '長榮航空': { code: 'BR', bg: '00A3A1' }, '星宇航空': { code: 'JX', bg: 'D4A373' },
                '國泰航空': { code: 'CX', bg: '006564' }, '日本航空': { code: 'JL', bg: 'E3000F' },
                '全日空': { code: 'NH', bg: '0033A0' }, '阿聯酋航空': { code: 'EK', bg: 'D71A21' },
                '聯合航空': { code: 'UA', bg: '005DAA' }, '達美航空': { code: 'DL', bg: 'E3132C' },
                '其他': { code: '✈️', bg: 'cbd5e1' }
            };

            const [isEditing, setIsEditing] = useState(false);
            const [editTab, setEditTab] = useState('outbound');
            const [formData, setFormData] = useState(flightInfo);

            const formatTime = (isoStr) => {
                if (!isoStr) return '';
                const d = new Date(isoStr);
                if (isNaN(d.getTime())) return isoStr; // 防呆
                return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            };

            const handleSave = (e) => {
                e.preventDefault();
                setFlightInfo({
                    outbound: { ...formData.outbound, flightNumber: (formData.outbound.flightNumber || '').toUpperCase() },
                    return: { ...formData.return, flightNumber: (formData.return.flightNumber || '').toUpperCase() }
                });
                setIsEditing(false);
                if (showToast) showToast("航班資訊已更新！");
            };

            const renderDisplayCard = (type) => {
                const d = flightInfo[type] || {};
                const isOutbound = type === 'outbound';
                const cleanDepCode = (d.departureCode || '---').substring(0, 3).toUpperCase();
                const cleanArrCode = (d.arrivalCode || '---').substring(0, 3).toUpperCase();
                const airData = AIRLINE_DB[d.airline] || AIRLINE_DB['其他'];
                const logoUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(airData.code)}&background=${airData.bg}&color=fff&rounded=true&bold=true`;

                return (
                    <div className="bg-white rounded-xl shadow-sm border border-[#C4D8E5] overflow-hidden">
                        <div className="bg-[#8EB1D1] px-3 py-1.5 flex justify-between items-center text-white">
                            <div className="font-black tracking-widest text-[10px] flex items-center gap-1.5">
                                <i className={`fa-solid ${isOutbound ? 'fa-plane-departure' : 'fa-plane-arrival'} w-3.5 h-3.5`}></i> 
                                {isOutbound ? '去程 OUTBOUND' : '回程 INBOUND'}
                            </div>
                            <button type="button" onClick={() => { setFormData(flightInfo); setEditTab(type); setIsEditing(true); }} className="px-2 py-0.5 rounded-full text-[9px] font-bold flex items-center gap-1 shadow-sm bg-white/20 backdrop-blur-sm hover:bg-white/40 transition-colors">
                                <i className="fa-solid fa-pen w-2.5 h-2.5"></i> 編輯
                            </button>
                        </div>
                        
                        <div className="p-3 flex justify-between items-start">
                            <div className="text-center w-[28%] flex flex-col items-center">
                                <div className="text-3xl font-black leading-none tracking-tighter">{cleanDepCode}</div>
                                <div className="text-[10px] font-bold text-slate-500 mt-1.5">{formatTime(d.departureTime)}</div>
                                <div className="text-[9px] bg-[#C4D8E5]/30 text-[#8EB1D1] font-bold px-1.5 py-0.5 rounded mt-1 inline-block">航廈 <span>{(d.departureTerminal || '-').replace(/航廈|T/gi, '')}</span></div>

        const RenderChecklist = ({ prepList, setPrepList }) => {
