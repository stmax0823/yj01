        // 修正後的匯率換算邏輯 (更彈性支援乘除算)
        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            // 判斷匯率基準：若是像日圓、韓元(1台幣換多外幣)則除以rate；美金歐元則乘以換算率(或除以小於1的rate)
            // 這裡遵循原設定：韓元42(除以42), 美金0.031(除以0.031) -> 100美金 / 0.031 = 3225台幣
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };
