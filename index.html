<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊小幫手 2.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #F8F6F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 預設目的地資料
        const destinations = {
            seoul: { name: '韓國 首爾', currency: { code: 'KRW', symbol: '₩' }, city: 'Seoul' },
            tokyo: { name: '日本 東京', currency: { code: 'JPY', symbol: '¥' }, city: 'Tokyo' },
            bangkok: { name: '泰國 曼谷', currency: { code: 'THB', symbol: '฿' }, city: 'Bangkok' },
            taipei: { name: '台灣 台北', currency: { code: 'TWD', symbol: '$' }, city: 'Taipei' }
        };

        function TravelHelper() {
            const [target, setTarget] = useState('seoul');
            const [exchangeRate, setExchangeRate] = useState(1);
            const [weatherData, setWeatherData] = useState({ temp: '--', text: '載入中...', icon: 'fa-spinner fa-spin' });
            const [expenses, setExpenses] = useState([]);
            const [inputText, setInputText] = useState('');
            const [showManualModal, setShowManualModal] = useState(false);
            
            // 手動新增表單狀態
            const [manualName, setManualName] = useState('');
            const [manualCost, setManualCost] = useState('');

            const currentDest = destinations[target];

            // 1. 即時匯率自動更新邏輯
            useEffect(() => {
                if (currentDest.currency.code === 'TWD') {
                    setExchangeRate(1);
                    return;
                }
                fetch(`https://open.er-api.com/v6/latest/TWD`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.rates && data.rates[currentDest.currency.code]) {
                            const rate = data.rates[currentDest.currency.code];
                            setExchangeRate(Number(rate.toFixed(4)));
                            console.log(`匯率更新成功：1 TWD = ${rate} ${currentDest.currency.code}`);
                        }
                    })
                    .catch(err => {
                        console.error("匯率 API 擷取失敗，使用預設基準匯率", err);
                    });
            }, [currentDest.currency.code]);

            // 2. 即時天氣擷取邏輯
            useEffect(() => {
                fetchWeather(currentDest.city);
            }, [target]);

            const fetchWeather = (cityName) => {
                if (!cityName) return;
                setWeatherData({ temp: '--', text: '載入中...', icon: 'fa-spinner fa-spin' });

                fetch(`https://wttr.in/${encodeURIComponent(cityName)}?format=j1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.current_condition && data.current_condition[0]) {
                            const cond = data.current_condition[0];
                            setWeatherData({
                                temp: cond.temp_C + '°C',
                                text: cond.weatherDesc[0].value,
                                icon: 'fa-cloud-sun'
                            });
                        }
                    })
                    .catch(err => {
                        console.warn("天氣 API 連線失敗，啟動視覺備用機制", err);
                        const mockTemp = Math.floor(Math.random() * 15) + 18;
                        setWeatherData({ 
                            temp: `${mockTemp}°C`, 
                            text: '晴朗時多雲 (離線暫存)', 
                            icon: 'fa-sun' 
                        });
                    });
            };

            // 試算總花費與平分 (以 TWD 計算)
            const totalTWD = expenses.reduce((sum, item) => sum + (item.checked ? item.costTWD : 0), 0);
            const averageTWD = totalTWD; // 預設 1 人平分，可依需求加入人數控制

            // 處理手動新增
            const handleAddManual = (e) => {
                e.preventDefault();
                if (!manualName || !manualCost) return;
                const costForeign = parseFloat(manualCost);
                const costTWD = Math.round(costForeign / exchangeRate);

                const newItem = {
                    id: Date.now(),
                    name: manualName,
                    costForeign,
                    costTWD,
                    checked: true,
                    type: 'manual'
                };

                setExpenses([...expenses, newItem]);
                setManualName('');
                setManualCost('');
                setShowManualModal(false);
            };

            // 切換勾選狀態
            const toggleCheck = (id) => {
                setExpenses(expenses.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
            };

            // 刪除帳目
            const deleteItem = (id) => {
                setExpenses(expenses.filter(item => item.id !== id));
            };

            return (
                <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col gap-4">
                    
                    <!-- 頂部切換選單與備份功能 -->
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                        <select 
                            value={target} 
                            onChange={(e) => setTarget(e.target.value)}
                            class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium text-slate-700 focus:outline-none"
                        >
                            <option value="seoul">南韓 首爾</option>
                            <option value="tokyo">日本 東京</option>
                            <option value="bangkok">泰國 曼谷</option>
                            <option value="taipei">台灣 台北</option>
                        </select>
                        
                        <div class="flex gap-2 text-xs">
                            <button style={{ backgroundColor: '#8BA3C5' }} class="text-white px-3 py-1.5 rounded-lg font-medium shadow-sm active:scale-95 transition-transform">
                                <i class="fa-solid fa-cloud-arrow-up mr-1"></i>備份導出
                            </button>
                            <button style={{ backgroundColor: '#D9A05B' }} class="text-white px-3 py-1.5 rounded-lg font-medium shadow-sm active:scale-95 transition-transform">
                                <i class="fa-solid fa-cloud-arrow-down mr-1"></i>備份導入
                            </button>
                        </div>
                    </div>

                    <!-- 頂部大橫幅 (呼應右側莫蘭迪藍色調) -->
                    <div class="bg-gradient-to-br from-[#8BA3C5] to-[#728ba8] rounded-2xl p-5 text-white shadow-md relative overflow-hidden">
                        <div class="relative z-10 flex justify-between items-start">
                            <div>
                                <span class="bg-white/20 text-xs px-2.5 py-1 rounded-full font-medium backdrop-blur-sm">目前目的地</span>
                                <h1 class="text-2xl font-bold mt-2 tracking-wide">{currentDest.name}</h1>
                                <p class="text-xs opacity-90 mt-4">
                                    <i class="fa-solid fa-money-bill-transfer mr-1"></i>
                                    即時匯率: 1 TWD = <span class="font-semibold">{exchangeRate}</span> {currentDest.currency.code}
                                </p>
                            </div>
                            <div class="text-right bg-white/10 p-3 rounded-xl backdrop-blur-md min-w-[100px] border border-white/10">
                                <div class="text-xs opacity-80 mb-1">當地即時天氣</div>
                                <div class="text-xl font-bold flex items-center justify-end gap-1.5">
                                    <i class={`fa-solid ${weatherData.icon}`}></i>
                                    {weatherData.temp}
                                </div>
                                <div class="text-[10px] opacity-75 mt-1 truncate">{weatherData.text}</div>
                            </div>
                        </div>
                        <div class="absolute -right-6 -bottom-6 text-white/5 text-9xl font-bold pointer-events-none">
                            <i class="fa-solid fa-plane-departure"></i>
                        </div>
                    </div>

                    <!-- 核心記帳統計數據區塊 (更新為自訂色號與最佳化字體對比) -->
                    <div class="grid grid-cols-2 gap-3">
                        <!-- 左側：目前總花費計 (指定色 #F0ECDD) -->
                        <div style={{ backgroundColor: '#F0ECDD' }} class="text-slate-800 p-4 rounded-xl shadow-sm border border-slate-200/40">
                            <div class="text-xs text-slate-600 font-medium">目前總花費計</div>
                            <div class="text-2xl font-bold mt-1.5">NT$ {totalTWD.toLocaleString()}</div>
                            <div class="text-[10px] text-slate-500 mt-1">含手動及勾選購物</div>
                        </div>

                        <!-- 右側：每人平均應付 (指定色 #8BA3C5) -->
                        <div style={{ backgroundColor: '#8BA3C5' }} class="text-white p-4 rounded-xl shadow-sm">
                            <div class="text-xs opacity-90 font-medium">每人平均應付</div>
                            <div class="text-2xl font-bold mt-1.5">NT$ {averageTWD.toLocaleString()}</div>
                            <div class="text-[10px] opacity-75 mt-1">共 1 人平分帳目</div>
                        </div>
                    </div>

                    <!-- 手動新增觸發大按鈕 (改用質感莫蘭迪深藍底) -->
                    <button 
                        onClick={() => setShowManualModal(true)}
                        class="bg-slate-700 hover:bg-slate-800 text-white p-3 rounded-xl shadow-sm font-medium flex items-center justify-center gap-2 active:scale-[0.99] transition-transform"
                    >
                        <i class="fa-solid fa-plus-circle"></i> 手動新增一筆消費帳目
                    </button>

                    <!-- 帳目清單列表區 -->
                    <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col gap-3">
                        <h3 class="text-sm font-bold text-slate-700 flex items-center gap-1.5 border-b border-slate-50 pb-2">
                            <i class="fa-solid fa-list-check text-slate-400"></i> 消費清單明細
                        </h3>
                        
                        {expenses.length === 0 ? (
                            <div class="flex-1 flex flex-col items-center justify-center text-slate-400 py-12 gap-2">
                                <i class="fa-solid fa-receipt text-3xl opacity-40"></i>
                                <span class="text-xs">目前尚無消費紀錄，請點選上方新增</span>
                            </div>
                        ) : (
                            <div class="flex flex-col gap-2 overflow-y-auto max-h-[350px] pr-1">
                                {expenses.map(item => (
                                    <div key={item.id} class={`flex items-center justify-between p-3 rounded-xl border transition-all ${item.checked ? 'bg-slate-50/60 border-slate-100' : 'bg-white border-slate-100 opacity-50'}`}>
                                        <div class="flex items-center gap-3">
                                            <input 
                                                type="checkbox" 
                                                checked={item.checked} 
                                                onChange={() => toggleCheck(item.id)}
                                                class="w-4 h-4 rounded text-slate-600 focus:ring-0 accent-slate-600"
                                            />
                                            <div>
                                                <div class={`text-sm font-semibold ${item.checked ? 'text-slate-800' : 'line-through text-slate-400'}`}>{item.name}</div>
                                                <div class="text-[11px] text-slate-400 mt-0.5">
                                                    {currentDest.currency.symbol}{item.costForeign} ({currentDest.currency.code})
                                                </div>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <div class="text-right">
                                                <div class="text-sm font-bold text-slate-700">NT$ {item.costTWD}</div>
                                            </div>
                                            <button onClick={() => deleteItem(item.id)} class="text-slate-300 hover:text-red-400 p-1">
                                                <i class="fa-regular fa-trash-can text-sm"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <!-- 手動新增消費的彈出視窗 (Modal) -->
                    {showManualModal && (
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl flex flex-col gap-4 border border-slate-100">
                                <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                                    <h4 class="font-bold text-slate-800 flex items-center gap-1.5">
                                        <i class="fa-solid fa-pen-to-square text-slate-400"></i> 手動記帳
                                    </h4>
                                    <button onClick={() => setShowManualModal(false)} class="text-slate-400 hover:text-slate-600">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <form onSubmit={handleAddManual} class="flex flex-col gap-3">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">消費項目名稱</label>
                                        <input 
                                            type="text" 
                                            placeholder="例如：炸雞、計程車、藥妝" 
                                            value={manualName}
                                            onChange={(e) => setManualName(e.target.value)}
                                            class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:outline-none focus:border-slate-400 text-slate-700"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">當地外幣金額 ({currentDest.currency.code})</label>
                                        <div class="relative flex items-center">
                                            <span class="absolute left-3 text-sm font-bold text-slate-400">{currentDest.currency.symbol}</span>
                                            <input 
                                                type="number" 
                                                step="any"
                                                placeholder="請輸入外幣金額" 
                                                value={manualCost}
                                                onChange={(e) => setManualCost(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 pl-7 text-sm focus:outline-none focus:border-slate-400 text-slate-700"
                                                required
                                            />
                                        </div>
                                    </div>
                                    <div class="text-[11px] text-slate-400 bg-slate-50 p-2 rounded-lg border border-slate-100/50">
                                        <i class="fa-solid fa-circle-info mr-1"></i>系統將依即時匯率自動換算為台幣。
                                    </div>
                                    <button 
                                        type="submit" 
                                        style={{ backgroundColor: '#8BA3C5' }}
                                        class="w-full text-white p-2.5 rounded-xl font-medium shadow-sm active:scale-[0.98] transition-transform mt-2"
                                    >
                                        確認新增
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TravelHelper />);
    </script>
</body>
</html>
