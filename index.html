            const [currentCategory, setCurrentCategory] = useState('重要證件');
            const [newItemText, setNewItemText] = useState('');

            const total = prepList.length;
            const completed = prepList.filter(item => item.checked).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            const toggleItemCheck = (id) => {
                setPrepList(prepList.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
            };

            const deleteItem = (id) => {
                setPrepList(prepList.filter(item => item.id !== id));
            };

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newItemText.trim()) return;
                setPrepList([...prepList, { id: Date.now(), text: newItemText.trim(), checked: false, category: currentCategory }]);
                setNewItemText('');
            };

            const groupedItems = categories.reduce((acc, cat) => {
                const catItems = prepList.filter(item => item.category === cat);
                if (catItems.length > 0) acc[cat] = catItems;
                return acc;
            }, {});

            return (
                <div className="p-4 pb-24 flex flex-col items-center w-full">
                    <div className="w-full max-w-md shadow-2xl rounded-3xl overflow-hidden transition-all duration-500 ease-in-out border border-gray-200" style={{ backgroundColor: '#E8ECEF' }}>
                        
                        <div className="p-5 cursor-pointer select-none relative" onClick={(e) => { if(!e.target.closest('button') && !e.target.closest('input')) setIsExpanded(!isExpanded); }}>
                            <div className="flex justify-between items-center mb-3">
                                <div className="flex items-center space-x-2">
                                    <i className="ph ph-airplane-takeoff text-2xl" style={{ color: '#495B7D' }}></i>
                                    <h1 className="text-xl font-bold tracking-wide" style={{ color: '#495B7D' }}>行前準備清單</h1>
                                </div>
                              
                                 
                                
                            </div>

                            <div className="flex justify-between items-end mb-2">
                                <span className="text-sm font-bold" style={{ color: '#495B7D' }}>準備進度</span>
                                <span className="text-lg font-bold" style={{ color: '#495B7D' }}>{percentage}%</span>
                            </div>

                            <div className="w-full h-3 rounded-full overflow-hidden relative" style={{ backgroundColor: 'rgba(73, 91, 125, 0.2)' }}>
                                <div className="h-full transition-all duration-700 ease-out absolute left-0 top-0" style={{ width: `${percentage}%`, backgroundColor: '#495B7D' }}></div>
                            </div>

                            <div className="mt-2 text-xs text-right font-medium" style={{ color: '#495B7D' }}>已完成 {completed} / {total} 項</div>
                        </div>

                        <div className={`transition-all duration-500 ease-in-out bg-white/50 backdrop-blur-sm overflow-hidden ${isExpanded ? 'max-h-[800px] opacity-100 overflow-y-auto' : 'max-h-0 opacity-0'}`} style={{ msOverflowStyle: 'none', scrollbarWidth: 'none' }}>
                            <div className="p-5 border-t" style={{ borderColor: 'rgba(139, 163, 197, 0.3)' }}>
                                
                                <form onSubmit={handleAdd} className="mb-6 flex flex-col space-y-2">
                                    <div className="flex space-x-2">
                                        <input type="text" placeholder="輸入自訂物品..." className="flex-1 px-4 py-2 rounded-xl text-sm border-none focus:ring-2 outline-none shadow-sm" style={{ backgroundColor: '#E8ECEF', color: '#495B7D', '--tw-ring-color': '#495B7D' }} value={newItemText} onChange={(e) => setNewItemText(e.target.value)} />
                                        <button type="submit" className="p-2 rounded-xl text-white shadow-sm hover:opacity-90 transition-opacity flex items-center justify-center w-10" style={{ backgroundColor: '#495B7D' }}>
                                            <i className="ph ph-plus text-xl"></i>
                                        </button>
                                    </div>
                                    <div className="flex space-x-2 overflow-x-auto pb-2" style={{ msOverflowStyle: 'none', scrollbarWidth: 'none' }}>
                                        {categories.map(cat => (
                                            <button key={cat} type="button" onClick={() => setCurrentCategory(cat)} className={`whitespace-nowrap px-3 py-1 text-xs rounded-full transition-colors border ${currentCategory === cat ? 'border-transparent text-white' : 'border-[#495B7D] bg-transparent'}`} style={{ backgroundColor: currentCategory === cat ? '#495B7D' : 'transparent', color: currentCategory === cat ? '#E8ECEF' : '#495B7D' }}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </form>

                                <div>
                                    {Object.entries(groupedItems).map(([category, catItems]) => (
                                        <div key={category} className="mb-5">
                                            <h3 className="text-sm font-bold mb-3 border-b-2 pb-1 inline-block" style={{ color: '#495B7D', borderColor: '#8BA3C5' }}>{category}</h3>
                                            <div className="space-y-2">
                                                {catItems.map(item => (
                                                    <div key={item.id} className={`flex items-center justify-between p-3 rounded-xl transition-all ${item.checked ? 'bg-[#E8ECEF]/60' : 'bg-white shadow-sm'}`}>
                                                        <div className="flex items-center space-x-3 flex-1 cursor-pointer" onClick={() => toggleItemCheck(item.id)}>
                                                            {item.checked ? (
                                                                <i className="ph-fill ph-check-circle text-2xl" style={{ color: '#8BA3C5' }}></i>
                                                            ) : (
                                                                <i className="ph ph-circle text-2xl" style={{ color: '#495B7D', opacity: 0.6 }}></i>
                                                            )}
                                                            <span className={`text-sm transition-all duration-300 ${item.checked ? 'line-through opacity-50' : 'font-medium'}`} style={{ color: '#495B7D' }}>{item.text}</span>
                                                        </div>
                                                        <button onClick={() => deleteItem(item.id)} className="p-2 opacity-30 hover:opacity-100 transition-opacity" style={{ color: '#495B7D' }}>

                                {total === 0 && (

                                {total > 0 && percentage === 100 && (

                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RenderTools = ({ currency, exchangeRate, currentTrip, itinerary, shoppingList, showToast, handleExportData, handleImportData, handleResetData }) => {
            const [calcAmount1, setCalcAmount1] = useState('1000');
            const [calcAmount2, setCalcAmount2] = useState('');
            const [calcCurrency1, setCalcCurrency1] = useState(currency.code);
            const [calcCurrency2, setCalcCurrency2] = useState('TWD');
            const [lastEdited, setLastEdited] = useState(1);

            const getRate = (fromCode, toCode) => {
                const fromObj = CURRENCIES.find(c => c.code === fromCode);
                const toObj = CURRENCIES.find(c => c.code === toCode);
                
                const fromRate = (fromCode === currency.code) ? exchangeRate : (fromObj ? fromObj.defaultRate : 1);
                const toRate = (toCode === currency.code) ? exchangeRate : (toObj ? toObj.defaultRate : 1);
                
                return toRate / fromRate;
            };

            const currentRate = useMemo(() => getRate(calcCurrency1, calcCurrency2), [calcCurrency1, calcCurrency2, exchangeRate, currency]);

            useEffect(() => {
                if (lastEdited === 1) {
                    if (calcAmount1 && !isNaN(calcAmount1)) {
                        setCalcAmount2(String(Math.ceil(Number(calcAmount1) * currentRate)));
                    } else {
                        setCalcAmount2('');
                    }
                } else {
                    if (calcAmount2 && !isNaN(calcAmount2)) {
                        setCalcAmount1(String(Math.ceil(Number(calcAmount2) / currentRate)));
                    } else {
                        setCalcAmount1('');
                    }
                }
            }, [calcAmount1, calcAmount2, calcCurrency1, calcCurrency2, currentRate, lastEdited]);

            const handleSwap = () => {
                const tempCur = calcCurrency1;
                setCalcCurrency1(calcCurrency2);
                setCalcCurrency2(tempCur);
                setLastEdited(lastEdited === 1 ? 2 : 1);
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    showToast("✅ 行程與清單已複製到剪貼簿！");
                });
            };

            const handleShareData = () => {
                let shareText = `✈️ 【${currentTrip.country}·${currentTrip.city}】旅遊清單分享\n\n`;
                
                if (itinerary.length > 0) {
                    shareText += `📅 行程總覽：\n`;
                    const sortedDays = [...new Set(itinerary.map(i => i.day))].sort((a, b) => a - b);
                    sortedDays.forEach(day => {
                        shareText += `[第 ${day} 天]\n`;
                        const dayItems = itinerary.filter(i => i.day === day).sort((a, b) => a.time.localeCompare(b.time));
                        dayItems.forEach(item => {
                            shareText += `- ${item.time} ${item.title}${item.address ? ` (@${item.address})` : ''}\n`;
                        });
                    });
                    shareText += `\n`;
                }

                if (shoppingList.length > 0) {
                    shareText += `🛒 購物清單預算：\n`;
                    shoppingList.forEach(item => {
                        shareText += `${item.checked ? '✅' : '⬜'} ${item.text} (${currency.symbol}${item.cost} x ${item.qty})\n`;
                    });
                    const totals = shoppingList.reduce((acc, item) => {
                        acc.foreign += (item.cost * item.qty);
                        acc.twd += Math.ceil((item.cost * item.qty) / exchangeRate);
                        return acc;
                    }, { foreign: 0, twd: 0 });
                    shareText += `💰 預估總計：${currency.symbol}${totals.foreign.toLocaleString()} (約 NT$ ${totals.twd.toLocaleString()})\n\n`;
                }

                shareText += `--- 來自旅遊小幫手 3.0 ---`;

                if (navigator.share) {
                    navigator.share({ title: '旅遊清單分享', text: shareText }).catch(() => {
                        copyToClipboard(shareText);
                    });
                } else {
                    copyToClipboard(shareText);
                }
            };
            
            return (
                <div className="p-4 pb-24 space-y-6">
                    <div className="bg-white p-6 rounded-3xl border shadow-lg">
                        <h3 className="font-bold text-sm mb-6 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-calculator" style={{ color: '#495B7D' }}></i> 匯率換算
                        </h3>
                        
                        <div className="space-y-3">
                            <div className="bg-slate-50 rounded-2xl p-4 border border-gray-100 focus-within:ring-2 focus-within:ring-[#8BA3C5]/30 transition-all">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">支付 / 持有</label>
                                    <select 
                                        className="bg-transparent text-[#8BA3C5] font-bold text-xs outline-none cursor-pointer"
                                        value={calcCurrency1}
                                        onChange={e => { setCalcCurrency1(e.target.value); setLastEdited(1); }}
                                    >
                                        {CURRENCIES.map(c => (
                                            <option key={c.code} value={c.code}>{c.name} ({c.code})</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="flex items-center text-2xl font-black text-slate-800">
                                    <span className="text-gray-300 mr-2 text-sm">{calcCurrency1}</span>
                                    <input 
                                        type="number" 
                                        inputMode="decimal"
                                        className="w-full bg-transparent outline-none text-right" 
                                        placeholder="0" 
                                        value={calcAmount1}
                                        onChange={e => { setCalcAmount1(e.target.value); setLastEdited(1); }}
                                    />
                                </div>
                            </div>

                            <div className="flex justify-center -my-6 relative z-10">
                                <button 
                                    onClick={handleSwap}
                                    className="bg-[#8BA3C5] text-white p-2.5 rounded-full shadow-md hover:bg-[#7a92b4] transition-all active:scale-90"
                                >
                                    <i className="fa-solid fa-arrows-up-down text-sm"></i>
                                </button>
                            </div>

                            <div className="bg-slate-50 rounded-2xl p-4 border border-gray-100 focus-within:ring-2 focus-within:ring-[#8BA3C5]/30 transition-all">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">換取 / 目標</label>
                                    <select 
                                        className="bg-transparent text-[#8BA3C5] font-bold text-xs outline-none cursor-pointer"
                                        value={calcCurrency2}
                                        onChange={e => { setCalcCurrency2(e.target.value); setLastEdited(2); }}
                                    >
                                        {CURRENCIES.map(c => (
                                            <option key={c.code} value={c.code}>{c.name} ({c.code})</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="flex items-center text-2xl font-black text-slate-800">
                                    <span className="text-gray-300 mr-2 text-sm">{calcCurrency2}</span>
                                    <input 
                                        type="number" 
                                        inputMode="decimal"
                                        className="w-full bg-transparent outline-none text-right" 
                                        placeholder="0" 
                                        value={calcAmount2}
                                        onChange={e => { setCalcAmount2(e.target.value); setLastEdited(2); }}
                                    />
                                </div>
                            </div>

                            <div className="text-center pt-4">
                                <div className="inline-block px-4 py-1.5 bg-[#F0ECDD]/50 rounded-full text-[11px] font-bold text-gray-500">
                                    1 <span className="text-[#8BA3C5]">{calcCurrency1}</span> = {currentRate.toFixed(4)} <span className="text-[#8BA3C5]">{calcCurrency2}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl border shadow-sm">
                        <h3 className="font-bold text-sm mb-2 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-share-nodes" style={{ color: '#8BA3C5' }}></i> 分享旅遊資訊
                        </h3>
                        <p className="text-[11px] text-gray-400 mb-4 font-medium">將目前的行程安排與購物清單格式化後分享給旅伴。</p>
                        <button onClick={handleShareData} className="w-full py-3 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm transition-all active:scale-95" style={{ backgroundColor: '#23354D' }}>
                            <i className="fa-solid fa-copy"></i> 複製行程與購物清單
                        </button>
                    </div>

                    <div className="bg-white p-5 rounded-2xl border shadow-sm">
                        <h3 className="font-bold text-sm mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-cloud-arrow-up text-sky-500"></i> 資料雲端備份與還原
                        </h3>
                        <div className="space-y-4">
                            <button onClick={handleExportData} className="w-full py-3 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm hover:opacity-90 transition-all" style={{ backgroundColor: COLORS.mediumBlue }}>
                                <i className="fa-solid fa-download"></i> 下載完整數據備份 (.json)
                            </button>
                            <label className="w-full py-3 rounded-xl bg-amber-500 text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm cursor-pointer hover:bg-amber-600 transition-all">
                                <i className="fa-solid fa-upload"></i> 匯入備份檔案並覆蓋資料
                                <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                            </label>
                        </div>
                    </div>

                    <div className="bg-red-50 p-5 rounded-2xl border border-red-100 shadow-sm">
                        <h3 className="font-bold text-sm mb-1 text-red-600 flex items-center gap-2">
                            <i className="fa-solid fa-triangle-exclamation"></i> 危險區域
                        </h3>
                        <p className="text-[11px] text-red-400 mb-4 font-medium">按下去就全都消失囉 要確。</p>
                        <button onClick={handleResetData} className="w-full py-3 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-2 shadow-sm bg-red-600 hover:bg-red-700 transition-all">
                            <i className="fa-solid fa-rotate-left"></i> 清空所有資料
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主程式 App
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState('must');
            const [toastMessage, setToastMessage] = useState('');
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 📌 鑰匙已經改回 v6_per_cat_add_final_260625，你之前的舊資料會全數復活！
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6_per_cat_add_final_260625')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6_per_cat_add_final_260625')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6_per_cat_add_final_260625')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6_per_cat_add_final_260625')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6_per_cat_add_final_260625')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6_per_cat_add_final_260625')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6_per_cat_add_final_260625')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6_per_cat_add_final_260625')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6_per_cat_add_final_260625')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6_per_cat_add_final_260625')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6_per_cat_add_final_260625')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6_per_cat_add_final_260625')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6_per_cat_add_final_260625')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6_per_cat_add_final_260625')) || INITIAL_ITEM_TYPES);
            const [flightInfo, setFlightInfo] = useState(() => JSON.parse(localStorage.getItem('app_flight_info_v6_per_cat_add_final_260625')) || { 
                outbound: { flightNumber: 'KE 186', airline: '大韓航空', departureCode: 'TPE', arrivalCode: 'ICN', departureTime: '2026-06-25T08:30', arrivalTime: '2026-06-25T12:00', departureTerminal: '1', arrivalTerminal: '2' },
                return: { flightNumber: 'KE 185', airline: '大韓航空', departureCode: 'ICN', arrivalCode: 'TPE', departureTime: '2026-06-30T14:30', arrivalTime: '2026-06-30T17:15', departureTerminal: '2', arrivalTerminal: '1' }
            });
            
            const [weatherData, setWeatherData] = useState({ temp: '--', text: '點擊載入天氣', icon: '' });

            useEffect(() => {
                if (currency.code === 'TWD') { setExchangeRate(1); return; }
                fetch(`https://open.er-api.com/v6/latest/TWD`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.rates && data.rates[currency.code]) {
                            setExchangeRate(Number(data.rates[currency.code].toFixed(4)));
                        }
                    })
                    .catch(() => {});
            }, [currency]);

            useEffect(() => {
                if (currentTrip.city) {
                    setWeatherData({ temp: '--', text: '載入中...', icon: '' });
                    fetch(`https://wttr.in/${encodeURIComponent(currentTrip.city)}?format=j1`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.current_condition && data.current_condition[0]) {
                                setWeatherData({ temp: data.current_condition[0].temp_C + '°C', text: data.current_condition[0].weatherDesc[0].value, icon: 'fa-cloud-sun' });
                            }
                        })
                        .catch(() => setWeatherData({ temp: `25°C`, text: '晴朗', icon: 'fa-sun' }));
                }
            }, [currentTrip.city]);

            useEffect(() => {
                const data = {
                    app_destinations_v6_per_cat_add_final_260625: destinations,
                    app_current_trip_v6_per_cat_add_final_260625: currentTrip,
                    app_currency_v6_per_cat_add_final_260625: currency,
                    app_exchange_rate_v6_per_cat_add_final_260625: String(exchangeRate),
                    app_itinerary_v6_per_cat_add_final_260625: itinerary,
                    app_stores_v6_per_cat_add_final_260625: stores,
                    app_must_eats_v6_per_cat_add_final_260625: mustEats,
                    app_must_buys_v6_per_cat_add_final_260625: mustBuys,
                    app_shopping_list_v6_per_cat_add_final_260625: shoppingList,
                    app_split_members_v6_per_cat_add_final_260625: splitMembers,
                    app_split_expenses_v6_per_cat_add_final_260625: splitExpenses,
                    app_prep_list_v6_per_cat_add_final_260625: prepList,
                    app_food_types_v6_per_cat_add_final_260625: foodTypes,
                    app_item_types_v6_per_cat_add_final_260625: itemTypes,
                    app_flight_info_v6_per_cat_add_final_260625: flightInfo
                };
                Object.entries(data).forEach(([key, val]) => localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList, flightInfo]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            const [addToItinModal, setAddToItinModal] = useState({ isOpen: false, item: null });
            const [modalDayChoice, setModalDayChoice] = useState('Day 1');
            const [modalCustomDay, setModalCustomDay] = useState('');
            const [modalTime, setModalTime] = useState('12:00');

            const uniqueDays = useMemo(() => {
                const days = Array.from(new Set(itinerary.map(i => i.day)));
                return days.length > 0 ? days.sort() : ['Day 1'];
            }, [itinerary]);

            const confirmAddToItinerary = () => {
                const finalDay = modalDayChoice === '__CUSTOM__' ? modalCustomDay : modalDayChoice;
                if (!finalDay) return;
                setItinerary([...itinerary, {
                    id: Date.now(), day: finalDay, time: modalTime,
                    title: addToItinModal.item?.name || addToItinModal.item?.notes || '未命名行程',
                    address: addToItinModal.item?.address || '', mapUrl: addToItinModal.item?.url || '', transport: '',
                    image: addToItinModal.item?.image || null, notes: ''
                }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setAddToItinModal({ isOpen: false, item: null }); setModalCustomDay('');
                showToast("成功安排至行程中！");
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList, flightInfo };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手3.0_備份檔_${currentTrip.country}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份檔已下載！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        if (d.flightInfo) setFlightInfo(d.flightInfo);
                        showToast("🎉 資料匯入成功！");
                    } catch (err) { showToast("備份檔資料損毀！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            const handleResetData = () => {
                if (!window.confirm('⚠️ 確定要清空所有設定與資料？⚠️')) return;
                const keys = [
                    'app_destinations_v6_per_cat_add_final_260625', 'app_current_trip_v6_per_cat_add_final_260625',
                    'app_currency_v6_per_cat_add_final_260625', 'app_exchange_rate_v6_per_cat_add_final_260625',
                    'app_itinerary_v6_per_cat_add_final_260625', 'app_stores_v6_per_cat_add_final_260625',
                    'app_must_eats_v6_per_cat_add_final_260625', 'app_must_buys_v6_per_cat_add_final_260625',
                    'app_shopping_list_v6_per_cat_add_final_260625', 'app_split_members_v6_per_cat_add_final_260625',
                    'app_split_expenses_v6_per_cat_add_final_260625', 'app_prep_list_v6_per_cat_add_final_260625',
                    'app_food_types_v6_per_cat_add_final_260625', 'app_item_types_v6_per_cat_add_final_260625',
                    'app_flight_info_v6_per_cat_add_final_260625'
                ];
                keys.forEach(k => localStorage.removeItem(k));
                setDestinations(INITIAL_DESTINATIONS);
                setCurrentTrip({ country: '韓國', city: '首爾' });
                setCurrency(CURRENCIES[0]);
                setExchangeRate(CURRENCIES[0].defaultRate);
                setItinerary([]);
                setStores(INITIAL_STORES);
                setMustEats([]);
                setMustBuys([]);
                setShoppingList([]);
                setSplitMembers(['自己', '朋友A']);
                setSplitExpenses([]);
                setPrepList(DEFAULT_PREP_LIST);
                setFoodTypes(INITIAL_FOOD_TYPES);
                setItemTypes(INITIAL_ITEM_TYPES);
                const EMPTY_FLIGHT = { flightNumber: '', airline: '', departureCode: '', arrivalCode: '', departureTime: '', arrivalTime: '', departureTerminal: '', arrivalTerminal: '' };
                setFlightInfo({ outbound: { ...EMPTY_FLIGHT }, return: { ...EMPTY_FLIGHT } });
                showToast('✅ 所有資料已清空，回復至初始設定！');
            };

            const menuItems = [
                { id: 'flight', label: '航班訊息', icon: 'fa-plane' },
                { id: 'dest', label: '目的地設定', icon: 'fa-map' },
                { id: 'list', label: '我的行程表', icon: 'fa-route' },
                { id: 'must', label: '口袋必去買', icon: 'fa-heart' },
                { id: 'shop', label: '即時購物車', icon: 'fa-cart-shopping' },
                { id: 'bill', label: '多人分帳記', icon: 'fa-comments-dollar' },
                { id: 'tools', label: '小工具', icon: 'fa-toolbox' },
                { id: 'prep', label: '行前準備清單', icon: 'fa-list-check' }
            ];

            return (
                <div className="app-container overflow-x-hidden">
                    {isDrawerOpen && (
                        <div className="fixed inset-0 bg-black/50 z-[60] backdrop-blur-sm transition-opacity" onClick={() => setIsDrawerOpen(false)}></div>
                    )}

                    <div className={`fixed top-0 left-0 h-full w-64 bg-white z-[70] shadow-2xl transition-transform duration-300 ease-in-out transform ${isDrawerOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b flex items-center gap-3 bg-slate-50">
                            <span className="text-3xl">✈️</span>
                            <div>
                                <h2 className="font-black text-slate-800 tracking-tight">旅遊小幫手 3.0</h2>
                            </div>
                        </div>
                        <nav className="p-4 space-y-2">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => { setActiveTab(item.id); setIsDrawerOpen(false); }}
                                    className={`w-full flex items-center gap-4 p-4 rounded-xl font-bold text-sm transition-all ${activeTab === item.id ? 'text-white shadow-md' : 'text-slate-600 hover:bg-slate-50'}`}
                                    style={{ backgroundColor: activeTab === item.id ? '#23354D' : 'transparent' }}
                                >
                                    <i className={`fa-solid ${item.icon} text-lg w-6`}></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    <header className="p-4 border-b flex justify-between items-center bg-white shadow-sm sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsDrawerOpen(true)} className="p-2 -ml-2 hover:bg-slate-50 rounded-lg transition-colors text-slate-600">
                                <i className="fa-solid fa-bars-staggered text-xl"></i>
                            </button>
                            <div>
                                <h1 className="text-base font-black tracking-wide" style={{ color: COLORS.darkText }}>
                                    {menuItems.find(m => m.id === activeTab)?.label || '旅遊小幫手'}
                                </h1>
                            </div>
                        </div>
                        <div className="flex items-center gap-1 bg-gray-50 border p-1 rounded-lg">
                            <select className="bg-transparent text-xs font-bold p-1 cursor-pointer" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                            </select>
                            <span className="text-xs font-mono font-bold px-1.5 py-0.5 rounded bg-white border text-gray-600 shadow-sm">1 TWD = {exchangeRate}</span>
                        </div>
                    </header>

                    <main className="content-area no-scrollbar">
                        {activeTab === 'flight' && <RenderFlightInfo flightInfo={flightInfo} setFlightInfo={setFlightInfo} showToast={showToast} />}
                        {activeTab === 'dest' && <RenderDestination currentTrip={currentTrip} setCurrentTrip={setCurrentTrip} destinations={destinations} setDestinations={setDestinations} stores={stores} setStores={setStores} weatherData={weatherData} handleCurrencyChange={handleCurrencyChange} />}
                        {activeTab === 'list' && <RenderItinerary itinerary={itinerary} setItinerary={setItinerary} uniqueDays={uniqueDays} showToast={showToast} />}
                        {activeTab === 'must' && <RenderMustGo currentTrip={currentTrip} currency={currency} stores={stores} setStores={setStores} mustEats={mustEats} setMustEats={setMustEats} mustBuys={mustBuys} setMustBuys={setMustBuys} shoppingList={shoppingList} setShoppingList={setShoppingList} foodTypes={foodTypes} setFoodTypes={setFoodTypes} itemTypes={itemTypes} setItemTypes={setItemTypes} showToast={showToast} mustGoType={mustGoType} setMustGoType={setMustGoType} setAddToItinModal={setAddToItinModal} />}
                        {activeTab === 'shop' && <RenderShoppingList shoppingList={shoppingList} setShoppingList={setShoppingList} currency={currency} exchangeRate={exchangeRate} showToast={showToast} handleCurrencyChange={handleCurrencyChange} />}
                        {activeTab === 'bill' && <RenderSplitBill splitMembers={splitMembers} setSplitMembers={setSplitMembers} splitExpenses={splitExpenses} setSplitExpenses={setSplitExpenses} currency={currency} exchangeRate={exchangeRate} showToast={showToast} />}
                        {activeTab === 'prep' && <RenderChecklist prepList={prepList} setPrepList={setPrepList} />}
                        {activeTab === 'tools' && <RenderTools currency={currency} exchangeRate={exchangeRate} currentTrip={currentTrip} itinerary={itinerary} shoppingList={shoppingList} showToast={showToast} handleExportData={handleExportData} handleImportData={handleImportData} handleResetData={handleResetData} />}
                    </main>

                    {toastMessage && (
                        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white font-medium text-xs px-4 py-2.5 rounded-xl shadow-xl z-50 backdrop-blur-sm border border-white/10 flex items-center gap-2 transition-all duration-300 animate-bounce w-max max-w-[90%]">
                            <i className="fa-solid fa-circle-info text-sky-400"></i> {toastMessage}
                        </div>
                    )}

                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl border">
                                <h3 className="font-bold text-sm mb-1 text-gray-800">📌 排入行程表</h3>
                                <p className="text-xs text-gray-400 mb-4">將此景點/商品設定時間加入行程。</p>
                                <div className="space-y-3 mb-5">
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-bold text-gray-600">選擇天數</label>
                                        <select className="p-2 border rounded-lg bg-white text-sm" value={modalDayChoice} onChange={e => setModalDayChoice(e.target.value)}>
                                            {uniqueDays.map(d => <option key={d} value={d}>{d}</option>)}
                                            <option value="__CUSTOM__">+ 手動建立新天數</option>
                                        </select>
                                    </div>
                                    {modalDayChoice === '__CUSTOM__' && (
                                        <div className="flex flex-col gap-1">
                                            <label className="text-xs font-bold text-gray-600">手動輸入天數代碼</label>
                                            <input type="text" placeholder="例如: Day 4" className="p-2 border rounded-lg text-sm bg-white" value={modalCustomDay} onChange={e => setModalCustomDay(e.target.value)} />
                                        </div>
                                    )}
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-bold text-gray-600">預計時間</label>
                                        <input type="time" className="p-2 border rounded-lg text-sm bg-white" value={modalTime} onChange={e => setModalTime(e.target.value)} />
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={confirmAddToItinerary} className="flex-1 py-2 rounded-xl text-white font-bold text-xs shadow-md" style={{ backgroundColor: COLORS.mediumBlue }}>確認加入</button>
                                    <button onClick={() => { setAddToItinModal({isOpen: false, item: null}); setModalCustomDay(''); }} className="px-4 py-2 rounded-xl bg-gray-100 text-gray-500 font-bold text-xs">取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
