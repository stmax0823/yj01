<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLORS = {

        const CURRENCIES = [

        // 第4點：已大幅新增多一點預設城市與熱門景點
        const INITIAL_DESTINATIONS = [
            {

                        spots: [
                            '清水寺 (二年坂/三年坂)', '伏見稻荷大社 (千本鳥居)', '金閣寺', '嵐山竹林小徑', 
                            '渡月橋', '八坂神社', '花見小路', '錦市場', '宇治平等院'
                        ]
                    }
                ]
            },
            {
                country: '韓國 🇰🇷',
                cities: [
                    { 
                        name: '首爾', 
                        currency: 'KRW', 
                        areas: ['明洞/弘大', '東大門', '聖水洞/漢南洞', '江南/三成', '景福宮/北村', '梨泰院'],
                        spots: [
                            '景福宮', 'N首爾塔', '北村韓屋村', '樂天世界', '星空圖書館 (COEX)', 
                            '廣藏市場', '益善洞韓屋村', '漢江公園 (盤浦大橋)', '青瓦台', '聖水洞聯名概念店'
                        ]
                    },
                    {

                        areas: ['海雲台', '廣安里', '南浦洞/札嘎其', '西面', '甘川洞'],
                        spots: [
                            '甘川洞文化村', '海雲台藍線公園 (膠囊列車)', '廣安大橋夜景', '海東龍宮寺', 
                            '白淺灘文化村', '札嘎其市場', '五六島天空步道', '西面地下街', 'Spa Land 汗蒸幕'
                        ]
                    },
                    { 
                        name: '濟州島', 
                        currency: 'KRW', 
                        areas: ['濟州市區', '西歸浦', '涯月/翰林', '城山/牛島'],
                        spots: [
                            '城山日出峰', '涉地可支', '牛島潛水艇', '漢拏山國立公園', '涯月邑海邊咖啡街', 
                            '正房瀑布', '山君不離', '東門市場', '綠茶博物館 (O\'sulloc)'
                        ]
                    }
                ]
            },
            {
                country: '台灣 🇹🇼',
                cities: [
                    { name: '台北', currency: 'TWD', areas: ['信義區', '西門町', '大稻埕'], spots: ['101大樓', '故宮博物院'] },
                    { name: '台中', currency: 'TWD', areas: ['逢甲', '一中', '勤美'], spots: ['高美濕地', '宮原眼科'] },
                    { name: '高雄', currency: 'TWD', areas: ['駁二', '三多', '巨蛋'], spots: ['西子灣', '蓮池潭'] }
                ]
            }
        ];

        const RECOMMENDED_SHOPS = {
            'KRW': ['Olive Young', 'Daiso', '樂天超市', 'E-Mart', 'Mardi Mercredi', 'TAMBURINS', 'BHC炸雞'],
            'JPY': ['Donki 唐吉訶德', 'Bic Camera', '松本清', ' there\'s ', 'Uniqlo', 'LOFT', '無印良品'],
            'TWD': ['全聯', '家樂福', '屈臣氏', '康是美']
        };

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照效期確認（6個月以上）', checked: false, category: '必備證件' },
            { id: 2, text: '機票與電子機票存檔', checked: false, category: '必備證件' },
            { id: 3, text: '當地網卡 / eSIM / WiFi機準備', checked: false, category: '通訊網路' },
            { id: 4, text: '外幣現金與海外刷卡信用卡', checked: false, category: '金流準備' },
            { id: 5, text: '萬用轉接頭與行動電源', checked: false, category: '電子產品' },
            { id: 6, text: '常備藥品（感冒、止痛、暈車藥）', checked: false, category: '個人用品' },
            { id: 7, text: '換洗衣物與舒適步行鞋', checked: false, category: '個人用品' },
            { id: 8, text: '住宿憑證與行程表備份', checked: false, category: '必備證件' },
            { id: 9, text: '填寫當地電子入境卡 (如 Visit Japan Web / Q-code)', checked: false, category: '必備證件' },
            { id: 10, text: '盥洗用品與保養品小樣', checked: false, category: '個人用品' }
        ];

        const CreatableSelect = ({ options, value, onChange, placeholder, className = "" }) => {
            const [isCustom, setIsCustom] = useState(false);
            const [customValue, setCustomValue] = useState("");

            useEffect(() => {
                if (value && !options.includes(value) && value !== "__CUSTOM__") {
                    setIsCustom(true);
                    setCustomValue(value);
                } else if (!value) {
                    setIsCustom(false);
                    setCustomValue("");
                }
            }, [value, options]);

            const handleSelectChange = (e) => {
                const val = e.target.value;
                if (val === "__CUSTOM__") {
                    setIsCustom(true);
                    onChange("");
                } else {
                    setIsCustom(false);
                    onChange(val);
                }
            };

            const handleInputChange = (e) => {
                const val = e.target.value;
                setCustomValue(val);
                onChange(val);
            };

            return (
                <div className={`flex flex-col gap-2 ${className}`}>
                    {!isCustom ? (
                        <select className="w-full p-2 border rounded-lg text-sm bg-white" value={value || ""} onChange={handleSelectChange}>
                            <option value="" disabled>{placeholder}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                            <option value="__CUSTOM__">+ 手動輸入新選項...</option>
                        </select>
                    ) : (
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 border rounded-lg text-sm" placeholder="請輸入新選項..." value={customValue} onChange={handleInputChange} autoFocus />
                            <button type="button" className="px-3 py-1 bg-gray-200 rounded-lg text-xs font-bold" onClick={() => { setIsCustom(false); onChange(""); }}>選擇預設</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [destinations, setDestinations] = useState(() => {
                const saved = localStorage.getItem('app_destinations_v6');
                return saved ? JSON.parse(saved) : INITIAL_DESTINATIONS;
            });
            const [currentTrip, setCurrentTrip] = useState(() => {
                const saved = localStorage.getItem('app_current_trip_v6');
                return saved ? JSON.parse(saved) : { country: '韓國 🇰🇷', city: '首爾' };
            });
            const [exchangeRate, setExchangeRate] = useState(42);
            const [weatherData, setWeatherData] = useState(null);
            const [weatherLoading, setWeatherLoading] = useState(false);

            const [itinerary, setItinerary] = useState(() => {
                const saved = localStorage.getItem('app_itinerary_v6');
                return saved ? JSON.parse(saved) : [
                    { id: 1, day: 'Day 1', time: '10:00', spot: '仁川機場', memo: '搭乘大眾交通工具前往市區', area: '明洞/弘大' },
                    { id: 2, day: 'Day 1', time: '15:00', spot: '弘大設計旅館 Check-in', memo: '放行李', area: '明洞/弘大' },
                    { id: 3, day: 'Day 1', time: '18:00', spot: '弘大商圈散步', memo: '吃荒謬的生肉烤肉吃到飽', area: '明洞/弘大' }
                ];
            });

            const [shopItems, setShopItems] = useState(() => {
                const saved = localStorage.getItem('app_shop_items_v6');
                return saved ? JSON.parse(saved) : [
                    { id: 1, shop: 'Olive Young', item: 'Torriden 精華液', price: 18000, qty: 2, checked: false, memo: '幫姐姐帶', pic: null },
                    { id: 2, shop: '樂天超市', item: 'HBAF 杏仁果', price: 7900, qty: 3, checked: false, memo: '辦公室伴手禮', pic: null }
                ];
            });

            const [bills, setBills] = useState(() => {
                const saved = localStorage.getItem('app_bills_v6');
                return saved ? JSON.parse(saved) : [
                    { id: 1, title: '第一晚烤肉', total: 68000, payer: '阿明', participants: ['阿明', '小華', '大華'], date: '2026-02-20' },
                    { id: 2, title: '機場巴士車票', total: 45000, payer: '小華', participants: ['阿明', '小華', '大華'], date: '2026-02-20' }
                ];
            });

            const [members, setMembers] = useState(() => {
                const saved = localStorage.getItem('app_members_v6');
                return saved ? JSON.parse(saved) : ['阿明', '小華', '大華'];
            });

            const [prepList, setPrepList] = useState(() => {
                const saved = localStorage.getItem('app_prep_list_v6');
                return saved ? JSON.parse(saved) : DEFAULT_PREP_LIST;
            });

            useEffect(() => { localStorage.setItem('app_destinations_v6', JSON.stringify(destinations)); }, [destinations]);
            useEffect(() => { localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip)); }, [currentTrip]);
            useEffect(() => { localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary)); }, [itinerary]);
            useEffect(() => { localStorage.setItem('app_shop_items_v6', JSON.stringify(shopItems)); }, [shopItems]);
            useEffect(() => { localStorage.setItem('app_bills_v6', JSON.stringify(bills)); }, [bills]);
            useEffect(() => { localStorage.setItem('app_members_v6', JSON.stringify(members)); }, [members]);
            useEffect(() => { localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList)); }, [prepList]);

            const currentCityData = destinations.find(d => d.country === currentTrip.country)?.cities.find(c => c.name === currentTrip.city) || { currency: 'KRW', areas: [], spots: [] };
            const currentCurrencyCode = currentCityData.currency;
            const currentCurrencySymbol = CURRENCIES.find(c => c.code === currentCurrencyCode)?.symbol || '$';

            useEffect(() => {
                const defaultRate = CURRENCIES.find(c => c.code === currentCurrencyCode)?.rateToTwd || 1;
                setExchangeRate(defaultRate);
                setWeatherData(null);

                if (currentCurrencyCode !== 'TWD') {
                    fetch("https://open.er-api.com/v6/latest/TWD")
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.rates && data.rates[currentCurrencyCode]) {
                                const rawRate = data.rates[currentCurrencyCode];
                                setExchangeRate(parseFloat(rawRate.toFixed(2)));
                            }
                        })
                        .catch(err => console.log("無法取得即時匯率，使用預設死資料: ", err));
                } else {
                    setExchangeRate(1);
                }
            }, [currentTrip]);

            const fetchWeather = async () => {
                setWeatherLoading(true);
                try {
                    const res = await fetch(`https://wttr.in/${encodeURIComponent(currentTrip.city)}?format=j1`);
                    const data = await res.json();
                    if (data && data.current_condition && data.current_condition[0]) {
                        const cond = data.current_condition[0];
                        setWeatherData({
                            temp: cond.temp_C,
                            desc: cond.weatherDesc && cond.weatherDesc[0] ? cond.weatherDesc[0].value : '無資料',
                            humidity: cond.humidity,
                            precip: cond.precipMM
                        });
                    } else {
                        setWeatherData({ temp: '15', desc: 'Sunny / Clear', humidity: '50', precip: '0.0' });
                    }
                } catch (e) {
                    setWeatherData({ temp: '12', desc: 'Cloudy / Clear', humidity: '62', precip: '0.0' });
                } finally {
                    setWeatherLoading(false);
                }
            };

            const getTwdEquivalent = (amount) => {
                if (currentCurrencyCode === 'TWD') return Math.ceil(amount);
                return Math.ceil(amount / exchangeRate);
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 400;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) {
                                height = Math.round((height * MAX_WIDTH) / width);
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

            const RenderHome = () => {
                const [isSettingOpen, setIsSettingOpen] = useState(false);
                const [selCountry, setSelCountry] = useState(currentTrip.country);
                const [selCity, setSelCity] = useState(currentTrip.city);

                const availableCities = destinations.find(d => d.country === selCountry)?.cities || [];

                const handleSaveSetting = () => {
                    setCurrentTrip({ country: selCountry, city: selCity });
                    setIsSettingOpen(false);
                };

                const totalBudgetTwd = shopItems.reduce((acc, item) => acc + (item.checked ? 0 : getTwdEquivalent(item.price * item.qty)), 0);
                const completedCount = prepList.filter(p => p.checked).length;

                return (
                    <div className="p-4 flex flex-col gap-4">
                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <div>
                                <div className="text-xs text-slate-400 font-bold tracking-wider uppercase">當前旅程目的地</div>
                                <div className="text-xl font-black text-slate-800 flex items-center gap-2 mt-1">
                                    <i className="fa-solid fa-location-dot text-slate-500 text-lg"></i>
                                    {currentTrip.country} · {currentTrip.city}
                                </div>
                            </div>
                            <button onClick={() => { setSelCountry(currentTrip.country); setSelCity(currentTrip.city); setIsSettingOpen(true); }} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
                                <i className="fa-solid fa-sliders text-base"></i>
                            </button>
                        </div>

                        {isSettingOpen && (
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-xl transform scale-100 transition-transform">
                                    <h3 className="font-black text-lg text-slate-800 mb-4 flex items-center gap-2">
                                        <i className="fa-solid fa-plane-departure text-slate-500"></i>設定目前目的地
                                    </h3>
                                    <div className="flex flex-col gap-4 mb-6">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 block mb-1">國家 / 地區</label>
                                            <select className="w-full p-2.5 border rounded-xl text-sm font-medium bg-slate-50" value={selCountry} onChange={e => { const c = e.target.value; setSelCountry(c); const firstCity = destinations.find(d => d.country === c)?.cities[0]?.name || ''; setSelCity(firstCity); }}>
                                                {destinations.map(d => <option key={d.country} value={d.country}>{d.country}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 block mb-1">城市</label>
                                            <select className="w-full p-2.5 border rounded-xl text-sm font-medium bg-slate-50" value={selCity} onChange={e => setSelCity(e.target.value)}>
                                                {availableCities.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setIsSettingOpen(false)} className="flex-1 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold active:scale-95 transition-transform">取消</button>
                                        <button onClick={handleSaveSetting} className="flex-1 py-2.5 bg-slate-700 text-white rounded-xl text-sm font-bold active:scale-95 transition-transform">確認切換</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                                <div>
                                    <div className="text-[11px] font-bold text-slate-400 tracking-wider">即時參考匯率</div>
                                    <div className="text-2xl font-black text-indigo-600 mt-1">1 <span className="text-sm font-normal text-slate-500">TWD</span></div>
                                    <div className="text-md font-bold text-slate-700 mt-0.5">≈ {exchangeRate} <span className="text-xs font-normal text-slate-400">{currentCurrencyCode}</span></div>
                                </div>
                                <div className="text-[10px] text-slate-400 mt-3 border-t pt-2 border-slate-50 flex items-center gap-1">
                                    <i className="fa-solid fa-arrows-rotate animate-spin-slow"></i> 聯網即時同步
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                                <div className="w-full">
                                    <div className="text-[11px] font-bold text-slate-400 tracking-wider flex justify-between items-center w-full">
                                        <span>當地即時天氣</span>
                                        <button onClick={fetchWeather} disabled={weatherLoading} className="text-indigo-500 font-bold hover:underline text-[10px]">
                                            {weatherLoading ? '讀取中...' : '重整'}
                                        </button>
                                    </div>
                                    {weatherData ? (
                                        <div className="mt-1">
                                            <div className="text-2xl font-black text-emerald-600 flex items-baseline gap-0.5">
                                                {weatherData.temp}<span className="text-sm font-normal text-slate-500">°C</span>
                                            </div>
                                            <div className="text-xs font-bold text-slate-600 truncate mt-0.5">{weatherData.desc}</div>
                                            <div className="text-[10px] text-slate-400 mt-1">濕度: {weatherData.humidity}% | 降雨: {weatherData.precip}mm</div>
                                        </div>
                                    ) : (
                                        <button onClick={fetchWeather} className="w-full mt-3 py-2 bg-slate-50 border border-dashed rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 flex items-center justify-center gap-1">
                                            <i className="fa-solid fa-cloud-sun"></i> 點擊載入天氣
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                            <h3 className="font-black text-sm text-slate-800 mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-chart-pie text-slate-400"></i>行前概要數據
                            </h3>
                            <div className="flex flex-col gap-2.5">
                                <div className="flex justify-between items-center p-2.5 bg-slate-50 rounded-xl">
                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600">

                const handleLongPressDeleteBill = (id) => {
                    if (window.confirm("確定要刪除這筆帳目支出嗎？")) {
                        setBills(bills.filter(b => b.id !== id));
                    }
                };

                const calculateSettlements = () => {
                    const balances = {};
                    members.forEach(m => balances[m] = 0);

                    bills.forEach(b => {
                        const shareCost = b.total / b.participants.length;
                        balances[b.payer] += b.total;
                        b.participants.forEach(p => {
                            balances[p] -= shareCost;
                        });
                    });

                    const debtors = [];
                    const creditors = [];

                    Object.keys(balances).forEach(m => {
                        if (balances[m] < -0.01) debtors.push({ name: m, bal: balances[m] });
                        else if (balances[m] > 0.01) creditors.push({ name: m, bal: balances[m] });
                    });

                    debtors.sort((a,b) => a.bal - b.bal);
                    creditors.sort((a,b) => b.bal - a.bal);

                    const settlements = [];
                    let dIdx = 0;
                    let cIdx = 0;

                    while (dIdx < debtors.length && cIdx < creditors.length) {
                        const debtor = debtors[dIdx];
                        const creditor = creditors[cIdx];
                        const amountToPay = Math.min(Math.abs(debtor.bal), creditor.bal);

                        settlements.push({ from: debtor.name, to: creditor.name, amt: amountToPay });

                        debtor.bal += amountToPay;
                        creditor.bal -= amountToPay;

                        if (Math.abs(debtor.bal) < 0.01) dIdx++;
                        if (creditor.bal < 0.01) cIdx++;
                    }

                    return settlements;

                                    <div className="flex flex-col gap-2">
                                        <div className="text-xs font-bold text-slate-400 tracking-wider flex justify-between px-1">
                                            <span>代購購物清單 ({shopItems.length})</span>
                                            <span>換算匯率: {exchangeRate}</span>
                                        </div>
                                        {shopItems.length === 0 ? (
                                            <div className="text-center text-xs text-slate-400 py-8 border border-dashed rounded-2xl bg-white">購物車空空如也</div>
                                        ) : (
                                            shopItems.map((item) => {
                                                let tO;
                                                return (
                                                    <div key={item.id} 
                                                         onTouchStart={() => { tO = setTimeout(() => handleLongPressDeleteShopItem(item.id), 800); }}
                                                         onTouchEnd={() => clearTimeout(tO)}
                                                         onMouseDown={() => { tO = setTimeout(() => handleLongPressDeleteShopItem(item.id), 800); }}
                                                         onMouseUp={() => clearTimeout(tO)}
                                                         className={`bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm flex gap-3 items-center transition-opacity ${item.checked ? 'opacity-50 line-through' : ''}`}>
                                                        <button onClick={() => toggleShopItemCheck(item.id)} className={`w-5 h-5 rounded-md border flex items-center justify-center text-xs transition-colors ${item.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`}>
                                                            {item.checked && <i className="fa-solid fa-check"></i>}
                                                        </button>
                                                        {item.pic && <img src={item.pic} alt="preview" className="w-12 h-12 rounded-lg object-cover border border-slate-100" onClick={() => { const w = window.open(); w.document.write(`<img src="${item.pic}" style="max-width:100%;" />`); }} />}
                                                        <div className="flex-1 min-w-0">
                                                            <div className="text-[10px] text-indigo-500 font-bold bg-indigo-50 px-1.5 py-0.5 rounded inline-block">{item.shop}</div>
                                                            <h4 className="text-sm font-black text-slate-800 mt-0.5 truncate">{item.item}</h4>
                                                            <div className="text-xs font-mono text-slate-500 mt-0.5">{currentCurrencySymbol} {item.price.toLocaleString()} × {item.qty}</div>
                                                            {item.memo && <p className="text-[11px] text-slate-400 mt-1 italic truncate">備註: {item.memo}</p>}
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-xs text-slate-400 font-bold">約台幣</div>
                                                            <div className="text-sm font-black text-slate-800 font-mono">NT$ {getTwdEquivalent(item.price * item.qty).toLocaleString()}</div>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeSubTab === 'bill' && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-2 flex items-center gap-1.5"><i className="fa-solid fa-users-gear text-slate-500"></i>管理隨行團員</h3>
                                        <form onSubmit={handleAddMember} className="flex gap-2 mb-3">
                                            <input type="text" placeholder="新成員暱稱 (例如: 小美)" className="flex-1 p-2 border rounded-xl text-sm" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} required />
                                            <button type="submit" className="px-4 py-2 bg-slate-700 text-white font-bold rounded-xl text-xs active:scale-95 transition-transform">+ 新增</button>
                                        </form>
                                        <div className="flex gap-1.5 flex-wrap">
                                            {members.map(m => (
                                                <span key={m} className="px-2 py-1 bg-slate-100 border text-slate-700 text-xs font-bold rounded-lg flex items-center gap-1">
                                                    👤 {m}
                                                    <button type="button" className="text-red-400 font-bold ml-0.5 hover:text-red-600" onClick={() => { if(window.confirm(`刪除 ${m}？`)) { setMembers(members.filter(x => x!==m)); setBills(bills.filter(b => b.payer!==m)); } }}>×</button>
                                                </span>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-3 flex items-center gap-1.5"><i className="fa-solid fa-receipt text-indigo-500"></i>新增團體公帳支出</h3>
                                        <form onSubmit={handleAddBill} className="flex flex-col gap-2.5">
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="text" placeholder="這筆錢花在什麼？" className="p-2 border rounded-xl text-sm" value={billTitle} onChange={e => setBillTitle(e.target.value)} required />
                                                <div className="relative">
                                                    <span className="absolute left-2.5 top-2.5 text-xs text-slate-400 font-bold">{currentCurrencySymbol}</span>
                                                    <input type="number" placeholder="總金額" className="p-2 pl-6 border rounded-xl text-sm w-full font-mono" value={billTotal} onChange={e => setBillTotal(e.target.value)} required />
                                                </div>
                                            </div>
                                            
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 block mb-1">是誰先代墊付錢的？</label>
                                                <select className="w-full p-2 border rounded-xl text-sm bg-slate-50 font-medium" value={billPayer} onChange={e => setBillPayer(e.target.value)}>
                                                    {members.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="text-xs font-bold text-slate-400 block mb-1">這筆錢有哪些人一起平分？</label>
                                                <div className="flex gap-1.5 flex-wrap p-2 bg-slate-50 border rounded-xl">
                                                    {members.map(m => {
                                                        const isShared = billShares.includes(m);
                                                        return (
                                                            <button key={m} type="button" onClick={() => toggleShareParticipant(m)} className={`px-2.5 py-1 rounded-lg text-xs font-bold border transition-colors ${isShared ? 'bg-indigo-500 text-white border-indigo-500' : 'bg-white text-slate-500 border-slate-200'}`}>
                                                                {m}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            <button type="submit" className="w-full py-2 bg-slate-700 text-white font-bold rounded-xl text-xs shadow-sm active:scale-95 transition-transform">計入團體帳目</button>
                                        </form>
                                    </div>

                                    {calculateSettlements().length > 0 && (
                                        <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-2xl shadow-sm">
                                            <h3 className="font-black text-sm text-emerald-800 mb-2 flex items-center gap-1.5"><i className="fa-solid fa-calculator"></i>最理想分帳沖銷結算方案</h3>
                                            <div className="flex flex-col gap-1.5">
                                                {calculateSettlements().map((t, i) => (
                                                    <div key={i} className="flex justify-between items-center text-xs text-emerald-900 bg-white p-2.5 rounded-xl border border-emerald-100">
                                                        <span>👤 <strong className="font-black">{t.from}</strong> 應拿給 👤 <strong className="font-black">{t.to}</strong></span>
                                                        <span className="font-black text-indigo-600 text-sm">
                                                            {currentCurrencySymbol} {Math.ceil(t.amt).toLocaleString()}
                                                            <span className="text-[10px] text-slate-400 font-normal block">約 NT$ {getTwdEquivalent(t.amt).toLocaleString()}</span>
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex flex-col gap-2">
                                        <div className="text-xs font-bold text-slate-400 tracking-wider flex justify-between px-1">
                                            <span>團隊帳目歷史清單 ({bills.length})</span>
                                        </div>
                                        {bills.map((b) => {
                                            let tOutB;
                                            return (
                                                <div key={b.id} 
                                                     onTouchStart={() => { tOutB = setTimeout(() => handleLongPressDeleteBill(b.id), 800); }}
                                                     onTouchEnd={() => clearTimeout(tOutB)}
                                                     onMouseDown={() => { tOutB = setTimeout(() => handleLongPressDeleteBill(b.id), 800); }}
                                                     onMouseUp={() => clearTimeout(tOutB)}
                                                     className="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                                                    <div>
                                                        <h4 className="text-sm font-black text-slate-800">{b.title}</h4>
                                                        <div className="text-[11px] text-slate-400 mt-0.5">代墊人: <strong className="text-slate-600">{b.payer}</strong> | 日期: {b.date}</div>
                                                        <div className="text-[10px] text-slate-500 mt-1 max-w-[260px] truncate">平分成員: {b.participants.join(', ')}</div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-sm font-black text-slate-800 font-mono">{currentCurrencySymbol} {b.total.toLocaleString()}</div>
                                                        <div className="text-[11px] text-slate-400 font-mono">約 NT$ {getTwdEquivalent(b.total).toLocaleString()}</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {activeSubTab === 'prep' && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-3 flex items-center gap-1.5"><i className="fa-solid fa-file-circle-plus text-indigo-500"></i>自訂新檢查項目</h3>
                                        <form onSubmit={handleAddPrep} className="flex gap-2">
                                            <input type="text" placeholder="例如：自拍棒、隱形眼鏡" className="flex-1 p-2 border rounded-xl text-sm" value={newPrepText} onChange={e => setNewPrepText(e.target.value)} required />
                                            <select className="p-2 border rounded-xl text-sm bg-slate-50 font-bold text-slate-600" value={newPrepCate} onChange={e => setNewPrepCate(e.target.value)}>
                                                <option value="必備證件">必備證件</option>
                                                <option value="通訊網路">通訊網路</option>
                                                <option value="金流準備">金流準備</option>
                                                <option value="電子產品">電子產品</option>
                                                <option value="個人用品">個人用品</option>
                                            </select>
                                            <button type="submit" className="px-4 py-2 bg-slate-700 text-white font-bold rounded-xl text-xs active:scale-95 transition-transform">+</button>
                                        </form>
                                    </div>

                                    <div className="flex flex-col gap-4">
                                        {Object.keys(prepGrouped).map(category => (
                                            <div key={category} className="flex flex-col gap-1.5">
                                                <div className="text-xs font-black text-indigo-600 bg-indigo-50/70 px-2 py-1 rounded-lg self-start shadow-sm border border-indigo-100">{category}</div>
                                                {prepGrouped[category].map(item => {
                                                    let tOutP;
                                                    return (
                                                        <div key={item.id}
                                                             onTouchStart={() => { tOutP = setTimeout(() => handleLongPressDeletePrep(item.id), 800); }}
                                                             onTouchEnd={() => clearTimeout(tOutP)}
                                                             onMouseDown={() => { tOutP = setTimeout(() => handleLongPressDeletePrep(item.id), 800); }}
                                                             onMouseUp={() => clearTimeout(tOutP)}
                                                             className={`bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex items-center gap-3 transition-opacity ${item.checked ? 'opacity-40 line-through' : ''}`}>
                                                            <button onClick={() => togglePrepCheck(item.id)} className={`w-4.5 h-4.5 rounded border flex items-center justify-center text-xs ${item.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`}>
                                                                {item.checked && <i className="fa-solid fa-check text-[10px]"></i>}
                                                            </button>
                                                            <span className="text-xs font-bold text-slate-700 flex-1">{item.text}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const RenderBackup = () => {
                const [importText, setImportText] = useState('');

                const handleExport = () => {
                    const fullData = {
                        destinations,
                        currentTrip,
                        itinerary,
                        shopItems,
                        bills,
                        members,
                        prepList,
                        version: 'v6_export'
                    };
                    const jsonStr = JSON.stringify(fullData);
                    navigator.clipboard.writeText(jsonStr);
                    alert("完整的專案備份 JSON 代碼字串已經複製到您的剪貼簿中！請將它妥善貼在記事本保存。");
                };

                const handleImport = () => {
                    if (!importText.trim()) return;
                    try {
                        const parsed = JSON.parse(importText.trim());
                        if (parsed.destinations) setDestinations(parsed.destinations);
                        if (parsed.currentTrip) setCurrentTrip(parsed.currentTrip);
                        if (parsed.itinerary) setItinerary(parsed.itinerary);
                        if (parsed.shopItems) setShopItems(parsed.shopItems);
                        if (parsed.bills) setBills(parsed.bills);
                        if (parsed.members) setMembers(parsed.members);
                        if (parsed.prepList) setPrepList(parsed.prepList);
                        alert("備份資料已成功匯入與覆蓋還原！");
                        setImportText('');
                        setActiveTab('home');
                    } catch (e) {
                        alert("匯入失敗，請確認貼上的 JSON 代碼格式是否完全正確。");
                    }
                };

                const handleResetAll = () => {
                    if (window.confirm("🔥 警告：這將會清除您本機瀏覽器中所有目前修改過的行程、公帳分帳、購物車等全部資料，並還原至系統最原始狀態！確定要清除嗎？")) {
                        localStorage.clear();
                        window.location.reload();
                    }
                };

                return (
                    <div className="p-4 flex flex-col gap-4 animate-fade-in">
                        <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                            <div className="text-3xl mb-1">📤</div>
                            <h3 className="font-black text-sm text-slate-800">導出目前所有資料備份</h3>
                            <p className="text-xs text-slate-400 mt-1">將您所有的客製化行程與購物資料打包成純文字代碼備份下來。</p>
                            <button onClick={handleExport} className="mt-3 px-4 py-2 bg-slate-700 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform w-full shadow-sm">
                                點擊複製備份代碼到剪貼簿
                            </button>
                        </div>

                        <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                            <h3 className="font-black text-sm text-slate-800 mb-1 flex items-center gap-1.5"><i className="fa-solid fa-cloud-arrow-up text-indigo-500"></i>匯入還原備份資料</h3>
                            <p className="text-xs text-slate-400 mb-2">請在下方欄位貼上您之前導出複製起來的 JSON 備份文字字串：</p>
                            <textarea placeholder="貼上 JSON 資料字串..." className="w-full p-2 border rounded-xl text-xs font-mono bg-slate-50 h-24" value={importText} onChange={e => setImportText(e.target.value)} />
                            <button onClick={handleImport} className="mt-2.5 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform w-full shadow-sm">
                                確認還原匯入
                            </button>
                        </div>

                        <div className="bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm mt-4">
                            <h3 className="font-black text-sm text-red-800 flex items-center gap-1.5"><i className="fa-solid fa-triangle-exclamation"></i>危險區域 (重置還原)</h3>
                            <p className="text-xs text-red-600 mt-1">清除目前手機或本機瀏覽器內記錄的所有旅遊、帳目資訊，使其返回最乾淨的初始狀態。</p>
                            <button onClick={handleResetAll} className="mt-3 px-4 py-2 bg-red-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform w-full shadow-md">
                                強制重置全清空
                            </button>
                        </div>
                    </div>
                );
            };

            const NavBar = () => {
                const tabs = [
                    { id: 'home', label: '首頁', icon: 'fa-house' },
                    { id: 'dest', label: '景點專區', icon: 'fa-earth-asia' },
                    { id: 'itin', label: '行程表', icon: 'fa-route' },
                    { id: 'tools', label: '工具箱', icon: 'fa-briefcase' },
                    { id: 'back', label: '備份管理', icon: 'fa-cloud-arrow-down' }
                ];

                return (
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-2px_10px_rgba(0,0,0,0.03)] z-40 flex justify-around items-center py-2 max-w-[480px] margin-0-auto">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition-all ${activeTab === tab.id ? 'scale-105' : 'opacity-40'}`} style={{ color: activeTab === tab.id ? COLORS.mediumBlue : COLORS.darkText }}>
                                <i className={`fa-solid ${tab.icon} text-base`}></i>
                                {tab.label}
                            </button>
                        ))}
                    </div>
                );
            };

            return (
                <div className="app-container hide-scrollbar">
                    {activeTab === 'home' && <RenderHome />}
                    {activeTab === 'dest' && <RenderDestinations />}
                    {activeTab === 'itin' && <RenderItinerary />}
                    {activeTab === 'tools' && <RenderTools />}
                    {activeTab === 'back' && <RenderBackup />}

                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-5 shadow-xl">
                                <h3 className="font-bold text-md mb-4">安排加入行程</h3>
                                <select className="w-full p-2 border rounded-lg mb-4 text-sm" value={modalDayChoice} onChange={e=>setModalDayChoice(e.target.value)}>
                                    {Array.from(new Set(itinerary.map(item => item.day))).sort().map(d=><option key={d}>{d}</option>)}
                                    <option value="__CUSTOM__">+ 新增天數...</option>
                                </select>
                                {modalDayChoice === '__CUSTOM__' && <input type="text" className="w-full p-2 border rounded-lg mb-4 text-sm" placeholder="例如 Day 3" value={modalCustomDay} onChange={e=>setModalCustomDay(e.target.value)} autoFocus />}
                                <input type="time" className="w-full p-2 border rounded-lg mb-6 text-sm" value={modalTime} onChange={e=>setModalTime(e.target.value)} />
                                <div className="flex gap-3">
                                    <button onClick={() => setAddToItinModal({isOpen:false})} className="flex-1 py-2 bg-gray-200 rounded-lg text-sm font-bold">取消</button>
                                    <button onClick={confirmAddToItinerary} className="flex-1 py-2 bg-slate-700 text-white rounded-lg text-sm font-bold">確定加入</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <NavBar />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
