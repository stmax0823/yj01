<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手５.0 </title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手2.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #F0ECDD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-w: 480px; margin: 0 auto; background-color: #F0ECDD; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#F0ECDD', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#23354D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        // 擴充對應英文名稱，用來查國際天氣天氣
        const CITY_MAP_EN = { '首爾': 'Seoul', '釜山': 'Busan', '東京': 'Tokyo', '大阪': 'Osaka', '曼谷': 'Bangkok', '清邁': 'Chiang+Mai', '台北': 'Taipei', '台中': 'Taichung' };

        const INITIAL_DESTINATIONS = {
            '韓國': { '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門'], '釜山': ['西面', '南浦洞', '海雲台'] },
            '日本': { '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿'], '大阪': ['梅田', '難波', '心齋橋'] },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        };
        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'TAMBURINS', 'Mardi Mercredi'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康美', '家樂福', '新光三越']
        };
        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期 > 6個月) & 簽證', checked: false },
            { id: 2, text: '外幣現金 & 信用卡 (確認海外回饋與開通)', checked: false },
            { id: 3, text: '當地網卡 / eSIM / 電信漫遊設定', checked: false },
            { id: 4, text: '萬用轉接頭 & 行動電源、充電線', checked: false },
            { id: 5, text: '隨身常備藥 (感冒、腸胃、止痛)', checked: false },
            { id: 6, text: '個人盥洗用品 / 保養品 / 防曬', checked: false },
            { id: 7, text: '機票與住宿憑證 (建議存一份截圖)', checked: false }
        ];

        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return 0;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        const CreatableSelect = ({ label, options = [], value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            const handleSave = () => { if (newValue.trim()) { onAddOption(newValue.trim()); onChange(newValue.trim()); } setIsAdding(false); setNewValue(''); };

            if (isAdding) {
                return (
                    <div className="flex flex-col gap-1 mb-3">
                        <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label} (自訂新增)</label>
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 rounded-lg border text-sm" value={newValue} onChange={(e) => setNewValue(e.target.value)} autoFocus />
                            <button onClick={handleSave} className="p-2 rounded-lg text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-check"></i></button>
                            <button onClick={() => setIsAdding(false)} className="p-2 rounded-lg bg-gray-300 text-gray-700"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-1 mb-3">
                    <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label}</label>
                    <select className="p-2 rounded-lg border bg-white text-sm" style={{ color: COLORS.darkText }} value={value} onChange={(e) => { if (e.target.value === '__ADD_NEW__') setIsAdding(true); else onChange(e.target.value); }}>
                        <option value="" disabled>{placeholder}</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeight: 'bold' }}>+ 手動輸入新選項</option>
                    </select>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('destination'); 
            const [toastMessage, setToastMessage] = useState('');
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 💾 狀態管理
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6')) || INITIAL_ITEM_TYPES);

            // 🌦️ 天氣專用狀態
            const [weatherData, setWeatherData] = useState({ temp: '--', desc: '載入中...', loading: false });

            // 自動存檔
            useEffect(() => {
                localStorage.setItem('app_destinations_v6', JSON.stringify(destinations));
                localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip));
                localStorage.setItem('app_currency_v6', JSON.stringify(currency));
                localStorage.setItem('app_exchange_rate_v6', String(exchangeRate));
                localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary));
                localStorage.setItem('app_stores_v6', JSON.stringify(stores));
                localStorage.setItem('app_must_eats_v6', JSON.stringify(mustEats));
                localStorage.setItem('app_must_buys_v6', JSON.stringify(mustBuys));
                localStorage.setItem('app_shopping_list_v6', JSON.stringify(shoppingList));
                localStorage.setItem('app_split_members_v6', JSON.stringify(splitMembers));
                localStorage.setItem('app_split_expenses_v6', JSON.stringify(splitExpenses));
                localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList));
                localStorage.setItem('app_food_types_v6', JSON.stringify(foodTypes));
                localStorage.setItem('app_item_types_v6', JSON.stringify(itemTypes));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList]);

            // 🌍 即時免費天氣抓取邏輯 (wttr.in API)
            useEffect(() => {
                if (!currentTrip.city) return;
                const cityEn = CITY_MAP_EN[currentTrip.city] || currentTrip.city;
                setWeatherData(prev => ({ ...prev, loading: true, desc: '更新天氣中...' }));

                fetch(`https://wttr.in/${cityEn}?format=j1`)
                    .then(res => res.json())
                    .then(data => {
                        const current = data.current_condition[0];
                        setWeatherData({
                            temp: current.temp_C + '°C',
                            desc: current.lang_zh ? current.lang_zh[0].value : current.weatherDesc[0].value,
                            loading: false
                        });
                    })
                    .catch(() => {
                        setWeatherData({ temp: 'N/A', desc: '暫時無法取得天氣', loading: false });
                    });
            }, [currentTrip.city]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手2.0_全功能備份_${currentTrip.country}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份資料已導出！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        showToast("🎉 完整資料載入成功！");
                    } catch (err) { showToast("備份檔案解析失敗！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            // --- 頁面 1: 目的地與環境設定 (整合免費天氣) ---
            const RenderDestination = () => (
                <div className="p-4 space-y-6">
                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                        <i className="fa-solid fa-cloud-sun-rain absolute -right-4 -bottom-4 opacity-20 text-[100px]"></i>
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程環境</h2>
                        
                        <div className="mt-4 grid grid-cols-3 gap-2">
                            <div>
                                <span className="text-xs opacity-70">國家地區</span>
                                <div className="text-xl font-black truncate">{currentTrip.country || '未設定'}</div>
                            </div>
                            <div>
                                <span className="text-xs opacity-70">主要城市</span>
                                <div className="text-xl font-black truncate">{currentTrip.city || '未設定'}</div>
                            </div>
                            {/* 🌦️ 新增的免金鑰即時天氣看板 */}
                            <div className="border-l border-white/20 pl-2">
                                <span className="text-xs opacity-70">當地即時天氣</span>
                                <div className="text-sm font-black text-amber-300 flex items-center gap-1">
                                    <span>{weatherData.temp}</span>
                                </div>
                                <div className="text-[10px] opacity-90 truncate">{weatherData.desc}</div>
                            </div>
                        </div>
                        
                        <div className="mt-4 pt-3 border-t border-white/20 flex justify-between items-center text-xs">
                            <span>即時匯率設定：1 台幣 = {exchangeRate} {currency.code}</span>
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-700">
                            <i className="fa-solid fa-sliders text-indigo-500"></i> 基本參數變更
                        </h3>
                        <CreatableSelect label="選擇/新增國家" options={Object.keys(destinations)} value={currentTrip.country} onChange={(v) => { setCurrentTrip({country: v, city: ''}); const c = CURRENCIES.find(x => v==='韓國'&&x.code==='KRW' || v==='日本'&&x.code==='JPY' || v==='泰國'&&x.code==='THB' || v==='台灣'&&x.code==='TWD'); if(c) handleCurrencyChange(c.code); }} onAddOption={(newOpt) => { setDestinations({...destinations, [newOpt]: {}}); setStores({...stores, [newOpt]: []}); }} />
                        <CreatableSelect label="選擇/新增城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} />
                        
                        <div className="grid grid-cols-2 gap-2 mt-2">
                            <div className="flex flex-col gap-1">
                                <label className="text-xs font-bold text-gray-600">使用幣別</label>
                                <select className="p-2 border rounded-lg bg-white text-sm" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.name})</option>)}
                                </select>
                            </div>
                            <div className="flex flex-col gap-1">
                                <label className="text-xs font-bold text-gray-600">台幣換算匯率</label>
                                <input type="number" step="any" className="p-2 border rounded-lg text-sm" value={exchangeRate} onChange={(e) => setExchangeRate(Number(e.target.value))} />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow-sm border flex gap-2">
                        <button onClick={handleExportData} className="flex-1 py-2 rounded-lg text-white text-xs font-bold bg-emerald-600"><i className="fa-solid fa-file-export mr-1"></i> 備份導出</button>
                        <label className="flex-1 py-2 rounded-lg text-white text-xs font-bold bg-amber-600 text-center cursor-pointer">
                            <i className="fa-solid fa-file-import mr-1"></i> 備份導入
                            <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                        </label>
                    </div>
                </div>
            );

            // --- 頁面 2: 行程規劃 ---
            const RenderItinerary = () => {
                const [showAddForm, setShowAddForm] = useState(false);
                const [newItem, setNewItem] = useState({ day: 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '' });

                const handleAdd = () => {
                    if (!newItem.title) return;
                    setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day.localeCompare(b.day) || a.time.localeCompare(b.time)));
                    setNewItem({ day: newItem.day, time: '10:00', title: '', address: '', transport: '', mapUrl: '' });
                    setShowAddForm(false); showToast("成功加入行程點！");
                };

                return (
                    <div className="p-4">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-bold text-slate-800">行程規劃清單</h2>
                            <button onClick={() => setShowAddForm(!showAddForm)} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white bg-indigo-600">
                                {showAddForm ? '取消' : '+ 新增景點'}
                            </button>
                        </div>

                        {showAddForm && (
                            <div className="p-4 bg-white rounded-xl border mb-4 space-y-2">
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="天數(如 Day 1)" className="p-2 border rounded-lg text-sm" value={newItem.day} onChange={e => setNewItem({...newItem, day: e.target.value})} />
                                    <input type="time" className="p-2 border rounded-lg text-sm" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                                </div>
                                <input type="text" placeholder="行程名稱/景點名稱 (必填)" className="w-full p-2 border rounded-lg text-sm" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                <input type="text" placeholder="地址描述" className="w-full p-2 border rounded-lg text-sm" value={newItem.address} onChange={e => setNewItem({...newItem, address: e.target.value})} />
                                <input type="text" placeholder="Google地圖連結" className="w-full p-2 border rounded-lg text-sm" value={newItem.mapUrl} onChange={e => setNewItem({...newItem, mapUrl: e.target.value})} />
                                <input type="text" placeholder="交通工具與備註" className="w-full p-2 border rounded-lg text-sm" value={newItem.transport} onChange={e => setNewItem({...newItem, transport: e.target.value})} />
                                <button onClick={handleAdd} className="w-full py-2 bg-indigo-600 text-white font-bold text-sm rounded-lg">儲存至行程</button>
                            </div>
                        )}

                        <div className="space-y-3">
                            {itinerary.map(item => (
                                <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-start">
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-bold bg-slate-100 px-2 py-0.5 rounded text-indigo-700">{item.day}</span>
                                            <span className="text-xs text-gray-500">{item.time}</span>
                                        </div>
                                        <h4 className="font-bold text-slate-800">{item.title}</h4>
                                        {item.address && <p className="text-xs text-gray-600"><i className="fa-solid fa-location-dot mr-1 text-gray-400"></i>{item.address}</p>}
                                        {item.transport && <p className="text-xs text-gray-500"><i className="fa-solid fa-bus mr-1 text-gray-400"></i>{item.transport}</p>}
                                        {item.mapUrl && <a href={item.mapUrl} target="_blank" rel="noreferrer" className="inline-block mt-1 text-[11px] text-blue-600 underline"><i className="fa-solid fa-map-location-dot mr-1"></i>導航連結</a>}
                                    </div>
                                    <button onClick={() => setItinerary(itinerary.filter(x => x.id !== item.id))} className="text-gray-300 hover:text-red-500"><i className="fa-solid fa-trash text-sm"></i></button>
                                </div>
                            ))}
                            {itinerary.length === 0 && <p className="text-center text-gray-400 text-xs py-8">目前空空如也，點擊上方按鈕建立行程！</p>}
                        </div>
                    </div>
                );
            };

            // --- 頁面 3: 必去必買 ---
            const RenderMustGo = () => {
                const [showForm, setShowForm] = useState(false);
                const [eatForm, setEatForm] = useState({ name: '', district: '', type: '', url: '', image: '' });
                const [buyForm, setBuyForm] = useState({ name: '', store: '', type: '', image: '' });

                const handleImageChange = (e, target) => {
                    if (e.target.files[0]) {
                        compressImage(e.target.files[0], (base64) => {
                            if (target === 'eat') setEatForm({...eatForm, image: base64});
                            else setBuyForm({...buyForm, image: base64});
                        });
                    }
                };

                return (
                    <div className="p-4">
                        <div className="flex rounded-lg overflow-hidden mb-4 border border-indigo-600 bg-white">
                            <button className={`flex-1 py-2 font-bold text-xs ${mustGoType === 'eat' ? 'bg-indigo-600 text-white' : 'text-slate-700'}`} onClick={() => setMustGoType('eat')}>🍽️ 美食圖鑑</button>
                            <button className={`flex-1 py-2 font-bold text-xs ${mustGoType === 'buy' ? 'bg-indigo-600 text-white' : 'text-slate-700'}`} onClick={() => setMustGoType('buy')}>🛍️ 購物清單</button>
                        </div>

                        <button onClick={() => setShowForm(!showForm)} className="w-full py-2.5 rounded-lg font-bold bg-indigo-100 text-indigo-700 text-xs mb-4">
                            {showForm ? '關閉輸入視窗' : `+ 新增推薦項目`}
                        </button>

                        {showForm && mustGoType === 'eat' && (
                            <div className="bg-white p-4 rounded-xl border space-y-2 mb-4">
                                <input type="file" accept="image/*" onChange={e => handleImageChange(e, 'eat')} className="text-xs" />
                                {eatForm.image && <img src={eatForm.image} className="h-20 w-20 object-cover rounded" />}
                                <input type="text" placeholder="美食店名" className="w-full p-2 border rounded-lg text-sm" value={eatForm.name} onChange={e => setEatForm({...eatForm, name: e.target.value})} />
                                <input type="text" placeholder="所在區域" className="w-full p-2 border rounded-lg text-sm" value={eatForm.district} onChange={e => setEatForm({...eatForm, district: e.target.value})} />
                                <CreatableSelect label="美食種類" options={foodTypes} value={eatForm.type} onChange={v => setEatForm({...eatForm, type: v})} onAddOption={n => setFoodTypes([...foodTypes, n])} />
                                <input type="text" placeholder="地圖或介紹網址" className="w-full p-2 border rounded-lg text-sm" value={eatForm.url} onChange={e => setEatForm({...eatForm, url: e.target.value})} />
                                <button onClick={() => { setMustEats([...mustEats, {...eatForm, id: Date.now()}]); setEatForm({name:'',district:'',type:'',url:'',image:''}); setShowForm(false); }} className="w-full py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold">送出儲存</button>
                            </div>
                        )}

                        {showForm && mustGoType === 'buy' && (
                            <div className="bg-white p-4 rounded-xl border space-y-2 mb-4">
                                <input type="file" accept="image/*" onChange={e => handleImageChange(e, 'buy')} className="text-xs" />
                                {buyForm.image && <img src={buyForm.image} className="h-20 w-20 object-cover rounded" />}
                                <input type="text" placeholder="商品名稱" className="w-full p-2 border rounded-lg text-sm" value={buyForm.name} onChange={e => setBuyForm({...buyForm, name: e.target.value})} />
                                <CreatableSelect label="購買店家" options={stores[currentTrip.country] || []} value={buyForm.store} onChange={v => setBuyForm({...buyForm, store: v})} onAddOption={n => setStores({...stores, [currentTrip.country]: [...(stores[currentTrip.country]||[]), n]})} />
                                <CreatableSelect label="商品品項分類" options={itemTypes} value={buyForm.type} onChange={v => setBuyForm({...buyForm, type: v})} onAddOption={n => setItemTypes([...itemTypes, n])} />
                                <button onClick={() => { setMustBuys([...mustBuys, {...buyForm, id: Date.now()}]); setBuyForm({name:'',store:'',type:'',image:''}); setShowForm(false); }} className="w-full py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold">送出儲存</button>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3">
                            {mustGoType === 'eat' ? (
                                mustEats.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                                        {item.image ? <img src={item.image} className="w-full h-28 object-cover" /> : <div className="w-full h-28 bg-gray-100 flex items-center justify-center text-gray-300 text-xl"><i className="fa-solid fa-utensils"></i></div>}
                                        <div className="p-3 flex-1 flex flex-col justify-between">
                                            <div>
                                                <span className="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold">{item.type}</span>
                                                <h5 className="font-bold text-sm mt-1 text-slate-800 line-clamp-1">{item.name}</h5>
                                                <p className="text-xs text-gray-500">{item.district}</p>
                                            </div>
                                            <div className="flex justify-between items-center mt-2 pt-2 border-t border-gray-50">
                                                {item.url ? <a href={item.url} target="_blank" rel="noreferrer" className="text-xs text-indigo-600 font-bold">查看地圖</a> : <span/>}
                                                <button onClick={() => setMustEats(mustEats.filter(x => x.id !== item.id))} className="text-gray-300 hover:text-red-500"><i className="fa-solid fa-trash text-xs"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                mustBuys.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                                        {item.image ? <img src={item.image} className="w-full h-28 object-cover" /> : <div className="w-full h-28 bg-gray-100 flex items-center justify-center text-gray-300 text-xl"><i className="fa-solid fa-bag-shopping"></i></div>}
                                        <div className="p-3 flex-1 flex flex-col justify-between">
                                            <div>
                                                <span className="text-[10px] bg-purple-100 text-purple-800 px-1.5 py-0.5 rounded font-bold">{item.type}</span>
                                                <h5 className="font-bold text-sm mt-1 text-slate-800 line-clamp-1">{item.name}</h5>
                                                <p className="text-xs text-gray-500">📍 {item.store}</p>
                                            </div>
                                            <div className="text-right mt-2">
                                                <button onClick={() => setMustBuys(mustBuys.filter(x => x.id !== item.id))} className="text-gray-300 hover:text-red-500"><i className="fa-solid fa-trash text-xs"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                );
            };

            // --- 頁面 4: 代購記帳 ---
            const RenderShoppingList = () => {
                const [form, setForm] = useState({ buyer: '自己', name: '', store: '', price: '', count: 1, checked: false });
                
                const handleAdd = () => {
                    if (!form.name || !form.price) return;
                    setShoppingList([...shoppingList, { ...form, id: Date.now() }]);
                    setForm({ buyer: '自己', name: '', store: '', price: '', count: 1, checked: false });
                    showToast("已列入記帳清單！");
                };

                const totalTwd = useMemo(() => {
                    return shoppingList.reduce((acc, item) => acc + (getTwdEquivalent(item.price, currency.code, exchangeRate) * item.count), 0);
                }, [shoppingList, currency, exchangeRate]);

                return (
                    <div className="p-4">
                        <div className="bg-slate-800 rounded-xl p-4 text-white mb-4">
                            <span className="text-xs opacity-70">當前購物累積計 (已折合台幣)</span>
                            <div className="text-2xl font-black text-amber-400">NT$ {totalTwd.toLocaleString()} 元</div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border space-y-2 mb-4">
                            <h3 className="text-xs font-bold text-slate-700">🛒 新增採購/代購項目</h3>
                            <div className="grid grid-cols-2 gap-2">
                                <select className="p-2 border rounded-lg text-sm bg-white" value={form.buyer} onChange={e => setForm({...form, buyer: e.target.value})}>
                                    <option value="自己">自己買</option>
                                    <option value="朋友A">朋友A (代購)</option>
                                    <option value="朋友B">朋友B (代購)</option>
                                </select>
                                <input type="text" placeholder="商品品名" className="p-2 border rounded-lg text-sm" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                <input type="text" placeholder="預計店家" className="p-2 border rounded-lg text-sm col-span-1" value={form.store} onChange={e => setForm({...form, store: e.target.value})} />
                                <input type="number" placeholder={`單價(${currency.code})`} className="p-2 border rounded-lg text-sm" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                <input type="number" placeholder="數量" className="p-2 border rounded-lg text-sm" value={form.count} onChange={e => setForm({...form, count: Number(e.target.value)})} />
                            </div>
                            <button onClick={handleAdd} className="w-full py-2 bg-indigo-600 text-white font-bold rounded-lg text-xs">加入清單</button>
                        </div>

                        <div className="space-y-2">
                            {shoppingList.map(item => {
                                const twdEach = getTwdEquivalent(item.price, currency.code, exchangeRate);
                                return (
                                    <div key={item.id} className={`p-3 rounded-lg border bg-white flex items-center justify-between ${item.checked ? 'opacity-50' : ''}`}>
                                        <div className="flex items-center gap-3">
                                            <input type="checkbox" checked={item.checked} onChange={e => setShoppingList(shoppingList.map(x => x.id === item.id ? {...x, checked: e.target.checked} : x))} className="w-4 h-4 accent-indigo-600" />
                                            <div>
                                                <div className="font-bold text-sm text-slate-800">{item.name} <span className="text-xs text-gray-400">({item.buyer})</span></div>
                                                <div className="text-xs text-gray-500">📍 {item.store || '未定'} | {item.count} 件</div>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-3">
                                            <div>
                                                <div className="text-xs font-bold text-slate-700">{currency.symbol}{(item.price * item.count).toLocaleString()}</div>
                                                <div className="text-[10px] text-gray-400">約 NT$ {(twdEach * item.count).toLocaleString()}</div>
                                            </div>
                                            <button onClick={() => setShoppingList(shoppingList.filter(x => x.id !== item.id))} className="text-gray-300 hover:text-red-500"><i className="fa-solid fa-xmark"></i></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            // --- 頁面 5: 共同拆帳 ---
            const RenderSplitBill = () => {
                const [expense, setExpense] = useState({ title: '', amount: '', payer: '自己', type: '均分' });

                const totalExpense = useMemo(() => splitExpenses.reduce((sum, e) => sum + Number(e.amount), 0), [splitExpenses]);
                
                const debtSummary = useMemo(() => {
                    let balances = {};
                    splitMembers.forEach(m => balances[m] = 0);
                    
                    splitExpenses.forEach(e => {
                        const amt = Number(e.amount);
                        balances[e.payer] += amt;
                        const perShare = amt / splitMembers.length;
                        splitMembers.forEach(m => balances[m] -= perShare);
                    });
                    return balances;
                }, [splitExpenses, splitMembers]);

                return (
                    <div className="p-4">
                        <div className="bg-indigo-900 rounded-xl p-4 text-white mb-4">
                            <span className="text-xs opacity-70">公費/共同開銷總計</span>
                            <div className="text-2xl font-black text-emerald-400">{currency.symbol} {totalExpense.toLocaleString()}</div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border space-y-2 mb-4">
                            <h3 className="text-xs font-bold text-slate-700">💰 記一筆共同開銷</h3>
                            <input type="text" placeholder="開銷項目 (如: 晚餐、計程車)" className="w-full p-2 border rounded-lg text-sm" value={expense.title} onChange={e => setExpense({...expense, title: e.target.value})} />
                            <div className="grid grid-cols-2 gap-2">
                                <input type="number" placeholder={`金額 (${currency.code})`} className="p-2 border rounded-lg text-sm" value={expense.amount} onChange={e => setExpense({...expense, amount: e.target.value})} />
                                <select className="p-2 border rounded-lg text-sm bg-white" value={expense.payer} onChange={e => setExpense({...expense, payer: e.target.value})}>
                                    {splitMembers.map(m => <option key={m} value={m}>{m} 付的</option>)}
                                </select>
                            </div>
                            <button onClick={() => { if(!expense.title || !expense.amount) return; setSplitExpenses([...splitExpenses, {...expense, id: Date.now()}]); setExpense({title:'',amount:'',payer:'自己',type:'均分'}); }} className="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold text-xs">新增此筆</button>
                        </div>

                        <div className="bg-white p-4 rounded-xl border mb-4">
                            <h4 className="text-xs font-bold text-slate-700 mb-2">📊 目前拆帳結算狀態</h4>
                            <div className="space-y-1">
                                {Object.entries(debtSummary).map(([name, bal]) => (
                                    <div key={name} className="flex justify-between text-sm py-1 border-b border-gray-50">
                                        <span className="font-bold text-slate-700">{name}</span>
                                        <span className={bal >= 0 ? 'text-emerald-600 font-bold' : 'text-red-500 font-bold'}>
                                            {bal >= 0 ? `應拿回 ${currency.symbol}${Math.ceil(bal)}` : `應轉出 ${currency.symbol}${Math.ceil(Math.abs(bal))}`}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-2">
                            {splitExpenses.map(e => (
                                <div key={e.id} className="p-3 bg-white border rounded-lg flex justify-between items-center text-xs shadow-sm">
                                    <div>
                                        <div className="font-bold text-slate-800">{e.title}</div>
                                        <div className="text-gray-400">{e.payer} 先代墊</div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold text-slate-700">{currency.symbol}{Number(e.amount).toLocaleString()}</span>
                                        <button onClick={() => setSplitExpenses(splitExpenses.filter(x => x.id !== e.id))} className="text-red-400 font-bold ml-1"><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- 頁面 6: 行李清單 ---
            const RenderPreparation = () => {
                const [newTodo, setNewTodo] = useState('');
                const handleAdd = () => {
                    if (!newTodo.trim()) return;
                    setPrepList([...prepList, { id: Date.now(), text: newTodo.trim(), checked: false }]);
                    setNewTodo('');
                };

                return (
                    <div className="p-4">
                        <h2 className="text-lg font-bold text-slate-800 mb-3">🧳 事前準備與行李清單</h2>
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="自訂待辦/行李物品..." className="flex-1 p-2 border rounded-lg text-sm bg-white" value={newTodo} onChange={e => setNewTodo(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} />
                            <button onClick={handleAdd} className="px-4 bg-indigo-600 text-white rounded-lg text-sm font-bold">新增</button>
                        </div>

                        <div className="bg-white rounded-xl border p-2 shadow-sm divide-y">
                            {prepList.map(item => (
                                <label key={item.id} className="flex items-center justify-between p-3 cursor-pointer">
                                    <div className="flex items-center gap-3">
                                        <input type="checkbox" checked={item.checked} onChange={e => setPrepList(prepList.map(x => x.id === item.id ? {...x, checked: e.target.checked} : x))} className="w-4 h-4 accent-indigo-600 rounded" />
                                        <span className={`text-sm ${item.checked ? 'line-through text-gray-400' : 'text-slate-800 font-medium'}`}>{item.text}</span>
                                    </div>
                                    <button onClick={(e) => { e.preventDefault(); setPrepList(prepList.filter(x => x.id !== item.id)); }} className="text-gray-300 hover:text-red-500"><i className="fa-solid fa-xmark"></i></button>
                                </label>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    <div className="content-area no-scrollbar">
                        {activeTab === 'destination' && <RenderDestination />}
                        {activeTab === 'itinerary' && <RenderItinerary />}
                        {activeTab === 'mustgo' && <RenderMustGo />}
                        {activeTab === 'shopping' && <RenderShoppingList />}
                        {activeTab === 'split' && <RenderSplitBill />}
                        {activeTab === 'prep' && <RenderPreparation />}
                    </div>

                    {toastMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900/90 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg flex items-center gap-2">
                            <i className="fa-solid fa-circle-check text-emerald-400"></i> {toastMessage}
                        </div>
                    )}

                    <div className="absolute bottom-0 left-0 right-0 h-[72px] bg-white border-t border-gray-200 grid grid-cols-6 items-center z-40 text-center">
                        <button onClick={() => setActiveTab('destination')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'destination' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-earth-asia text-[16px]"></i>環境設定
                        </button>
                        <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'itinerary' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-calendar-day text-[16px]"></i>行程規劃
                        </button>
                        <button onClick={() => setActiveTab('mustgo')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'mustgo' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-heart text-[16px]"></i>必去必買
                        </button>
                        <button onClick={() => setActiveTab('shopping')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'shopping' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-cart-shopping text-[16px]"></i>代購記帳
                        </button>
                        <button onClick={() => setActiveTab('split')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'split' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-file-invoice-dollar text-[16px]"></i>共同拆帳
                        </button>
                        <button onClick={() => setActiveTab('prep')} className={`flex flex-col items-center justify-center gap-0.5 text-[10px] font-bold ${activeTab === 'prep' ? 'text-indigo-600' : 'text-gray-400'}`}>
                            <i className="fa-solid fa-suitcase text-[16px]"></i>行李準備
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
