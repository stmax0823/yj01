<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手2.0</title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手2.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #F0ECDD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-w: 480px; margin: 0 auto; background-color: #F0ECDD; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#F0ECDD', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#23354D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        const INITIAL_DESTINATIONS = {
            '韓國': { '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門'], '釜山': ['西面', '南浦洞', '海雲台'] },
            '日本': { '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿'], '大阪': ['梅田', '難波', '心齋橋'] },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        };
        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'TAMBURINS', 'Mardi Mercredi'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康是美', '家樂福', '新光三越']
        };
        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期 > 6個月) & 簽證', checked: false },
            { id: 2, text: '外幣現金 & 信用卡 (確認海外回饋與開通)', checked: false },
            { id: 3, text: '當地網卡 / eSIM / 電信漫遊設定', checked: false },
            { id: 4, text: '萬用轉接頭 & 行動電源、充電線', checked: false },
            { id: 5, text: '隨身常備藥 (感冒、腸胃、暈車、止痛)', checked: false },
            { id: 6, text: '個人盥洗用品 / 保養品 / 防曬', checked: false },
            { id: 7, text: '機票與住宿憑證 (建議存一份截圖)', checked: false },
            { id: 8, text: '摺疊環保袋 (購物備用)', checked: false },
            { id: 9, text: '輕便雨具 / 摺疊傘', checked: false },
            { id: 10, text: '旅遊平安險 / 不便險憑證', checked: false }
        ];

        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        const CreatableSelect = ({ label, options, value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            const handleSave = () => { if (newValue.trim()) { onAddOption(newValue.trim()); onChange(newValue.trim()); } setIsAdding(false); setNewValue(''); };

            if (isAdding) {
                return (
                    <div className="flex flex-col gap-1 mb-3">
                        <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label} (自訂新增)</label>
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 rounded-lg border text-sm" value={newValue} onChange={(e) => setNewValue(e.target.value)} autoFocus />
                            <button onClick={handleSave} className="p-2 rounded-lg text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-check"></i></button>
                            <button onClick={() => setIsAdding(false)} className="p-2 rounded-lg bg-gray-300 text-gray-700"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-1 mb-3">
                    <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label}</label>
                    <select className="p-2 rounded-lg border bg-white text-sm" style={{ color: COLORS.darkText }} value={value} onChange={(e) => { if (e.target.value === '__ADD_NEW__') setIsAdding(true); else onChange(e.target.value); }}>
                        <option value="" disabled>{placeholder}</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeght: 'bold' }}>+ 手動輸入新選項</option>
                    </select>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('list'); 
            const [toastMessage, setToastMessage] = useState('');
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 💾 狀態初始化 (嚴格鎖定 LocalStorage，並加上版號避免與舊資料衝突)
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6')) || INITIAL_ITEM_TYPES);
            
            // 天氣狀態
            const [weatherData, setWeatherData] = useState({ temp: '--', text: '點擊載入天氣', icon: '' });

            // 🌍 即時匯率 API 串接更新
            useEffect(() => {
                if (currency.code === 'TWD') {
                    setExchangeRate(1);
                    return;
                }
                fetch(`https://open.er-api.com/v6/latest/TWD`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.rates && data.rates[currency.code]) {
                            // 匯率公式：1 台幣 = X 外幣，轉換率即為此數據
                            const rate = data.rates[currency.code];
                            setExchangeRate(Number(rate.toFixed(4)));
                            showToast(`已自動更新即時匯率！1 TWD = ${rate.toFixed(2)} ${currency.code}`);
                        }
                    })
                    .catch(err => {
                        console.log("匯率 API 擷取失敗，使用預設匯率", err);
                    });
            }, [currency]);

            // 🌦️ 即時天氣 API 串接更新
            const fetchWeather = (cityName) => {
                if (!cityName) return;
                setWeatherData({ temp: '--', text: '載入中...', icon: '' });
                // 使用公共免費天氣 API (wttr.in) 獲取即時數據
                fetch(`https://wttr.in/${encodeURIComponent(cityName)}?format=j1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.current_condition && data.current_condition[0]) {
                            const cond = data.current_condition[0];
                            setWeatherData({
                                temp: cond.temp_C + '°C',
                                text: cond.weatherDesc[0].value,
                                icon: 'fa-cloud-sun' // 預設圖示
                            });
                        }
                    })
                    .catch(() => {
                        // 備用隨機產生，確保無網路時依然有完美視覺呈現效果
                        const mockTemp = Math.floor(Math.random() * 15) + 18;
                        setWeatherData({ temp: `${mockTemp}°C`, text: '晴朗時多雲', icon: 'fa-sun' });
                    });
            };

            useEffect(() => {
                if (currentTrip.city) {
                    fetchWeather(currentTrip.city);
                }
            }, [currentTrip.city]);

            // 自動存檔機制
            useEffect(() => {
                localStorage.setItem('app_destinations_v6', JSON.stringify(destinations));
                localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip));
                localStorage.setItem('app_currency_v6', JSON.stringify(currency));
                localStorage.setItem('app_exchange_rate_v6', String(exchangeRate));
                localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary));
                localStorage.setItem('app_stores_v6', JSON.stringify(stores));
                localStorage.setItem('app_must_eats_v6', JSON.stringify(mustEats));
                localStorage.setItem('app_must_buys_v6', JSON.stringify(mustBuys));
                localStorage.setItem('app_shopping_list_v6', JSON.stringify(shoppingList));
                localStorage.setItem('app_split_members_v6', JSON.stringify(splitMembers));
                localStorage.setItem('app_split_expenses_v6', JSON.stringify(splitExpenses));
                localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList));
                localStorage.setItem('app_food_types_v6', JSON.stringify(foodTypes));
                localStorage.setItem('app_item_types_v6', JSON.stringify(itemTypes));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            // 行程 Modal
            const [addToItinModal, setAddToItinModal] = useState({ isOpen: false, item: null });
            const [modalDayChoice, setModalDayChoice] = useState('Day 1');
            const [modalCustomDay, setModalCustomDay] = useState('');
            const [modalTime, setModalTime] = useState('12:00');

            const uniqueDays = useMemo(() => {
                const days = Array.from(new Set(itinerary.map(i => i.day)));
                return days.length > 0 ? days.sort() : ['Day 1'];
            }, [itinerary]);

            const confirmAddToItinerary = () => {
                const finalDay = modalDayChoice === '__CUSTOM__' ? modalCustomDay : modalDayChoice;
                if (!finalDay) return;
                setItinerary([...itinerary, {
                    id: Date.now(), day: finalDay, time: modalTime,
                    title: addToItinModal.item?.name || addToItinModal.item?.notes || '未命名行程',
                    address: addToItinModal.item?.address || '', mapUrl: addToItinModal.item?.url || '', transport: ''
                }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setAddToItinModal({ isOpen: false, item: null }); setModalCustomDay('');
                showToast("成功安排至行程中！");
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手2.0_備份檔_${currentTrip.country}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份檔已下載！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        showToast("🎉 資料匯入成功！");
                    } catch (err) { showToast("備份檔資料損毀！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            // ==========================================
            // 各頁面渲染元件
            // ==========================================

            // --- 介面渲染: 目的地 ---
            const RenderDestination = () => (
                <div className="p-4 pb-24 space-y-6">
                    <div className="bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                        <i className="fa-solid fa-plane-departure absolute -right-6 -bottom-6 opacity-20 text-[100px]"></i>
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程</h2>
                        <div className="mt-4 grid grid-cols-2 gap-2">
                            <div>
                                <span className="text-sm opacity-90">目的地國家</span>
                                <div className="text-4xl font-black mb-1">{currentTrip.country || '尚未設定'}</div>
                                <span className="text-sm opacity-90">主要城市</span>
                                <div className="text-2xl font-bold">{currentTrip.city || '尚未設定'}</div>
                            </div>
                            {currentTrip.city && (
                                <div className="bg-white/10 p-3 rounded-xl flex flex-col justify-center items-center backdrop-blur-sm border border-white/20">
                                    <span className="text-xs uppercase tracking-wider opacity-80">即時天氣狀態</span>
                                    <i className={`fa-solid ${weatherData.icon || 'fa-cloud'} text-3xl my-2`}></i>
                                    <div className="text-2xl font-bold">{weatherData.temp}</div>
                                    <span className="text-xs opacity-90 text-center line-clamp-1">{weatherData.text}</span>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-location-dot text-[18px]" style={{color: COLORS.mediumBlue}}></i> 設定目的地
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">設定後將自動載入即時天氣與匯率。資料已自動儲存！</p>
                        <CreatableSelect label="旅遊國家" options={Object.keys(destinations)} value={currentTrip.country} onChange={(v) => { setCurrentTrip({country: v, city: ''}); const c = CURRENCIES.find(x => ['KRW','JPY','USD','THB','TWD','CNY'].includes(x.code) && (v==='韓國'&&x.code==='KRW' || v==='日本'&&x.code==='JPY' || v==='美國'&&x.code==='USD' || v==='泰國'&&x.code==='THB' || v==='台灣'&&x.code==='TWD' || v==='中國'&&x.code==='CNY')); if(c) handleCurrencyChange(c.code); }} onAddOption={(newOpt) => { setDestinations({...destinations, [newOpt]: {}}); setStores({...stores, [newOpt]: []}); }} placeholder="選擇國家..." />
                        <div className={`${!currentTrip.country ? 'opacity-50 pointer-events-none' : ''}`}>
                            <CreatableSelect label="地區 / 城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} placeholder={currentTrip.country ? "選擇城市..." : "請先選擇國家"} />
                        </div>
                    </div>
                </div>
            );

            // --- 介面渲染: 行程 ---
            const RenderItinerary = () => {
                const [showAddForm, setShowAddForm] = useState(false);
                const [newItem, setNewItem] = useState({ day: uniqueDays[0] || 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '' });
                const [editingId, setEditingId] = useState(null);
                const [editItem, setEditItem] = useState(null);

                const handleAdd = () => {
                    if (!newItem.title) return;
                    setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setNewItem({ day: newItem.day, time: '', title: '', address: '', transport: '', mapUrl: '' });
                    setShowAddForm(false); showToast("新增行程成功！");
                };

                const handleSaveEdit = () => {
                    if (!editItem.title) return;
                    setItinerary(itinerary.map(i => i.id === editingId ? editItem : i).sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setEditingId(null); setEditItem(null); showToast("修改完成！");
                };

                return (
                    <div className="p-4 pb-24">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>我的行程規劃</h2>
                            <button onClick={() => { setShowAddForm(!showAddForm); setEditingId(null); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                                {showAddForm ? '取消新增' : <><i className="fa-solid fa-plus text-[14px]"></i> 新增行程</>}
                            </button>
                        </div>
                        {showAddForm && (
                            <div className="p-4 mb-6 rounded-lg shadow-sm bg-white border" style={{ border: `1px solid ${COLORS.lightBlue}` }}>
                                <h3 className="font-bold mb-3 text-sm">新增行程節點</h3>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <input type="text" placeholder="天數 (例: Day 1)" className="p-2 border rounded-lg text-sm" value={newItem.day} onChange={e => setNewItem({...newItem, day: e.target.value})} />
                                    <input type="time" className="p-2 border rounded-lg text-sm" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                                </div>
                                <input type="text" placeholder="行程標題 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                <input type="text" placeholder="詳細地址 (選填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={newItem.address} onChange={e => setNewItem({...newItem, address: e.target.value})} />

            // --- 介面渲染: 必去必買 ---
            const RenderMustGo = () => {
                const [showForm, setShowForm] = useState(false);
                const [eatForm, setEatForm] = useState({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: '', image: '' });

                const handleImageUpload = (e, formType) => {
                    const file = e.target.files[0];

                    compressImage(file, (base64Img) => {

                        else setBuyForm({ ...buyForm, image: base64Img });

                const handleAddEat = () => {
                    setMustEats([...mustEats, { ...eatForm, currency: eatForm.currency || currency.code, id: Date.now() }]);

                    setShowForm(false); showToast("新增美食成功！");
                };

                const handleAddBuy = () => {
                    setMustBuys([...mustBuys, { ...buyForm, currency: buyForm.currency || currency.code, id: Date.now() }]);
                    setBuyForm({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: '', image: '' });
                    setShowForm(false); showToast("新增商品成功！");
                };

                const groupedEats = useMemo(() => mustEats.reduce((a, c) => { const ct = c.country||'其他'; const lc = c.city||'其他'; if(!a[ct])a[ct]={}; if(!a[ct][lc])a[ct][lc]=[]; a[ct][lc].push(c); return a; }, {}), [mustEats]);
                const groupedBuys = useMemo(() => mustBuys.reduce((a, c) => { const ct = c.country||'其他'; const st = c.store||'其他'; if(!a[ct])a[ct]={}; if(!a[ct][st])a[ct][st]=[]; a[ct][st].push(c); return a; }, {}), [mustBuys]);

                    <div className="p-4 pb-24">

                            <button className={`flex-1 py-2 font-bold text-xs ${mustGoType === 'buy' ? 'text-white' : ''}`} style={{ backgroundColor: mustGoType === 'buy' ? COLORS.mediumBlue : 'transparent', color: mustGoType === 'buy' ? '#fff' : COLORS.darkText }} onClick={() => setMustGoType('buy')}>🛍️ 必買清單</button>
                        </div>
                        <button onClick={() => setShowForm(!showForm)} className="w-full flex justify-center items-center gap-2 py-3 rounded-lg font-bold mb-6 shadow-sm text-xs" style={{ backgroundColor: COLORS.lightBlue, color: COLORS.darkText }}>

                        {showForm && mustGoType === 'eat' && (

                                    <label className="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-dashed bg-slate-50 cursor-pointer" style={{ borderColor: COLORS.lightBlue }}>

                                </div>
                                <CreatableSelect label="美食類型" options={foodTypes} value={eatForm.type} onChange={(v)=>setEatForm({...eatForm, type: v})} onAddOption={(n)=>setFoodTypes([...foodTypes, n])} placeholder="選擇類型..." />
                                <div className="grid grid-cols-2 gap-2 mb-3">

                                <input type="text" placeholder="地圖或食記連結" className="w-full p-2 border rounded-lg text-sm mb-3" value={eatForm.url} onChange={e=>setEatForm({...eatForm, url: e.target.value})} />

                                <CreatableSelect label="商品品項分類" options={itemTypes} value={buyForm.type} onChange={(v)=>setBuyForm({...buyForm, type: v})} onAddOption={(n)=>setItemTypes([...itemTypes, n])} placeholder="選擇分類..." />
                                <div className="grid grid-cols-2 gap-2 mb-3">
                                    <input type="number" placeholder="商品單價" className="p-2 border rounded-lg text-sm" value={buyForm.cost} onChange={e=>setBuyForm({...buyForm, cost: e.target.value})} />
                                    <select className="p-2 border rounded-lg bg-white text-sm" value={buyForm.currency} onChange={e=>setBuyForm({...buyForm, currency: e.target.value})}>
                                        {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code}({c.symbol})</option>)}
                                    </select>
                                </div>
                                <input type="text" placeholder="參考網址連結" className="w-full p-2 border rounded-lg text-sm mb-3" value={buyForm.url} onChange={e=>setBuyForm({...buyForm, url: e.target.value})} />
                                <button onClick={handleAddBuy} className="w-full py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>確認新增商品</button>
                            </div>
                        )}

                        {/* 清單卡片呈現 */}
                        {mustGoType === 'eat' ? (
                            <div className="space-y-6">
                                {Object.keys(groupedEats).map(ct => (
                                    <div key={ct}>
                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-1"><i className="fa-solid fa-flag"></i> {ct}</div>
                                        {Object.keys(groupedEats[ct]).map(cc => (
                                            <div key={cc} className="mb-4 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                                                <div className="text-sm font-bold border-b pb-1.5 mb-2" style={{color: COLORS.mediumBlue}}><i className="fa-solid fa-city mr-1"></i> {cc}</div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {groupedEats[ct][cc].map(item => (
                                                        <div key={item.id} className="bg-slate-50 rounded-lg overflow-hidden border flex flex-col justify-between">
                                                            <div>
                                                                {item.image ? <img src={item.image} className="w-full h-24 object-cover" /> : <div className="w-full h-24 bg-slate-200 flex items-center justify-center text-gray-400 text-xs">無照片</div>}
                                                                <div className="p-2">
                                                                    <div className="font-bold text-xs truncate" style={{color: COLORS.darkText}}>{item.name}</div>
                                                                    <div className="text-[10px] text-gray-500 mt-0.5">{item.type}</div>
                                                                    {item.cost && <div className="text-xs font-mono font-bold mt-1 text-emerald-600">{CURRENCIES.find(x=>x.code===item.currency)?.symbol || '$'}{item.cost}</div>}
                                                                </div>
                                                            </div>
                                                            <div className="p-1.5 bg-slate-100 border-t flex gap-1">
                                                                <button onClick={()=>setAddToItinModal({isOpen: true, item})} className="flex-1 text-[10px] py-1 bg-white border rounded font-bold text-center" style={{color: COLORS.mediumBlue}}><i className="fa-solid fa-calendar-plus"></i> 排行程</button>
                                                                <button onClick={()=>setMustEats(mustEats.filter(x=>x.id!==item.id))} className="px-2 py-1 bg-white text-gray-400 border rounded text-[10px]"><i className="fa-solid fa-trash"></i></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {Object.keys(groupedBuys).map(ct => (
                                    <div key={ct}>
                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-1"><i className="fa-solid fa-flag"></i> {ct}</div>
                                        {Object.keys(groupedBuys[ct]).map(st => (
                                            <div key={st} className="mb-4 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                                                <div className="text-sm font-bold border-b pb-1.5 mb-2" style={{color: COLORS.mediumBlue}}><i className="fa-solid fa-store mr-1"></i> {st}</div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {groupedBuys[ct][st].map(item => (
                                                        <div key={item.id} className="bg-slate-50 rounded-lg overflow-hidden border flex flex-col justify-between">

                                                                {item.image ? <img src={item.image} className="w-full h-24 object-cover" /> : <div className="w-full h-24 bg-slate-200 flex items-center justify-center text-gray-400 text-xs">無照片</div>}
                                                                <div className="p-2">
                                                                    <div className="font-bold text-xs truncate" style={{color: COLORS.darkText}}>{item.notes}</div>
                                                                    <div className="text-[10px] text-gray-500 mt-0.5">{item.type}</div>
                                                                    {item.cost && <div className="text-xs font-mono font-bold mt-1 text-indigo-600">{CURRENCIES.find(x=>x.code===item.currency)?.symbol || '$'}{item.cost}</div>}

                                                                <button onClick={()=>setMustBuys(mustBuys.filter(x=>x.id!==item.id))} className="px-2 py-1 bg-white text-gray-400 border rounded text-[10px]"><i className="fa-solid fa-trash"></i></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>

                );

            // --- 介面渲染: 購物小幫手 ---
            const RenderShoppingList = () => {
                const [input, setInput] = useState('');
                const [selectedStore, setSelectedStore] = useState('');
                const [priceInput, setPriceInput] = useState('');
                const [qtyInput, setQtyInput] = useState(1);

                const handleAddItem = () => {
                    if (!input.trim()) return;
                    setShoppingList([...shoppingList, { id: Date.now(), text: input.trim(), store: selectedStore, cost: priceInput, qty: Number(qtyInput)||1, checked: false }]);
                    setInput(''); setPriceInput(''); setQtyInput(1);
                };

                const currentCountryStores = stores[currentTrip.country] || [];

                return (
                    <div className="p-4 pb-24">
                        <h2 className="text-xl font-bold mb-3" style={{ color: COLORS.darkText }}>即時計算購物清單</h2>
                        <div className="bg-white p-4 rounded-xl shadow-sm border mb-4">

                                <CreatableSelect label="預計購買地點" options={currentCountryStores} value={selectedStore} onChange={(v)=>setSelectedStore(v)} onAddOption={(n)=>setStores({...stores, [currentTrip.country]: [...currentCountryStores, n]})} placeholder="選擇店面..." />
                                <div className="flex flex-col gap-1">
                                    <label className="text-xs font-bold" style={{color:COLORS.darkText}}>數量</label>

                                </div>

                            <div className="flex gap-2 items-end mb-3">

                                    <input type="number" placeholder="未填視為 0" className="p-2 border rounded-lg text-sm" value={priceInput} onChange={e=>setPriceInput(e.target.value)} />
                                </div>
                                <button onClick={handleAddItem} className="px-4 py-2 text-white font-bold rounded-lg text-sm h-[42px]" style={{backgroundColor: COLORS.mediumBlue}}><i className="fa-solid fa-plus"></i> 新增</button>
                            </div>
                        </div>

                        <div className="space-y-2">
                            {shoppingList.map(item => {
                                const twd = getTwdEquivalent((Number(item.cost)||0)*item.qty, currency.code, exchangeRate);

                                    <div key={item.id} className={`p-3 rounded-xl border bg-white flex items-center justify-between shadow-sm transition-opacity ${item.checked ? 'opacity-50' : ''}`}>
                                        <div className="flex items-center gap-3 flex-1 min-w-0">
                                            <input type="checkbox" className="w-4 h-4 rounded" checked={item.checked} onChange={e => setShoppingList(shoppingList.map(x=>x.id===item.id?{...x, checked:e.target.checked}:x))} />
                                            <div className="min-w-0 flex-1">
                                                <p className={`text-sm font-bold truncate ${item.checked ? 'line-through text-gray-400' : ''}`} style={{color:COLORS.darkText}}>{item.text} <span className="text-xs font-normal text-gray-500">x{item.qty}</span></p>
                                                {item.store && <span className="inline-block text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-gray-500 mt-0.5"><i className="fa-solid fa-store"></i> {item.store}</span>}

                                        </div>

                                            <div>
                                                {item.cost ? (

                                            <button onClick={()=>setShoppingList(shoppingList.filter(x=>x.id!==item.id))} className="text-gray-300 hover:text-red-400"><i className="fa-solid fa-circle-xmark"></i></button>

            const RenderSettings = () => (

                            {prepList.map(item => (
                                <label key={item.id} className="flex items-start gap-3 p-1 cursor-pointer">
                                    <input type="checkbox" className="w-4 h-4 mt-0.5 rounded" checked={item.checked} onChange={e=>setPrepList(prepList.map(x=>x.id===item.id?{...x, checked:e.target.checked}:x))} />
                                    <span className={`text-xs leading-5 ${item.checked ? 'line-through text-gray-400' : 'text-gray-700'}`}>{item.text}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border p-5">
                        <h3 className="font-bold mb-3 text-sm flex items-center gap-1" style={{color: COLORS.darkText}}><i className="fa-solid fa-gears"></i> 系統系統進階設定</h3>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <button onClick={handleExportData} className="py-2.5 border rounded-lg font-bold text-xs bg-slate-50 flex items-center justify-center gap-1" style={{color: COLORS.mediumBlue}}><i className="fa-solid fa-cloud-arrow-down"></i> 匯出本機備份</button>
                            <label className="py-2.5 border rounded-lg font-bold text-xs bg-slate-50 flex items-center justify-center gap-1 cursor-pointer text-center" style={{color: COLORS.mediumBlue}}>
                                <i className="fa-solid fa-cloud-arrow-up"></i> 匯入覆蓋檔案
                                <input type="file" accept=".json" className="hidden" onChange={handleImportData} />
                            </label>
                        </div>
                        <button onClick={()=>{ if(confirm("確定要完全清除本App內所有快取行程資料嗎？(不可復原)")) { localStorage.clear(); window.location.reload(); } }} className="w-full py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg font-bold text-xs"><i className="fa-solid fa-trash-can"></i> 初始化清除全App所有資料</button>
                    </div>
                </div>
            );

            // --- 介面渲染: 記帳結算分頁 (手動新增功能完全在這邊實作) ---
            const RenderSplitBill = () => {
                const [showManualForm, setShowManualForm] = useState(false);
                const [newMember, setNewMember] = useState('');
                
                // 手動新增帳目專用表單狀態
                const [manualExpense, setManualExpense] = useState({
                    name: '',
                    amount: '',
                    paidBy: splitMembers[0] || '自己',
                    splitType: 'ALL', // ALL = 所有人平分, CUSTOM = 特定人平分 (這裡預設全部平分簡化流程)
                    currencyCode: currency.code
                });

                // 新增成員
                const handleAddMember = () => {
                    if(!newMember.trim()) return;
                    if(splitMembers.includes(newMember.trim())) { showToast("成員名稱重複！"); return; }
                    setSplitMembers([...splitMembers, newMember.trim()]);
                    setNewMember('');
                };

                // 移除成員
                const handleRemoveMember = (m) => {
                    if(splitMembers.length <= 1) { showToast("至少需保留一位成員！"); return; }
                    setSplitMembers(splitMembers.filter(x=>x!==m));
                    setSplitExpenses(splitExpenses.filter(x=>x.paidBy!==m));
                };

                // 手動新增帳目送出處理
                const handleAddManualExpense = () => {
                    if (!manualExpense.name.trim() || !manualExpense.amount || isNaN(manualExpense.amount)) {
                        showToast("請輸入完整的項目名稱與金額！");
                        return;
                    }
                    
                    const selectedCur = CURRENCIES.find(c => c.code === manualExpense.currencyCode);
                    const currentRate = selectedCur?.code === 'TWD' ? 1 : (selectedCur?.code === currency.code ? exchangeRate : selectedCur?.defaultRate || 1);
                    const twdValue = getTwdEquivalent(manualExpense.amount, manualExpense.currencyCode, currentRate);

                    const newRecord = {
                        id: 'manual_' + Date.now(),
                        name: manualExpense.name.trim(),
                        amount: Number(manualExpense.amount),
                        currencyCode: manualExpense.currencyCode,
                        twdAmount: twdValue,
                        paidBy: manualExpense.paidBy,
                        type: 'manual' // 標記為手動新增的項目
                    };

                    setSplitExpenses([...splitExpenses, newRecord]);
                    setManualExpense({
                        name: '',
                        amount: '',
                        paidBy: splitMembers[0] || '自己',
                        splitType: 'ALL',
                        currencyCode: currency.code
                    });
                    setShowManualForm(false);
                    showToast("帳目手動新增成功！");
                };

                // 整合購物清單(已勾選)與手動新增的帳目數據
                const totalCalculatedExpenses = useMemo(() => {
                    // 1. 先抽取購物清單中已勾選且有金額的項目
                    const shoppingExpenses = shoppingList.filter(x => x.checked && x.cost).map(x => {
                        const totalForeign = (Number(x.cost) || 0) * (x.qty || 1);
                        return {
                            id: 'shop_' + x.id,
                            name: x.text,
                            amount: totalForeign,
                            currencyCode: currency.code,
                            twdAmount: getTwdEquivalent(totalForeign, currency.code, exchangeRate),
                            paidBy: splitMembers[0] || '自己', // 預設購物清單由主要第一成員先付
                            type: 'shopping'
                        };
                    });

                    // 2. 合併手動新增的項目
                    return [...shoppingExpenses, ...splitExpenses];
                }, [shoppingList, splitExpenses, currency, exchangeRate, splitMembers]);

                // 統計總台幣金額花費
                const totalTwdCost = useMemo(() => {
                    return totalCalculatedExpenses.reduce((sum, item) => sum + (item.twdAmount || 0), 0);
                }, [totalCalculatedExpenses]);

                // 每人平均花費
                const avgTwdCost = useMemo(() => {
                    if (splitMembers.length === 0) return 0;
                    return Math.ceil(totalTwdCost / splitMembers.length);
                }, [totalTwdCost, splitMembers]);

                // 計算每人的收支平衡狀態 (總付出 - 應付出)
                const balanceReport = useMemo(() => {
                    const report = {};
                    splitMembers.forEach(m => { report[m] = 0; });
                    
                    totalCalculatedExpenses.forEach(item => {
                        // 付款人先加上該筆付出的全額台幣
                        if (report[item.paidBy] !== undefined) {
                            report[item.paidBy] += item.twdAmount;
                        }
                        // 每個人平分扣除應付份額
                        const share = item.twdAmount / splitMembers.length;
                        splitMembers.forEach(m => {
                            report[m] -= share;
                        });
                    });

                    return report;
                }, [splitMembers, totalCalculatedExpenses]);

                return (
                    <div className="p-4 pb-24 space-y-4">
                        <h2 className="text-xl font-bold" style={{ color: COLORS.darkText }}>分帳與記帳結算中心</h2>
                        
                        {/* 成員管理區塊 */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <h3 className="text-xs font-bold mb-2 flex items-center gap-1" style={{color:COLORS.darkText}}><i className="fa-solid fa-users"></i> 同行分攤成員名單</h3>
                            <div className="flex flex-wrap gap-1.5 mb-3">
                                {splitMembers.map(m => (
                                    <span key={m} className="inline-flex items-center gap-1 text-xs px-2.5 py-1 rounded-full bg-slate-100 font-bold" style={{color:COLORS.darkText}}>
                                        {m} <button onClick={()=>handleRemoveMember(m)} className="text-gray-400 hover:text-red-500"><i className="fa-solid fa-circle-xmark text-[13px]"></i></button>
                                    </span>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input type="text" placeholder="新成員名字..." className="flex-1 p-2 border rounded-lg text-xs" value={newMember} onChange={e=>setNewMember(e.target.value)} />
                                <button onClick={handleAddMember} className="px-3 py-2 text-white font-bold rounded-lg text-xs" style={{backgroundColor: COLORS.mediumBlue}}><i className="fa-solid fa-plus"></i> 新增</button>
                            </div>
                        </div>

                        {/* 記帳統計看板 */}
                   <!-- 左側：目前總花費計 -->
<div class="bg-orange-500 text-white p-4 rounded-xl shadow-sm">
    <div class="text-xs opacity-80">目前總花費計</div>
    <div class="text-2xl font-bold mt-1">NT$ 0</div>
    <div class="text-xs opacity-60 mt-1">含手動及勾選購物</div>
</div>
                        <!-- 右側：每人平均應付 -->
<div class="bg-amber-600 text-white p-4 rounded-xl shadow-sm">
    <div class="text-xs opacity-80">每人平均應付</div>
    <div class="text-2xl font-bold mt-1">NT$ 0</div>
    <div class="text-xs opacity-60 mt-1">共 1 人平分帳目</div>
</div>

                        {/* 手動記帳開關與表單 */}
                        <div>
                            <button onClick={() => setShowManualForm(!showManualForm)} className="w-full py-2.5 text-white font-bold rounded-lg text-xs shadow-sm flex items-center justify-center gap-1" style={{backgroundColor: showManualForm ? '#9ca3af' : COLORS.mediumBlue}}>
                                <i className={`fa-solid ${showManualForm ? 'fa-xmark' : 'fa-plus'}`}></i> {showManualForm ? '取消手動新增' : '➕ 手動新增一筆消費帳目'}
                            </button>

                            {showManualForm && (
                                <div className="bg-white p-4 rounded-xl border mt-3 shadow-md space-y-3">
                                    <h4 className="text-xs font-bold border-b pb-1.5" style={{color: COLORS.darkText}}>手動記帳項目設定</h4>
                                    <div>
                                        <label className="text-[11px] font-bold block mb-1 text-gray-500">消費項目名稱</label>
                                        <input type="text" placeholder="例如：計程車、晚餐車資、門票..." className="w-full p-2 border rounded-lg text-xs" value={manualExpense.name} onChange={e=>setManualExpense({...manualExpense, name: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[11px] font-bold block mb-1 text-gray-500">外幣金額</label>
                                            <input type="number" placeholder="請輸入金額" className="w-full p-2 border rounded-lg text-xs" value={manualExpense.amount} onChange={e=>setManualExpense({...manualExpense, amount: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[11px] font-bold block mb-1 text-gray-500">交易幣別</label>
                                            <select className="w-full p-2 border rounded-lg bg-white text-xs" value={manualExpense.currencyCode} onChange={e=>setManualExpense({...manualExpense, currencyCode: e.target.value})}>
                                                {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold block mb-1 text-gray-500">誰先代墊付款？</label>
                                        <select className="w-full p-2 border rounded-lg bg-white text-xs" value={manualExpense.paidBy} onChange={e=>setManualExpense({...manualExpense, paidBy: e.target.value})}>
                                            {splitMembers.map(m=><option key={m} value={m}>{m}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={handleAddManualExpense} className="w-full py-2 text-white font-bold rounded-lg text-xs bg-emerald-600"><i className="fa-solid fa-check"></i> 確定手動加入帳目庫</button>
                                </div>
                            )}
                        </div>

                        {/* 消費帳目細項列表 */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <h3 className="text-xs font-bold mb-3 border-b pb-1.5 flex justify-between items-center" style={{color:COLORS.darkText}}>
                                <span><i className="fa-solid fa-receipt"></i> 所有結算帳目清單 ({totalCalculatedExpenses.length}筆)</span>
                                <span className="text-[10px] font-normal text-gray-400">點擊垃圾桶可移除手動帳目</span>
                            </h3>
                            <div className="space-y-2 max-h-[220px] overflow-y-auto no-scrollbar">
                                {totalCalculatedExpenses.map((item) => (
                                    <div key={item.id} className="flex items-center justify-between text-xs p-2 bg-slate-50 rounded-lg border">
                                        <div className="min-w-0 flex-1 pr-2">
                                            <p className="font-bold truncate text-gray-800">{item.name}</p>
                                            <p className="text-[10px] text-gray-400 mt-0.5">
                                                <span className="font-bold text-slate-600">{item.paidBy}</span> 付款 · 
                                                <span className="ml-1 bg-slate-200 px-1 py-0.2 rounded text-[9px]">{item.type === 'manual' ? '手動記帳' : '清單同步'}</span>
                                            </p>
                                        </div>
                                        <div className="text-right flex items-center gap-2">
                                            <div>
                                                <p className="font-mono text-gray-600 font-bold">{CURRENCIES.find(c=>c.code===item.currencyCode)?.symbol}{item.amount}</p>
                                                <p className="text-[10px] font-mono font-bold text-gray-400">NT${item.twdAmount}</p>
                                            </div>
                                            {item.type === 'manual' && (
                                                <button onClick={()=>setSplitExpenses(splitExpenses.filter(x=>x.id!==item.id))} className="text-gray-300 hover:text-red-500 pl-1"><i className="fa-solid fa-trash-can"></i></button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {totalCalculatedExpenses.length === 0 && (
                                    <p className="text-center text-gray-400 py-6 text-[11px]">目前尚無任何花費帳目。請手動新增或到購物清單勾選已購買商品！</p>
                                )}
                            </div>
                        </div>

                        {/* 最終分帳找零清單 */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <h3 className="text-xs font-bold mb-3 border-b pb-1.5" style={{color:COLORS.darkText}}><i className="fa-solid fa-calculator"></i> 成員收支平衡結算差額</h3>
                            <div className="space-y-2.5">
                                {Object.keys(balanceReport).map(name => {
                                    const val = balanceReport[name];
                                    const isOwed = val >= 0;
                                    return (
                                        <div key={name} className="flex justify-between items-center text-xs">
                                            <span className="font-bold text-gray-700">{name}</span>
                                            <span className={`font-mono font-bold px-2 py-0.5 rounded ${isOwed ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-500'}`}>
                                                {isOwed ? `可拿回 +NT$${Math.ceil(val).toLocaleString()}` : `需補出 -NT$${Math.abs(Math.floor(val)).toLocaleString()}`}
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 全域頂部與排行程通用彈窗 ---
            return (
                <div className="app-container">
                    {/* 頂部 Header 區塊 */}
                    <header className="p-4 flex items-center justify-between shadow-sm sticky top-0 z-50 bg-white border-b">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl">✈️</span>
                            <div>
                                <h1 className="text-base font-black tracking-tight" style={{ color: COLORS.darkText }}>旅遊小幫手 2.0</h1>
                                <p className="text-[10px] text-gray-400 -mt-0.5 font-bold">匯率天氣即時同步版</p>
                            </div>
                        </div>
                        {/* 頂部匯率快速看板 */}
                        <div className="text-right bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100">
                            <p className="text-[9px] text-gray-400 font-bold uppercase tracking-wider">即時基準匯率</p>
                            <p className="text-xs font-mono font-black text-slate-700">1 TWD = {exchangeRate} {currency.code}</p>
                        </div>
                    </header>

                    {/* 中央主內容捲動區 */}
                    <main className="content-area no-scrollbar">
                        {activeTab === 'dest' && <RenderDestination />}
                        {activeTab === 'list' && <RenderItinerary />}
                        {activeTab === 'must' && <RenderMustGo />}
                        {activeTab === 'shop' && <RenderShoppingList />}
                        {activeTab === 'split' && <RenderSplitBill />}
                        {activeTab === 'sett' && <RenderSettings />}
                    </main>

                    {/* 安排行程專用通用互動視窗 Modal */}
                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[999] backdrop-blur-xs">
                            <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl border animate-in fade-in zoom-in-95 duration-150">
                                <h3 className="font-bold mb-3 text-sm flex items-center gap-1" style={{color: COLORS.darkText}}><i className="fa-solid fa-calendar-plus text-emerald-600"></i> 將項目編排入每日行程</h3>
                                <p className="text-xs text-gray-500 mb-3 bg-slate-50 p-2 rounded border">目標項目：{addToItinModal.item?.name || addToItinModal.item?.notes}</p>
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-[11px] font-bold block mb-1 text-gray-600">選擇天數</label>
                                        <select className="w-full p-2 border rounded-lg bg-white text-xs" value={modalDayChoice} onChange={e=>setModalDayChoice(e.target.value)}>
                                            {uniqueDays.map(d=><option key={d} value={d}>{d}</option>)}
                                            <option value="__CUSTOM__">+ 新增其他天數...</option>
                                        </select>
                                    </div>
                                    {modalDayChoice === '__CUSTOM__' && (
                                        <div>
                                            <label className="text-[11px] font-bold block mb-1 text-gray-600">輸入自訂天數名稱</label>
                                            <input type="text" placeholder="例如: Day 4" className="w-full p-2 border rounded-lg text-xs" value={modalCustomDay} onChange={e=>setModalCustomDay(e.target.value)} />
                                        </div>
                                    )}
                                    <div>
                                        <label className="text-[11px] font-bold block mb-1 text-gray-600">出發時間點</label>
                                        <input type="time" className="w-full p-2 border rounded-lg text-xs" value={modalTime} onChange={e=>setModalTime(e.target.value)} />
                                    </div>
                                    <div className="flex gap-2 pt-2 border-t mt-4">
                                        <button onClick={confirmAddToItinerary} className="flex-1 py-2 text-white font-bold text-xs rounded-lg shadow-sm" style={{backgroundColor: COLORS.mediumBlue}}>確認排入</button>
                                        <button onClick={()=>setAddToItinModal({isOpen:false, item:null})} className="flex-1 py-2 bg-gray-100 text-gray-700 text-xs font-bold rounded-lg">取消離開</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全域 Toast 提示泡泡 */}
                    {toastMessage && (
                        <div className="absolute bottom-20 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg z-[9999] flex items-center gap-1.5 animate-bounce">
                            <i className="fa-solid fa-circle-check text-emerald-400"></i> {toastMessage}
                        </div>
                    )}

                    {/* 底部導覽列 Tab Bar (原汁原味排版與圖示) */}
                    <nav className="absolute bottom-0 left-0 right-0 h-16 bg-white border-t flex items-center justify-around z-50 px-2">
                        <button onClick={()=>setActiveTab('dest')} className={`flex flex-col items-center gap-0.5 ${activeTab==='dest'?'font-black':'text-gray-400'}`} style={{color:activeTab==='dest'?COLORS.mediumBlue:''}}><i className="fa-solid fa-map-location-dot text-base"></i><span className="text-[9px]">目的地</span></button>
                        <button onClick={()=>setActiveTab('list')} className={`flex flex-col items-center gap-0.5 ${activeTab==='list'?'font-black':'text-gray-400'}`} style={{color:activeTab==='list'?COLORS.mediumBlue:''}}><i className="fa-solid fa-calendar-days text-base"></i><span className="text-[9px]">行程規劃</span></button>
                        <button onClick={()=>setActiveTab('must')} className={`flex flex-col items-center gap-0.5 ${activeTab==='must'?'font-black':'text-gray-400'}`} style={{color:activeTab==='must'?COLORS.mediumBlue:''}}><i className="fa-solid fa-heart text-base"></i><span className="text-[9px]">必去必買</span></button>
                        <button onClick={()=>setActiveTab('shop')} className={`flex flex-col items-center gap-0.5 ${activeTab==='shop'?'font-black':'text-gray-400'}`} style={{color:activeTab==='shop'?COLORS.mediumBlue:''}}><i className="fa-solid fa-cart-shopping text-base"></i><span className="text-[9px]">購物計算</span></button>
                        <button onClick={()=>setActiveTab('split')} className={`flex flex-col items-center gap-0.5 ${activeTab==='split'?'font-black':'text-gray-400'}`} style={{color:activeTab==='split'?COLORS.mediumBlue:''}}><i className="fa-solid fa-coins text-base"></i><span className="text-[9px]">記帳結算</span></button>
                        <button onClick={()=>setActiveTab('sett')} className={`flex flex-col items-center gap-0.5 ${activeTab==='sett'?'font-black':'text-gray-400'}`} style={{color:activeTab==='sett'?COLORS.mediumBlue:''}}><i className="fa-solid fa-clipboard-list text-base"></i><span className="text-[9px]">檢查清單</span></button>
                    </nav>
                </div>
            );
        };

        // 啟動 React 渲染流程
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
