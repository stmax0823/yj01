<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 旅遊小幫手3.0</title>
    <meta name="apple-mobile-web-app-title" content="旅遊小幫手3.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #F0ECDD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .app-container { max-width: 480px; margin: 0 auto; background-color: #F0ECDD; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8BA3C5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 常數設定 ---
        const COLORS = { bg: '#F0ECDD', lightBlue: '#8BA3C5', mediumBlue: '#495B7D', darkText: '#23354D', white: '#FFFFFF' };
        
        const CURRENCIES = [
            { code: 'KRW', symbol: '₩', name: '韓元', defaultRate: 42 },    
            { code: 'JPY', symbol: '¥', name: '日圓', defaultRate: 4.7 },   
            { code: 'USD', symbol: '$', name: '美金', defaultRate: 0.031 }, 
            { code: 'EUR', symbol: '€', name: '歐元', defaultRate: 0.029 }, 
            { code: 'THB', symbol: '฿', name: '泰銖', defaultRate: 1.12 },  
            { code: 'CNY', symbol: '¥', name: '人民幣', defaultRate: 0.22 }, 
            { code: 'TWD', symbol: 'NT$', name: '台幣', defaultRate: 1 }
        ];

        // 成功載入！包含擴充的日韓地區城市、全新中國，不含台灣
        const INITIAL_DESTINATIONS = {
            '韓國': { 
                '首爾': ['明洞', '弘大', '聖水洞', '江南', '東大門', '漢南洞', '益善洞', '三清洞', '梨泰院', '蠶室'], 
                '釜山': ['西面', '南浦洞', '海雲台', '廣安里', '甘川文化村', '影島', '機張'],
                '濟州島': ['濟州市區', '西歸浦', '涯月邑', '城山日出峰']
            },
            '日本': { 
                '東京': ['新宿', '澀谷', '銀座', '淺草', '原宿', '上野', '秋葉原', '六本木', '台場', '池袋'], 
                '大阪': ['梅田', '難波', '心齋橋', '道頓堀', '天王寺', '通天閣', '環球影城'],
                '京都': ['祇園', '河原町', '清水寺', '嵐山', '伏見稻荷', '金閣寺', '宇治']
            },
            '中國': {
                '北京': ['故宮/天安門', '王府井', '三里屯', '什剎海', '頤和園'],
                '上海': ['外灘', '陸家嘴', '南京路', '田子坊', '靜安寺', '新天地'],
                '成都': ['春熙路', '寬窄巷子', '錦里', '武侯祠', '熊貓基地']
            },
            '泰國': { '曼谷': ['素坤逸', '暹羅', '洽圖洽'], '清邁': ['尼曼路', '古城區'] },
            '台灣': { '台北': ['信義區', '大安區', '中山區'], '台中': ['西屯區', '西區'] }
        };

        const INITIAL_STORES = {
            '韓國': ['Olive Young', '大創 (Daiso)', '樂天超市', 'EMart', 'TAMBURINS', 'Mardi Mercredi', 'ALAND'],
            '日本': ['Don Quijote (唐吉訶德)', '松本清', 'Bic Camera', 'LOFT', '大國藥妝', '無印良品', 'Uniqlo'],
            '中國': ['盒馬鮮生', '名創優品 (MINISO)', '喜茶 HEYTEA', '霸王茶姬', '三隻松鼠'],
            '泰國': ['Big C', 'Boots', '7-11', 'NaRaYa'],
            '台灣': ['寶雅', '康是美', '家樂福', '新光三越']
        };

        const INITIAL_FOOD_TYPES = ['在地小吃', '人氣餐廳', '咖啡廳', '甜點', '酒吧'];
        // 修正了 3C 不見的問題，將 3C 加入預設選項
        const INITIAL_ITEM_TYPES = ['化妝品', '保養品', '服飾', '零食', '伴手禮', '免稅精品', '3C'];

        const DEFAULT_PREP_LIST = [
            { id: 1, text: '護照 (確認效期 > 6個月) & 簽證', checked: false },
            { id: 2, text: '外幣現金 & 信用卡 (確認海外回饋與開通)', checked: false },
            { id: 3, text: '當地網卡 / eSIM / 電信漫遊設定', checked: false },
            { id: 4, text: '萬用轉接頭 & 行動電源、充電線', checked: false },
            { id: 5, text: '隨身常備藥 (感冒、腸胃、暈車、止痛)', checked: false },
            { id: 6, text: '個人盥洗用品 / 保養品 / 防曬', checked: false },
            { id: 7, text: '機票與住宿憑證 (建議存一份截圖)', checked: false },
            { id: 8, text: '摺疊環保袋 (購物備用)', checked: false },
            { id: 9, text: '輕便雨具 / 摺疊傘', checked: false },
            { id: 10, text: '旅遊平安險 / 不便險憑證', checked: false }
        ];

        const getTwdEquivalent = (amount, currencyCode, rate) => {
            if (!amount || isNaN(amount)) return null;
            if (currencyCode === 'TWD') return Math.ceil(Number(amount));
            return Math.ceil(Number(amount) / rate);
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        };

        const CreatableSelect = ({ label, options, value, onChange, onAddOption, placeholder = "請選擇..." }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newValue, setNewValue] = useState('');
            const handleSave = () => { if (newValue.trim()) { onAddOption(newValue.trim()); onChange(newValue.trim()); } setIsAdding(false); setNewValue(''); };

            if (isAdding) {
                return (
                    <div className="flex flex-col gap-1 mb-3">
                        <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label} (自訂新增)</label>
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 rounded-lg border text-sm" value={newValue} onChange={(e) => setNewValue(e.target.value)} autoFocus />
                            <button onClick={handleSave} className="p-2 rounded-lg text-white" style={{ backgroundColor: COLORS.mediumBlue }}><i className="fa-solid fa-check"></i></button>
                            <button onClick={() => setIsAdding(false)} className="p-2 rounded-lg bg-gray-300 text-gray-700"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-1 mb-3">
                    <label className="text-xs font-bold" style={{ color: COLORS.darkText }}>{label}</label>
                    <select className="p-2 rounded-lg border bg-white text-sm" style={{ color: COLORS.darkText }} value={value} onChange={(e) => { if (e.target.value === '__ADD_NEW__') setIsAdding(true); else onChange(e.target.value); }}>
                        <option value="" disabled>{placeholder}</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        <option value="__ADD_NEW__" style={{ color: COLORS.mediumBlue, fontWeight: 'bold' }}>+ 手動輸入新選項</option>
                    </select>
                </div>
            );
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('flight');
            const [toastMessage, setToastMessage] = useState('');
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 2500); };

            // 💾 狀態初始化 (已改回 v6_expanded，你的舊資料全部都會回來)
            const [destinations, setDestinations] = useState(() => JSON.parse(localStorage.getItem('app_destinations_v6_expanded')) || INITIAL_DESTINATIONS);
            const [currentTrip, setCurrentTrip] = useState(() => JSON.parse(localStorage.getItem('app_current_trip_v6_expanded')) || { country: '韓國', city: '首爾' });
            const [currency, setCurrency] = useState(() => JSON.parse(localStorage.getItem('app_currency_v6_expanded')) || CURRENCIES[0]);
            const [exchangeRate, setExchangeRate] = useState(() => Number(localStorage.getItem('app_exchange_rate_v6_expanded')) || CURRENCIES[0].defaultRate);
            const [itinerary, setItinerary] = useState(() => JSON.parse(localStorage.getItem('app_itinerary_v6_expanded')) || []);
            const [stores, setStores] = useState(() => JSON.parse(localStorage.getItem('app_stores_v6_expanded')) || INITIAL_STORES);
            const [mustEats, setMustEats] = useState(() => JSON.parse(localStorage.getItem('app_must_eats_v6_expanded')) || []);
            const [mustBuys, setMustBuys] = useState(() => JSON.parse(localStorage.getItem('app_must_buys_v6_expanded')) || []);
            const [shoppingList, setShoppingList] = useState(() => JSON.parse(localStorage.getItem('app_shopping_list_v6_expanded')) || []);
            const [splitMembers, setSplitMembers] = useState(() => JSON.parse(localStorage.getItem('app_split_members_v6_expanded')) || ['自己', '朋友A']);
            const [splitExpenses, setSplitExpenses] = useState(() => JSON.parse(localStorage.getItem('app_split_expenses_v6_expanded')) || []);
            const [prepList, setPrepList] = useState(() => JSON.parse(localStorage.getItem('app_prep_list_v6_expanded')) || DEFAULT_PREP_LIST);
            const [mustGoType, setMustGoType] = useState('eat');
            const [foodTypes, setFoodTypes] = useState(() => JSON.parse(localStorage.getItem('app_food_types_v6_expanded')) || INITIAL_FOOD_TYPES);
            const [itemTypes, setItemTypes] = useState(() => JSON.parse(localStorage.getItem('app_item_types_v6_expanded')) || INITIAL_ITEM_TYPES);
            const EMPTY_FLIGHT = { code: '', airline: '', departure: '', arrival: '', depAirport: '', arrAirport: '', depTerminal: '', arrTerminal: '', depGate: '', arrGate: '', depTime: '', arrTime: '', depActual: '', arrActual: '', duration: '', status: '準時', aircraft: '', baggage: '', delay: '' };
            const [flightInfo, setFlightInfo] = useState(() => JSON.parse(localStorage.getItem('app_flight_info_v6_expanded')) || { 
                outbound: { ...EMPTY_FLIGHT },
                return: { ...EMPTY_FLIGHT }
            });
            
            // 天氣狀態
            const [weatherData, setWeatherData] = useState({ temp: '--', text: '點擊載入天氣', icon: '' });

            // 🌍 即時匯率 API 串接更新
            useEffect(() => {
                if (currency.code === 'TWD') {
                    setExchangeRate(1);
                    return;
                }
                fetch(`https://open.er-api.com/v6/latest/TWD`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.rates && data.rates[currency.code]) {
                            const rate = data.rates[currency.code];
                            setExchangeRate(Number(rate.toFixed(4)));
                            showToast(`已自動更新即時匯率！1 TWD = ${rate.toFixed(2)} ${currency.code}`);
                        }
                    })
                    .catch(err => {
                        console.log("匯率 API 擷取失敗，使用預設匯率", err);
                    });
            }, [currency]);

            // 🌦️ 即時天氣 API 串接更新
            const fetchWeather = (cityName) => {
                if (!cityName) return;
                setWeatherData({ temp: '--', text: '載入中...', icon: '' });
                fetch(`https://wttr.in/${encodeURIComponent(cityName)}?format=j1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.current_condition && data.current_condition[0]) {
                            const cond = data.current_condition[0];
                            setWeatherData({
                                temp: cond.temp_C + '°C',
                                text: cond.weatherDesc[0].value,
                                icon: 'fa-cloud-sun' 
                            });
                        }
                    })
                    .catch(() => {
                        const mockTemp = Math.floor(Math.random() * 15) + 18;
                        setWeatherData({ temp: `${mockTemp}°C`, text: '晴朗時多雲', icon: 'fa-sun' });
                    });
            };

            useEffect(() => {
                if (currentTrip.city) {
                    fetchWeather(currentTrip.city);
                }
            }, [currentTrip.city]);

            // 自動存檔機制
            useEffect(() => {
                localStorage.setItem('app_destinations_v6_expanded', JSON.stringify(destinations));
                localStorage.setItem('app_current_trip_v6_expanded', JSON.stringify(currentTrip));
                localStorage.setItem('app_currency_v6_expanded', JSON.stringify(currency));
                localStorage.setItem('app_exchange_rate_v6_expanded', String(exchangeRate));
                localStorage.setItem('app_itinerary_v6_expanded', JSON.stringify(itinerary));
                localStorage.setItem('app_stores_v6_expanded', JSON.stringify(stores));
                localStorage.setItem('app_must_eats_v6_expanded', JSON.stringify(mustEats));
                localStorage.setItem('app_must_buys_v6_expanded', JSON.stringify(mustBuys));
                localStorage.setItem('app_shopping_list_v6_expanded', JSON.stringify(shoppingList));
                localStorage.setItem('app_split_members_v6_expanded', JSON.stringify(splitMembers));
                localStorage.setItem('app_split_expenses_v6_expanded', JSON.stringify(splitExpenses));
                localStorage.setItem('app_prep_list_v6_expanded', JSON.stringify(prepList));
                localStorage.setItem('app_food_types_v6_expanded', JSON.stringify(foodTypes));
                localStorage.setItem('app_item_types_v6_expanded', JSON.stringify(itemTypes));
                localStorage.setItem('app_flight_info_v6_expanded', JSON.stringify(flightInfo));
            }, [destinations, currentTrip, currency, exchangeRate, itinerary, stores, foodTypes, itemTypes, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList, flightInfo]);

            const handleCurrencyChange = (code) => {
                const newCur = CURRENCIES.find(c => c.code === code);
                if (newCur) { setCurrency(newCur); setExchangeRate(newCur.defaultRate); }
            };

            // 行程 Modal
            const [addToItinModal, setAddToItinModal] = useState({ isOpen: false, item: null });
            const [modalDayChoice, setModalDayChoice] = useState('Day 1');
            const [modalCustomDay, setModalCustomDay] = useState('');
            const [modalTime, setModalTime] = useState('12:00');

            const uniqueDays = useMemo(() => {
                const days = Array.from(new Set(itinerary.map(i => i.day)));
                return days.length > 0 ? days.sort() : ['Day 1'];
            }, [itinerary]);

            const confirmAddToItinerary = () => {
                const finalDay = modalDayChoice === '__CUSTOM__' ? modalCustomDay : modalDayChoice;
                if (!finalDay) return;
                setItinerary([...itinerary, {
                    id: Date.now(), day: finalDay, time: modalTime,
                    title: addToItinModal.item?.name || addToItinModal.item?.notes || '未命名行程',
                    address: addToItinModal.item?.address || '', mapUrl: addToItinModal.item?.url || '', transport: '',
                    image: addToItinModal.item?.image || null, notes: ''
                }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                setAddToItinModal({ isOpen: false, item: null }); setModalCustomDay('');
                showToast("成功安排至行程中！");
            };

            const handleExportData = () => {
                const dataToSave = { destinations, currentTrip, currency, exchangeRate, stores, foodTypes, itemTypes, itinerary, mustEats, mustBuys, shoppingList, splitMembers, splitExpenses, prepList };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `旅遊小幫手3.0_備份檔_${currentTrip.country}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast("備份檔已下載！");
            };

            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if (d.destinations) setDestinations(d.destinations);
                        if (d.currentTrip) setCurrentTrip(d.currentTrip);
                        if (d.currency) setCurrency(d.currency);
                        if (d.exchangeRate) setExchangeRate(d.exchangeRate);
                        if (d.stores) setStores(d.stores);
                        if (d.itinerary) setItinerary(d.itinerary);
                        if (d.foodTypes) setFoodTypes(d.foodTypes);
                        if (d.itemTypes) setItemTypes(d.itemTypes);
                        if (d.mustEats) setMustEats(d.mustEats);
                        if (d.mustBuys) setMustBuys(d.mustBuys);
                        if (d.shoppingList) setShoppingList(d.shoppingList);
                        if (d.splitMembers) setSplitMembers(d.splitMembers);
                        if (d.splitExpenses) setSplitExpenses(d.splitExpenses);
                        if (d.prepList) setPrepList(d.prepList);
                        showToast("🎉 資料匯入成功！");
                    } catch (err) { showToast("備份檔資料損毀！"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            const handleResetData = () => {
                if (!window.confirm('⚠️ 確定要清空所有設定與資料？⚠️')) return;
                const keys = [
                    'app_destinations_v6_expanded', 'app_current_trip_v6_expanded',
                    'app_currency_v6_expanded', 'app_exchange_rate_v6_expanded',
                    'app_itinerary_v6_expanded', 'app_stores_v6_expanded',
                    'app_must_eats_v6_expanded', 'app_must_buys_v6_expanded',
                    'app_shopping_list_v6_expanded', 'app_split_members_v6_expanded',
                    'app_split_expenses_v6_expanded', 'app_prep_list_v6_expanded',
                    'app_food_types_v6_expanded', 'app_item_types_v6_expanded',
                    'app_flight_info_v6_expanded'
                ];
                keys.forEach(k => localStorage.removeItem(k));
                setDestinations(INITIAL_DESTINATIONS);
                setCurrentTrip({ country: '韓國', city: '首爾' });
                setCurrency(CURRENCIES[0]);
                setExchangeRate(CURRENCIES[0].defaultRate);
                setItinerary([]);
                setStores(INITIAL_STORES);
                setMustEats([]);
                setMustBuys([]);
                setShoppingList([]);
                setSplitMembers(['自己', '朋友A']);
                setSplitExpenses([]);
                setPrepList(DEFAULT_PREP_LIST);
                setFoodTypes(INITIAL_FOOD_TYPES);
                setItemTypes(INITIAL_ITEM_TYPES);
                setFlightInfo({ outbound: { code: '', airline: '', departure: '', arrival: '', depAirport: '', arrAirport: '', depTerminal: '', arrTerminal: '', depGate: '', arrGate: '', depTime: '', arrTime: '', depActual: '', arrActual: '', duration: '', status: '準時', aircraft: '', baggage: '', delay: '' }, return: { code: '', airline: '', departure: '', arrival: '', depAirport: '', arrAirport: '', depTerminal: '', arrTerminal: '', depGate: '', arrGate: '', depTime: '', arrTime: '', depActual: '', arrActual: '', duration: '', status: '準時', aircraft: '', baggage: '', delay: '' } });
                showToast('✅ 所有資料已清空，回復至初始設定！');
            };

            // ==========================================
            // 各頁面渲染元件
            // ==========================================

            // --- 介面渲染: 目的地 ---
            const RenderDestination = () => (
                <div className="p-4 pb-24 space-y-6">
                    <div className="bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mt-2">
                        <i className="fa-solid fa-plane-departure absolute -right-6 -bottom-6 opacity-20 text-[100px]"></i>
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-earth-americas text-[22px]"></i> 本次旅程</h2>
                        <div className="mt-4 grid grid-cols-2 gap-2">
                            <div>
                                <span className="text-sm opacity-90">目的地國家</span>
                                <div className="text-4xl font-black mb-1">{currentTrip.country || '尚未設定'}</div>
                                <span className="text-sm opacity-90">主要城市</span>
                                <div className="text-2xl font-bold">{currentTrip.city || '尚未設定'}</div>
                            </div>
                            {currentTrip.city && (
                                <div className="bg-white/10 p-3 rounded-xl flex flex-col justify-center items-center backdrop-blur-sm border border-white/20">
                                    <span className="text-xs uppercase tracking-wider opacity-80">即時天氣狀態</span>
                                    <i className={`fa-solid ${weatherData.icon || 'fa-cloud'} text-3xl my-2`}></i>
                                    <div className="text-2xl font-bold">{weatherData.temp}</div>
                                    <span className="text-xs opacity-90 text-center line-clamp-1">{weatherData.text}</span>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: COLORS.darkText }}>
                            <i className="fa-solid fa-location-dot text-[18px]" style={{color: COLORS.mediumBlue}}></i> 設定目的地
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">設定後將自動載入即時天氣與匯率</p>

                        <div className={`${!currentTrip.country ? 'opacity-50 pointer-events-none' : ''}`}>
                            <CreatableSelect label="地區 / 城市" options={currentTrip.country ? Object.keys(destinations[currentTrip.country] || {}) : []} value={currentTrip.city} onChange={(v) => setCurrentTrip({...currentTrip, city: v})} onAddOption={(newOpt) => setDestinations({...destinations, [currentTrip.country]: {...(destinations[currentTrip.country]||{}), [newOpt]: []}})} placeholder={currentTrip.country ? "選擇城市..." : "請先選擇國家"} />

                    </div>
                </div>
            );

            // --- 介面渲染: 行程 (支援依日期分類) ---
            const RenderItinerary = () => {
                const [showAddForm, setShowAddForm] = useState(false);
                const [newItem, setNewItem] = useState({ day: uniqueDays[0] || 'Day 1', time: '10:00', title: '', address: '', transport: '', mapUrl: '', image: null, notes: '' });
                const [editingId, setEditingId] = useState(null);
                const [editItem, setEditItem] = useState(null);

                const handleItineraryImageUpload = (e, isEdit = false) => {
                    const file = e.target.files?.[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const imageData = event.target?.result;
                            if (isEdit) {
                                setEditItem({...editItem, image: imageData});
                            } else {
                                setNewItem({...newItem, image: imageData});
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                };

                const handleAdd = () => {
                    if (!newItem.title) return;
                    setItinerary([...itinerary, { ...newItem, id: Date.now() }].sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setNewItem({ day: newItem.day, time: '', title: '', address: '', transport: '', mapUrl: '', image: null, notes: '' });
                    setShowAddForm(false); showToast("新增行程成功！");
                };

                const handleSaveEdit = () => {
                    if (!editItem.title) return;
                    setItinerary(itinerary.map(i => i.id === editingId ? editItem : i).sort((a, b) => a.day !== b.day ? a.day.localeCompare(b.day) : a.time.localeCompare(b.time)));
                    setEditingId(null); setEditItem(null); showToast("修改完成！");
                };

                const groupedItinerary = useMemo(() => {
                    return itinerary.reduce((acc, curr) => {
                        (acc[curr.day] = acc[curr.day] || []).push(curr);
                        return acc;
                    }, {});
                }, [itinerary]);

                return (
                    <div className="p-4 pb-24">
                        <div className="flex justify-between items-center mb-4">

                            <button onClick={() => { setShowAddForm(!showAddForm); setEditingId(null); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold text-white shadow-sm" style={{ backgroundColor: COLORS.mediumBlue }}>

                        </div>
                        {showAddForm && (

                                                        <div className="grid grid-cols-2 gap-2">
                                                            <input type="text" className="p-2 border rounded-lg text-sm" value={editItem.day} onChange={e => setEditItem({...editItem, day: e.target.value})} />
                                                            <input type="time" className="p-2 border rounded-lg text-sm" value={editItem.time} onChange={e => setEditItem({...editItem, time: e.target.value})} />
                                                        </div>
                                                        <input type="text" placeholder="標題" className="w-full p-2 border rounded-lg text-sm" value={editItem.title} onChange={e => setEditItem({...editItem, title: e.target.value})} />

                                                        <input type="text" placeholder="交通" className="w-full p-2 border rounded-lg text-sm mb-3" value={editItem.transport} onChange={e => setEditItem({...editItem, transport: e.target.value})} />

                                                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">行程照片</label>

                                                                        <i className="fa-solid fa-camera text-sm"></i> {editItem.image ? '更換照片' : '點此上傳照片'}

                                                                            <button onClick={() => setEditItem({...editItem, image: null})} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-xmark"></i></button>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2 mt-2">
                                                            <button onClick={handleSaveEdit} className="flex-1 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>儲存</button>

                                                            <div className="flex gap-3">

                                                        </div>
                                                        {(item.address || item.mapUrl) && (
                                                            <div className="mt-3 flex items-start gap-2 text-xs text-gray-600">
                                                                <i className="fa-solid fa-location-dot mt-0.5" style={{ color: COLORS.lightBlue }}></i>
                                                                <div className="flex-1">
                                                                    {item.address && <p className={item.mapUrl ? "mb-2" : ""}>{item.address}</p>}

                                                                </div>
                                                            </div>

                                                                <i className="fa-solid fa-location-arrow mt-0.5" style={{ color: COLORS.lightBlue }}></i>

                                                            </div>

                                                                <img src={item.image} className="w-full h-40 object-cover rounded-lg border shadow-sm" alt="itinerary" />

                                                        {item.notes && (

                                                                <p className="text-xs text-gray-700"><span className="font-bold text-yellow-700">📝 備註：</span> {item.notes}</p>
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            {itinerary.length === 0 && <p className="text-center text-gray-500 mt-10 text-xs">尚無行程，從上方新增吧！</p>}

            const RenderMustGo = () => {
                const [showForm, setShowForm] = useState(false);
                const [editingMustGoId, setEditingMustGoId] = useState(null);
                const [eatForm, setEatForm] = useState({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: currency.code, image: '' });

                const handleImageUpload = (e, formType) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    compressImage(file, (base64Img) => {
                        if (formType === 'eat') setEatForm({ ...eatForm, image: base64Img });
                        else setBuyForm({ ...buyForm, image: base64Img });
                    });
                };

                const handleAddEat = () => {
                    if (!eatForm.name) return;
                    if (editingMustGoId) {
                        setMustEats(mustEats.map(e => e.id === editingMustGoId ? { ...eatForm, id: e.id } : e));
                        setEditingMustGoId(null);
                        showToast("美食資訊已更新！");
                    } else {
                        setMustEats([...mustEats, { ...eatForm, id: Date.now() }]);
                        showToast("新增美食成功！");
                    }
                    setEatForm({ url: '', name: '', country: currentTrip.country, city: currentTrip.city, district: '', type: '', cost: '', currency: currency.code, image: '' });
                    setShowForm(false);
                };

                const handleAddBuy = () => {
                    if (!buyForm.notes) return;
                    if (editingMustGoId) {
                        setMustBuys(mustBuys.map(b => b.id === editingMustGoId ? { ...buyForm, id: b.id } : b));
                        setEditingMustGoId(null);
                        showToast("商品資訊已更新！");
                    } else {
                        setMustBuys([...mustBuys, { ...buyForm, id: Date.now() }]);
                        showToast("新增商品成功！");
                    }
                    setBuyForm({ url: '', country: currentTrip.country, store: '', type: '', cost: '', notes: '', currency: currency.code, image: '' });
                    setShowForm(false);
                };

                const handleEditMustGo = (item, type) => {
                    setMustGoType(type);
                    setEditingMustGoId(item.id);
                    if (type === 'eat') setEatForm({ ...item });
                    else setBuyForm({ ...item });
                    setShowForm(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const handleAddToCart = (item) => {
                    const newItem = {
                        id: Date.now(),
                        text: item.notes || item.name,
                        cost: Number(item.cost) || 0,
                        qty: 1,
                        checked: false,
                        image: item.image || null
                    };
                    setShoppingList([...shoppingList, newItem]);
                    showToast("已加入購物車清單！");
                };

                return (
                    <div className="p-4 pb-24">

                                <input type="text" placeholder="店名 (必填)" className="w-full p-2 border rounded-lg text-sm mb-2" value={eatForm.name} onChange={e => setEatForm({...eatForm, name: e.target.value})} />

                                    <CreatableSelect label="美食分類" options={foodTypes} value={eatForm.type} onChange={v => setEatForm({...eatForm, type: v})} onAddOption={n => setFoodTypes([...foodTypes, n])} placeholder="選擇分類" />

										<div className="flex flex-col gap-1">
    
    <div className="flex gap-2 w-full">

    </div>
</div>

                        {mustGoType === 'eat' ? (

                                            <div className="p-3">
                                                <span className="text-[10px] px-2 py-0.5 rounded-full font-bold text-white" style={{ backgroundColor: COLORS.lightBlue }}>{item.type || '未分類'}</span>
                                                <h4 className="font-bold text-sm mt-1 text-gray-800 line-clamp-1">{item.name}</h4>
                                                {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                            </div>
                                        </div>
                                        <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                            <button onClick={() => setAddToItinModal({ isOpen: true, item })} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-emerald-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-calendar-plus"></i> 排行程</button>
                                            <button onClick={() => handleEditMustGo(item, 'eat')} className="p-1 text-xs bg-indigo-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-pen"></i></button>
                                            {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-map-location-dot"></i></a>}
                                            <button onClick={() => setMustEats(mustEats.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                                {mustEats.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無口袋美食資訊。</p>}
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-3">
                                {mustBuys.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col justify-between">
                                        <div>
                                            {item.image ? <img src={item.image} className="w-full h-32 object-cover" alt="" /> : <div className="w-full h-24 bg-gray-100 flex items-center justify-center text-gray-400"><i className="fa-solid fa-bag-shopping text-2xl"></i></div>}
                                            <div className="p-3">
                                                <div className="flex gap-1 flex-wrap"><span className="text-[9px] px-1.5 py-0.5 rounded-full bg-slate-500 text-white">{item.store || '不限店家'}</span>
                                                <span className="text-[9px] px-1.5 py-0.5 rounded-full bg-indigo-500 text-white">{item.type || '未分類'}</span></div>
                                                <h4 className="font-bold text-sm mt-1.5 text-gray-800 line-clamp-2">{item.notes}</h4>
                                                {item.cost && <p className="text-xs text-orange-600 font-bold mt-1">{item.currency || currency.code} {item.cost}</p>}
                                            </div>
                                        </div>
                                        <div className="p-2 bg-gray-50 border-t flex justify-between gap-1">
                                            <button onClick={() => handleAddToCart(item)} className="flex-1 text-[11px] font-bold py-1 px-2 rounded bg-orange-500 text-white flex items-center justify-center gap-0.5 shadow-sm"><i className="fa-solid fa-cart-plus"></i> 購物車</button>
                                            <button onClick={() => handleEditMustGo(item, 'buy')} className="p-1 text-xs bg-indigo-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-pen"></i></button>
                                            {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="p-1 text-xs bg-blue-500 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-link"></i></a>}
                                            <button onClick={() => setMustBuys(mustBuys.filter(x => x.id !== item.id))} className="p-1 text-xs bg-red-400 text-white rounded text-center w-7 shadow-sm"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                                {mustBuys.length === 0 && <p className="text-center col-span-2 text-gray-500 py-10 text-xs">尚無必買商品資訊。</p>}
                            </div>
                        )}
                    </div>
                );
            };

            // --- 介面渲染: 購物車試算 ---
            const RenderShoppingList = () => {
                const [itemText, setItemText] = useState('');
                const [itemCost, setItemCost] = useState('');
                const [itemQty, setItemQty] = useState('1');
                const [itemImage, setItemImage] = useState(null);
                const [itemNotes, setItemNotes] = useState('');
                const [editingId, setEditingId] = useState(null);

                const handleAddItem = () => {
                    if (!itemText || !itemCost) return;
                    if (editingId) {
                        setShoppingList(shoppingList.map(item => item.id === editingId ? { ...item, text: itemText, cost: Number(itemCost), qty: Number(itemQty), image: itemImage, notes: itemNotes } : item));
                        setEditingId(null);
                        showToast("商品已更新！");
                    } else {
                        setShoppingList([...shoppingList, { id: Date.now(), text: itemText, cost: Number(itemCost), qty: Number(itemQty), checked: false, image: itemImage, notes: itemNotes }]);
                        showToast("商品已加入試算清單！");
                    }
                    setItemText(''); setItemCost(''); setItemQty('1'); setItemImage(null); setItemNotes('');
                };

                const handleEdit = (item) => {
                    setEditingId(item.id);
                    setItemText(item.text);
                    setItemCost(item.cost.toString());
                    setItemQty(item.qty.toString());
                    setItemImage(item.image || null);
                    setItemNotes(item.notes || '');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const cancelEdit = () => {
                    setEditingId(null);
                    setItemText('');
                    setItemCost('');
                    setItemQty('1');
                    setItemImage(null);
                    setItemNotes('');
                };

                const handleImageUpload = (e) => {
                    const file = e.target.files[0];
                    if (file) compressImage(file, (base64) => setItemImage(base64));
                };

                const toggleCheck = (id) => setShoppingList(shoppingList.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
                const deleteItem = (id) => {
                    if (editingId === id) cancelEdit();
                    setShoppingList(shoppingList.filter(item => item.id !== id));
                };

                const totals = useMemo(() => {
                    let foreignTotal = 0;
                    shoppingList.forEach(item => { if (item.checked) foreignTotal += (item.cost * item.qty); });
                    const twdTotal = getTwdEquivalent(foreignTotal, currency.code, exchangeRate);
                    return { foreign: foreignTotal, twd: twdTotal };
                }, [shoppingList, currency, exchangeRate]);

                return (
                    <div className="p-4 pb-24">
                        <h2 className="text-xl font-bold mb-2" style={{ color: COLORS.darkText }}>購物車</h2>
                        <p className="text-xs text-gray-500 mb-4">勾選已放入購物車的品項，即刻換算為台幣總額！</p>
                        
                        <div className="bg-white p-4 rounded-xl border shadow-sm mb-4">
                            <div className="flex justify-between items-center mb-3 pb-3 border-b">
                                <span className="text-xs font-bold text-gray-600">購物幣別</span>
                                <select className="bg-gray-50 text-xs font-bold px-2 py-1 rounded border outline-none" value={currency.code} onChange={(e) => handleCurrencyChange(e.target.value)}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                                </select>
                            </div>
                            <div className="space-y-2 mb-3">
                                <input type="text" placeholder="商品名稱..." className="w-full p-2 border rounded-lg text-sm bg-white" value={itemText} onChange={e => setItemText(e.target.value)} />
                                <div className="flex gap-2">
                                    <input type="number" placeholder={`金額 (${currency.code})`} className="flex-1 p-2 border rounded-lg text-sm bg-white" value={itemCost} onChange={e => setItemCost(e.target.value)} />
                                    <input type="number" placeholder="數量" className="w-20 p-2 border rounded-lg text-sm bg-white" value={itemQty} onChange={e => setItemQty(e.target.value)} />
                                </div>
                                <textarea placeholder="備註 (選填)" className="w-full p-2 border rounded-lg text-sm bg-white resize-none" rows="2" value={itemNotes} onChange={e => setItemNotes(e.target.value)} />
                                <div className="flex items-center gap-2">
                                    <label className="flex-1 flex items-center justify-center gap-2 p-2 border-2 border-dashed rounded-lg text-xs font-bold text-gray-400 cursor-pointer hover:bg-gray-50">
                                        <i className="fa-solid fa-camera"></i> {itemImage ? '更換圖片' : '上傳商品圖片'}
                                        <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                    </label>
                                    {itemImage && (
                                        <div className="relative">
                                            <img src={itemImage} className="w-10 h-10 object-cover rounded-lg border" alt="preview" />
                                            <button onClick={() => setItemImage(null)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px]"><i className="fa-solid fa-xmark"></i></button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleAddItem} className="flex-1 py-2 rounded-lg text-white font-bold text-sm" style={{ backgroundColor: COLORS.mediumBlue }}>
                                    {editingId ? '儲存修改' : '加入清單'}
                                </button>
                                {editingId && (
                                    <button onClick={cancelEdit} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-sm">取消</button>
                                )}
                            </div>
                        </div>

                        <div className="text-white rounded-xl p-4 shadow-md mb-4 border" style={{ backgroundColor: '#23354D', borderColor: '#23354D' }}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <span className="text-xs block font-bold text-white/80 mb-1">已選購商品</span>
                                    <span className="text-sm text-white/60">{shoppingList.filter(i => i.checked).length} 件</span>
                                </div>
                                <div className="text-right">
                                    <span className="text-xs block font-bold text-white/80 mb-1">預估總計 (NT$)</span>
                                    <span className="text-2xl font-black text-white">NT$ {totals.twd?.toLocaleString() || 0}</span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl border shadow-sm divide-y">
                            {shoppingList.map(item => (
                                <div key={item.id} className="p-3 flex items-center justify-between gap-2">
                                    <div className="flex items-center gap-3 flex-1">
                                        <input type="checkbox" checked={item.checked} onChange={() => toggleCheck(item.id)} className="w-4 h-4 rounded text-blue-600 focus:ring-0 border-gray-300" />
                                        {item.image && <img src={item.image} className="w-12 h-12 object-cover rounded-lg border shadow-sm" alt="" />}
                                        <div className={item.checked ? "line-through text-gray-400 text-sm" : "text-sm text-gray-800"}>
                                            <p className="font-medium">{item.text}</p>
                                            <p className="text-xs text-gray-500">{currency.symbol}{item.cost} × {item.qty}件 → 折合約 NT$ {getTwdEquivalent(item.cost * item.qty, currency.code, exchangeRate)}</p>
                                            {item.notes && <p className="text-xs text-blue-600 mt-1 italic">📄 {item.notes}</p>}
                                        </div>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => handleEdit(item)} className="text-gray-300 hover:text-blue-500 transition-colors p-1"><i className="fa-solid fa-pen"></i></button>
                                        <button onClick={() => deleteItem(item.id)} className="text-gray-300 hover:text-red-500 transition-colors p-1"><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            ))}
                            {shoppingList.length === 0 && <p className="text-center text-gray-500 py-10 text-xs">購物車內尚無品項。</p>}
                        </div>
                    </div>
                );
            };

            // --- 介面渲染: 多人分帳記帳 ---
            const RenderSplitBill = () => {
                const [editingExpenseId, setEditingExpenseId] = useState(null);
                const [newMember, setNewMember] = useState('');
                const [title, setTitle] = useState('');
                const [amount, setAmount] = useState('');
                const [paidBy, setPaidBy] = useState(splitMembers[0] || '');
                const [selectedCurrency, setSelectedCurrency] = useState('TWD');
                const [customRate, setCustomRate] = useState('');
                const [isCustomRate, setIsCustomRate] = useState(false);
                const [shares, setShares] = useState({});

                useEffect(() => {
                    if (splitMembers.length > 0 && !paidBy) setPaidBy(splitMembers[0]);
                    const initShares = {};
                    splitMembers.forEach(m => { initShares[m] = true; });
                    setShares(initShares);
                }, [splitMembers]);

                useEffect(() => {
                    if (selectedCurrency === 'TWD') { setCustomRate('1'); }
                    else if (selectedCurrency === currency.code) { setCustomRate(exchangeRate.toString()); }
                    else {
                        const target = CURRENCIES.find(c => c.code === selectedCurrency);
                        setCustomRate(target ? target.defaultRate.toString() : '1');
                    }
                }, [selectedCurrency, currency, exchangeRate]);

                const handleAddMember = () => {
                    if (!newMember.trim() || splitMembers.includes(newMember.trim())) return;
                    setSplitMembers([...splitMembers, newMember.trim()]); setNewMember('');
                    showToast("成功加入分帳成員！");
                };

                const handleAddExpense = () => {
                    if (!title || !amount || isNaN(amount)) return;
                    const finalRate = Number(customRate) || 1;
                    const twdAmount = selectedCurrency === 'TWD' ? Math.ceil(Number(amount)) : Math.ceil(Number(amount) / finalRate);
                    const involvedMembers = Object.keys(shares).filter(m => shares[m]);
                    if (involvedMembers.length === 0) { alert("請至少選擇一位幫忙分攤的成員！"); return; }

                    if (editingExpenseId) {
                        setSplitExpenses(splitExpenses.map(exp => exp.id === editingExpenseId ? {
                            ...exp, title, amount: Number(amount), currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                        } : exp));
                        setEditingExpenseId(null);
                        showToast("記帳項目修改成功！");
                    } else {
                        setSplitExpenses([...splitExpenses, {
                            id: Date.now(), title, amount: Number(amount), currencyCode: selectedCurrency, rate: finalRate, twdAmount, paidBy, mInvolved: involvedMembers
                        }]);
                        showToast("成功記錄一筆手動花費！");
                    }

                    setTitle(''); setAmount(''); 
                    const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                    setIsCustomRate(false);
                };

                const handleEditExpense = (exp) => {
                    setEditingExpenseId(exp.id);
                    setTitle(exp.title);
                    setAmount(exp.amount.toString());
                    setPaidBy(exp.paidBy);
                    setSelectedCurrency(exp.currencyCode);
                    setCustomRate(exp.rate.toString());
                    setIsCustomRate(true);
                    
                    const editShares = {};
                    splitMembers.forEach(m => {
                        editShares[m] = exp.mInvolved.includes(m);
                    });
                    setShares(editShares);
                };

                const handleCancelEdit = () => {
                    setEditingExpenseId(null);
                    setTitle(''); setAmount('');
                    const resetShares = {}; splitMembers.forEach(m => { resetShares[m] = true; }); setShares(resetShares);
                    setIsCustomRate(false);
                };

                const splitResults = useMemo(() => {
                    const balances = {};
                    let totalTwd = 0;
                    splitMembers.forEach(m => { balances[m] = 0; });
                    
                    splitExpenses.forEach(exp => {
                        totalTwd += exp.twdAmount;
                        balances[exp.paidBy] += exp.twdAmount;
                        const perShare = exp.twdAmount / exp.mInvolved.length;
                        exp.mInvolved.forEach(m => { balances[m] -= perShare; });
                    });

                    const averagePerPerson = splitMembers.length > 0 ? Math.ceil(totalTwd / splitMembers.length) : 0;

                    const creditors = []; const debtors = [];
                    Object.keys(balances).forEach(m => {
                        if (balances[m] > 0.1) creditors.push({ name: m, amt: balances[m] });
                        else if (balances[m] < -0.1) debtors.push({ name: m, amt: Math.abs(balances[m]) });
                    });

                    const payments = []; let cIdx = 0; let dIdx = 0;
                    while (cIdx < creditors.length && dIdx < debtors.length) {
                        const c = creditors[cIdx]; const d = debtors[dIdx];
                        const transfer = Math.min(c.amt, d.amt);
                        payments.push({ from: d.name, to: c.name, amount: Math.ceil(transfer) });
                        c.amt -= transfer; d.amt -= transfer;
                        if (c.amt <= 0.1) cIdx++; if (d.amt <= 0.1) dIdx++;
                    }

                    return { totalTwd, averagePerPerson, payments };
                }, [splitExpenses, splitMembers]);

                return (
                    <div className="p-4 pb-24 space-y-4">
                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5"><i className="fa-solid fa-users text-blue-500"></i> 分帳成員管理</h3>
                            <div className="flex flex-wrap gap-2 mb-3">
                                {splitMembers.map(m => (
                                    <span key={m} className="text-xs bg-slate-100 font-medium px-2.5 py-1 rounded-lg text-gray-700 flex items-center gap-1">
                                        {m} {splitMembers.length > 1 && <i className="fa-solid fa-circle-xmark text-gray-400 cursor-pointer hover:text-red-500" onClick={() => setSplitMembers(splitMembers.filter(x => x !== m))}></i>}
                                    </span>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input type="text" placeholder="新成員名字..." className="flex-1 p-2 border rounded-lg text-sm" value={newMember} onChange={e => setNewMember(e.target.value)} />
                                <button onClick={handleAddMember} className="px-4 py-2 rounded-lg text-white font-bold text-xs" style={{ backgroundColor: COLORS.mediumBlue }}>+ 新增</button>
                            </div>
                        </div>

                        <div className="rounded-xl border shadow-md overflow-hidden grid grid-cols-2 text-center" style={{ backgroundColor: '#23354D' }}>
                            <div className="p-4 border-r border-white/20">
                                <span className="text-xs block text-white font-bold mb-1">目前總花費計</span>
                                <span className="text-2xl font-black text-white">NT$ {splitResults.totalTwd.toLocaleString()}</span>
                            </div>
                            <div className="p-4" style={{ backgroundColor: '#8BA3C5' }}>
                                <span className="text-xs block text-white font-bold mb-1">每人平均應付</span>
                                <span className="text-2xl font-black text-white">NT$ {splitResults.averagePerPerson.toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-1.5">
                                <i className="fa-solid fa-file-invoice-dollar text-indigo-500"></i> 
                                {editingExpenseId ? '編輯手動記帳項目' : '手動分帳記帳'}
                            </h3>
                            <div className="grid grid-cols-3 gap-2 mb-2">
                                <input type="text" placeholder="消費項目內容..." className="col-span-2 p-2 border rounded-lg text-sm" value={title} onChange={e => setTitle(e.target.value)} />
                                <select className="p-2 border rounded-lg bg-white text-sm" value={selectedCurrency} onChange={e => setSelectedCurrency(e.target.value)}>
                                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <input type="number" placeholder="消費金額..." className="p-2 border rounded-lg text-sm" value={amount} onChange={e => setAmount(e.target.value)} />
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-500 font-bold whitespace-nowrap">付款人:</span>
                                    <select className="w-full p-2 border rounded-lg bg-white text-sm" value={paidBy} onChange={e => setPaidBy(e.target.value)}>
                                        {splitMembers.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="mb-3 p-2 bg-slate-50 rounded-lg border border-dashed">
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-bold text-gray-600">更動自訂換算匯率 (1 TWD 等於多少外幣)</span>
                                    <input type="checkbox" checked={isCustomRate} onChange={e => setIsCustomRate(e.target.checked)} className="w-3.5 h-3.5 rounded" />
                                </div>
                                <input type="number" step="0.0001" className="w-full p-1.5 border rounded bg-white text-xs" value={customRate} onChange={e => setCustomRate(e.target.value)} disabled={!isCustomRate} />
                            </div>

                            <div className="mb-4">
                                <span className="text-xs font-bold block mb-1.5 text-gray-600">誰要分攤 (可複選):</span>
                                <div className="flex flex-wrap gap-3 p-2 rounded-lg bg-gray-50 border">
                                    {splitMembers.map(m => (
                                        <label key={m} className="flex items-center gap-1.5 text-xs font-medium cursor-pointer text-gray-700">
                                            <input type="checkbox" checked={!!shares[m]} onChange={e => setShares({...shares, [m]: e.target.checked})} className="w-4 h-4 text-blue-600 rounded focus:ring-0 border-gray-300" />
                                            {m}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={handleAddExpense} className="flex-1 py-2 rounded-lg text-white font-bold text-sm shadow-sm transition-all" style={{ backgroundColor: COLORS.mediumBlue }}>
                                    {editingExpenseId ? '儲存修改' : '送出記帳'}
                                </button>
                                {editingExpenseId && (
                                    <button onClick={handleCancelEdit} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold text-sm shadow-sm">
                                        取消
                                    </button>
                                )}
                            </div>
                        </div>

                        {splitResults.payments.length > 0 && (
                            <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-xl shadow-sm">
                                <h3 className="font-bold text-emerald-800 text-sm mb-2 flex items-center gap-1.5"><i className="fa-solid fa-comments-dollar"></i> 清算最佳化建議路徑</h3>
                                <div className="space-y-1">
                                    {splitResults.payments.map((p, idx) => (
                                        <div key={idx} className="text-xs text-emerald-900 font-medium bg-white/60 p-2 rounded-md flex justify-between">
                                            <span>👉 <strong>{p.from}</strong> 應支付給 <strong>{p.to}</strong></span>
                                            <span className="font-bold text-orange-600">NT$ {p.amount.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-xl border shadow-sm divide-y">
                            <div className="p-3 bg-gray-50 rounded-t-xl"><span className="text-xs font-bold text-gray-600">已完成的手動記帳項目設定</span></div>
                            {splitExpenses.map(exp => (
                                <div key={exp.id} className="p-3.5 flex justify-between items-center gap-2">
                                    <div className="text-xs text-gray-600 flex-1">
                                        <p className="font-bold text-sm text-gray-800 mb-0.5">{exp.title}</p>
                                        <p>付款人: <strong className="text-slate-700">{exp.paidBy}</strong> ｜ 原幣別金額: {exp.amount} ({exp.currencyCode})</p>
                                        <p className="text-[11px] text-gray-400">分攤對象: {exp.mInvolved.join(', ')}</p>
                                    </div>
                                    <div className="text-right flex items-center gap-3">
                                        <div>
                                            <span className="text-xs font-black block text-gray-500">折合台幣</span>
                                            <span className="text-sm font-black text-slate-800">NT$ {exp.twdAmount}</span>

            // --- 介面渲染: 行前檢查清單 ---
            const RenderPrepList = () => {
                const [newTodo, setNewTodo] = useState('');
                const handleAddTodo = () => { if (!newTodo.trim()) return; setPrepList([...prepList, { id: Date.now(), text: newTodo.trim(), checked: false }]); setNewTodo(''); showToast("成功加入檢查清單！"); };
                const toggleTodo = (id) => setPrepList(prepList.map(t => t.id === id ? { ...t, checked: !t.checked } : t));

                return (
                    <div className="p-4 pb-24">

                        <div className="flex gap-2 mb-4">

            // --- 介面渲染: 航班資訊 (純手動版) ---

                        departure: manualForm.departure.toUpperCase() || '',
                        arrival: manualForm.arrival.toUpperCase() || '',
                        depAirport: '', arrAirport: '',
                        depTerminal: manualForm.depTerminal || '',
                        arrTerminal: manualForm.arrTerminal || '',
                        depGate: '', arrGate: '',
                        depTime: manualForm.depTime || '',
                        arrTime: manualForm.arrTime || '',
                        depActual: '', arrActual: '',
                        duration: manualForm.duration || '',
                        status: '準時',
                        aircraft: '',
                        baggage: manualForm.baggage || '',

                                <div className="flex flex-col items-center gap-1 flex-shrink-0">
                                    <div className="w-20 flex items-center gap-1"><div className="flex-1 h-px bg-white/30"></div><i className="fa-solid fa-plane text-white/70 text-sm"></i><div className="flex-1 h-px bg-white/30"></div></div>

                                <div className="flex-1 text-right">

                                    {flight.arrTerminal && <div className="mt-2"><span className="text-[10px] bg-white/15 px-2 py-0.5 rounded-full text-white/80">{/^[Tt]\d/.test(flight.arrTerminal) ? flight.arrTerminal.toUpperCase() : `T${flight.arrTerminal}`}</span></div>}

                            <div className="flex justify-end gap-2">
                                <button onClick={() => deleteFlight(type)} className="py-2 px-4 rounded-xl bg-red-500/20 hover:bg-red-500/40 text-red-400 text-xs font-bold transition-all border border-red-500/20"><i className="fa-solid fa-trash"></i> 刪除此航班</button>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="p-4 pb-24 no-scrollbar">
                        <div className="bg-gradient-to-br from-sky-500 to-indigo-600 rounded-3xl p-5 text-white shadow-xl relative overflow-hidden mt-2 mb-5">
                            <div className="absolute -right-8 -bottom-8 opacity-10 text-[130px]"><i className="fa-solid fa-plane"></i></div>
                            <h2 className="text-xl font-black mb-1 flex items-center gap-2"><i className="fa-solid fa-ticket-simple text-[20px]"></i> 航班訊息</h2>
                            <p className="text-sm opacity-80">手動輸入航班資訊</p>
                        </div>

                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-5">
                            <div className="flex gap-2 mb-3">
                                <button onClick={() => setSearchType('outbound')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${searchType === 'outbound' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={{ backgroundColor: searchType === 'outbound' ? COLORS.mediumBlue : '' }}>去程</button>
                                <button onClick={() => setSearchType('return')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${searchType === 'return' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={{ backgroundColor: searchType === 'return' ? COLORS.mediumBlue : '' }}>回程</button>
                            </div>

                            <div className="space-y-2">
                                <input type="text" placeholder="航班編號 (必填，例: BR123)" className="w-full p-2.5 border border-gray-200 rounded-xl text-sm font-mono uppercase bg-gray-50" value={manualForm.code} onChange={e => setManualForm({...manualForm, code: e.target.value.toUpperCase()})} />
                                <input type="text" placeholder="航空公司 (例: 長榮航空)" className="w-full p-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50" value={manualForm.airline} onChange={e => setManualForm({...manualForm, airline: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="出發地 (如 TPE)" className="p-2.5 border border-gray-200 rounded-xl text-sm font-mono uppercase bg-gray-50" value={manualForm.departure} onChange={e => setManualForm({...manualForm, departure: e.target.value.toUpperCase()})} />
                                    <input type="text" placeholder="目的地 (如 NRT)" className="p-2.5 border border-gray-200 rounded-xl text-sm font-mono uppercase bg-gray-50" value={manualForm.arrival} onChange={e => setManualForm({...manualForm, arrival: e.target.value.toUpperCase()})} />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="起飛 (例: 6/25 17:00)" className="p-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50" value={manualForm.depTime} onChange={e => setManualForm({...manualForm, depTime: e.target.value})} />
                                    <input type="text" placeholder="降落 (例: 6/25 21:00)" className="p-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50" value={manualForm.arrTime} onChange={e => setManualForm({...manualForm, arrTime: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="出發航廈 (例: T2)" className="p-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50" value={manualForm.depTerminal} onChange={e => setManualForm({...manualForm, depTerminal: e.target.value})} />
                                    <input type="text" placeholder="抵達航廈 (例: T1)" className="p-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50" value={manualForm.arrTerminal} onChange={e => setManualForm({...manualForm, arrTerminal: e.target.value})} />
                                </div>
                                <button onClick={saveManualFlight} className="w-full py-3 rounded-xl text-white font-bold text-sm shadow-md mt-2" style={{ backgroundColor: COLORS.mediumBlue }}>儲存航班資訊</button>
