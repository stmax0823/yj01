        const CreatableSelect = ({ options, value, onChange, placeholder, className = "" }) => {
            const [isCustom, setIsCustom] = useState(false);
            const [customValue, setCustomValue] = useState("");

            useEffect(() => {
                if (value && !options.includes(value) && value !== "__CUSTOM__") {
                    setIsCustom(true);
                    setCustomValue(value);
                } else if (!value) {
                    setIsCustom(false);
                    setCustomValue("");
                }
            }, [value, options]);

            const handleSelectChange = (e) => {
                const val = e.target.value;
                if (val === "__CUSTOM__") {
                    setIsCustom(true);
                    onChange("");
                } else {
                    setIsCustom(false);
                    onChange(val);
                }
            };

            const handleInputChange = (e) => {
                const val = e.target.value;
                setCustomValue(val);
                onChange(val);
            };

            return (
                <div className={`flex flex-col gap-2 ${className}`}>
                    {!isCustom ? (
                        <select className="w-full p-2 border rounded-lg text-sm bg-white" value={value || ""} onChange={handleSelectChange}>
                            <option value="" disabled>{placeholder}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                            <option value="__CUSTOM__">+ 手動輸入新選項...</option>
                        </select>
                    ) : (
                        <div className="flex gap-2">
                            <input type="text" className="flex-1 p-2 border rounded-lg text-sm" placeholder="請輸入新選項..." value={customValue} onChange={handleInputChange} autoFocus />
                            <button type="button" className="px-3 py-1 bg-gray-200 rounded-lg text-xs font-bold" onClick={() => { setIsCustom(false); onChange(""); }}>選擇預設</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [destinations, setDestinations] = useState(() => {
                const saved = localStorage.getItem('app_destinations_v6');
                return saved ? JSON.parse(saved) : INITIAL_DESTINATIONS;
            });
            const [currentTrip, setCurrentTrip] = useState(() => {
                const saved = localStorage.getItem('app_current_trip_v6');
                return saved ? JSON.parse(saved) : { country: '韓國', city: '首爾' };
            });
            const [exchangeRate, setExchangeRate] = useState(42);
            const [weatherData, setWeatherData] = useState(null);
            const [weatherLoading, setWeatherLoading] = useState(false);

            const [itinerary, setItinerary] = useState(() => {
                const saved = localStorage.getItem('app_itinerary_v6');
                return saved ? JSON.parse(saved) : [
                    { id: 1, day: 'Day 1', time: '10:00', spot: '機場大廳', memo: '集合出發搭機', area: '' }
                ];
            });

            const [shopItems, setShopItems] = useState(() => {
                const saved = localStorage.getItem('app_shop_items_v6');
                return saved ? JSON.parse(saved) : [];
            });

            const [bills, setBills] = useState(() => {
                const saved = localStorage.getItem('app_bills_v6');
                return saved ? JSON.parse(saved) : [];
            });

            const [members, setMembers] = useState(() => {
                const saved = localStorage.getItem('app_members_v6');
                return saved ? JSON.parse(saved) : ['阿明', '小華'];
            });

            const [prepList, setPrepList] = useState(() => {
                const saved = localStorage.getItem('app_prep_list_v6');
                return saved ? JSON.parse(saved) : DEFAULT_PREP_LIST;
            });

            useEffect(() => { localStorage.setItem('app_destinations_v6', JSON.stringify(destinations)); }, [destinations]);
            useEffect(() => { localStorage.setItem('app_current_trip_v6', JSON.stringify(currentTrip)); }, [currentTrip]);
            useEffect(() => { localStorage.setItem('app_itinerary_v6', JSON.stringify(itinerary)); }, [itinerary]);
            useEffect(() => { localStorage.setItem('app_shop_items_v6', JSON.stringify(shopItems)); }, [shopItems]);
            useEffect(() => { localStorage.setItem('app_bills_v6', JSON.stringify(bills)); }, [bills]);
            useEffect(() => { localStorage.setItem('app_members_v6', JSON.stringify(members)); }, [members]);
            useEffect(() => { localStorage.setItem('app_prep_list_v6', JSON.stringify(prepList)); }, [prepList]);

            const currentCityData = destinations.find(d => d.country === currentTrip.country)?.cities.find(c => c.name === currentTrip.city) || { currency: 'KRW', areas: [], spots: [] };
            const currentCurrencyCode = currentCityData.currency;
            const currentCurrencySymbol = CURRENCIES.find(c => c.code === currentCurrencyCode)?.symbol || '$';

            useEffect(() => {
                const defaultRate = CURRENCIES.find(c => c.code === currentCurrencyCode)?.rateToTwd || 1;
                setExchangeRate(defaultRate);
                setWeatherData(null);

                if (currentCurrencyCode !== 'TWD') {
                    fetch("https://open.er-api.com/v6/latest/TWD")
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.rates && data.rates[currentCurrencyCode]) {
                                const rawRate = data.rates[currentCurrencyCode];
                                setExchangeRate(parseFloat(rawRate.toFixed(2)));
                            }
                        })
                        .catch(err => console.log("匯率 API 載入失敗，使用預設值", err));
                } else {
                    setExchangeRate(1);
                }
            }, [currentTrip]);

            const fetchWeather = async () => {
                setWeatherLoading(true);
                try {
                    const res = await fetch(`https://wttr.in/${encodeURIComponent(currentTrip.city)}?format=j1`);
                    const data = await res.json();
                    if (data && data.current_condition && data.current_condition[0]) {
                        const cond = data.current_condition[0];
                        setWeatherData({
                            temp: cond.temp_C,
                            desc: cond.weatherDesc && cond.weatherDesc[0] ? cond.weatherDesc[0].value : '無資料',
                            humidity: cond.humidity,
                            precip: cond.precipMM
                        });
                    }
                } catch (e) {
                    setWeatherData({ temp: '15', desc: '晴朗 / 舒適', humidity: '55', precip: '0.0' });
                } finally {
                    setWeatherLoading(false);
                }
            };

            const getTwdEquivalent = (amount) => {
                if (currentCurrencyCode === 'TWD') return Math.ceil(amount);
                return Math.ceil(amount / exchangeRate);
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 400;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) {
                                height = Math.round((height * MAX_WIDTH) / width);
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

                    setIsSettingOpen(false);
                };

                const totalBudgetTwd = shopItems.reduce((acc, item) => acc + (item.checked ? 0 : getTwdEquivalent(item.price * item.qty)), 0);

                return (

                                    <i className="fa-solid fa-location-dot text-slate-500 text-lg"></i>
                                    {currentTrip.country} · {currentTrip.city}
                                </div>
                            </div>
                            <button onClick={() => { setSelCountry(currentTrip.country); setSelCity(currentTrip.city); setIsSettingOpen(true); }} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
                                <i className="fa-solid fa-sliders text-base"></i>
                            </button>
                        </div>

                        {isSettingOpen && (
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-xl">
                                    <h3 className="font-black text-lg text-slate-800 mb-4 flex items-center gap-2">
                                        <i className="fa-solid fa-plane-departure text-slate-500"></i>設定目前目的地
                                    </h3>
                                    <div className="flex flex-col gap-4 mb-6">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 block mb-1">國家 / 地區</label>
                                            <select className="w-full p-2.5 border rounded-xl text-sm font-medium bg-slate-50" value={selCountry} onChange={e => { const c = e.target.value; setSelCountry(c); const firstCity = destinations.find(d => d.country === c)?.cities[0]?.name || ''; setSelCity(firstCity); }}>
                                                {destinations.map(d => <option key={d.country} value={d.country}>{d.country}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 block mb-1">城市</label>
                                            <select className="w-full p-2.5 border rounded-xl text-sm font-medium bg-slate-50" value={selCity} onChange={e => setSelCity(e.target.value)}>
                                                {availableCities.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setIsSettingOpen(false)} className="flex-1 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold">取消</button>
                                        <button onClick={handleSaveSetting} className="flex-1 py-2.5 bg-slate-700 text-white rounded-xl text-sm font-bold">確認切換</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                                <div>
                                    <div className="text-[11px] font-bold text-slate-400 tracking-wider">即時參考匯率</div>
                                    <div className="text-2xl font-black text-indigo-600 mt-1">1 <span className="text-sm font-normal text-slate-500">TWD</span></div>
                                    <div className="text-md font-bold text-slate-700 mt-0.5">≈ {exchangeRate} <span className="text-xs font-normal text-slate-400">{currentCurrencyCode}</span></div>
                                </div>
                                <div className="text-[10px] text-slate-400 mt-3 border-t pt-2 border-slate-50 flex items-center gap-1">
                                    <i className="fa-solid fa-arrows-rotate"></i> 連網自動同步
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                                <div className="w-full">

                     className="bg-white p-3 rounded-xl border shadow-xs flex justify-between items-center">

            // 工具箱大組件：整合代購、分帳、行李三個子功能
            const RenderTools = () => {
                const [activeSubTab, setActiveSubTab] = useState('shop');

                // 代購功能內部狀態
                const [shopName, setShopName] = useState('');
                const [itemName, setItemName] = useState('');
                const [itemPrice, setItemPrice] = useState('');
                const [itemQty, setItemQty] = useState('1');
                const [itemMemo, setItemMemo] = useState('');
                const [itemPic, setItemPic] = useState(null);
                const fileInputRef = useRef(null);

                const handleAddShopItem = async (e) => {
                    e.preventDefault();
                    if (!itemName.trim() || !itemPrice) return;
                    const newItem = {
                        id: Date.now(),
                        shop: shopName || '未分類商店',
                        item: itemName.trim(),
                        price: parseFloat(itemPrice),
                        qty: parseInt(itemQty) || 1,
                        checked: false,
                        memo: itemMemo.trim(),
                        pic: itemPic
                    };
                    setShopItems([newItem, ...shopItems]);
                    setItemName('');
                    setItemPrice('');
                    setItemQty('1');
                    setItemMemo('');
                    setItemPic(null);
                    if (fileInputRef.current) fileInputRef.current.value = "";
                };

                const handleFileChange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const compressedB64 = await compressImage(file);
                        setItemPic(compressedB64);
                    }
                };

                const handleLongPressDeleteShopItem = (id) => {
                    if (window.confirm("確定要刪除這筆代購物品嗎？")) {
                        setShopItems(shopItems.filter(item => item.id !== id));
                    }
                };

                // 分帳功能內部狀態
                const [billTitle, setBillTitle] = useState('');
                const [billTotal, setBillTotal] = useState('');
                const [billPayer, setBillPayer] = useState(members[0] || '');
                const [billShares, setBillShares] = useState([...members]);
                const [newMemberName, setNewMemberName] = useState('');

                const handleAddBill = (e) => {
                    e.preventDefault();
                    if (!billTitle.trim() || !billTotal || billShares.length === 0) return;
                    setBills([{
                        id: Date.now(),
                        title: billTitle.trim(),
                        total: parseFloat(billTotal),
                        payer: billPayer,
                        participants: [...billShares],
                        date: new Date().toISOString().split('T')[0]
                    }, ...bills]);
                    setBillTitle('');
                    setBillTotal('');
                };

                const handleAddMember = (e) => {
                    e.preventDefault();
                    if (!newMemberName.trim()) return;
                    if (members.includes(newMemberName.trim())) return alert("此名字已存在");
                    const updated = [...members, newMemberName.trim()];
                    setMembers(updated);
                    setBillShares(updated);
                    if (!billPayer) setBillPayer(newMemberName.trim());
                    setNewMemberName('');
                };

                const toggleShareParticipant = (m) => {
                    if (billShares.includes(m)) {
                        setBillShares(billShares.filter(p => p !== m));
                    } else {
                        setBillShares([...billShares, m]);
                    }
                };

                const handleLongPressDeleteBill = (id) => {
                    if (window.confirm("確定要刪除這筆開銷紀錄嗎？")) {
                        setBills(bills.filter(b => b.id !== id));
                    }
                };

                const calculateSettlements = () => {
                    const balances = {};
                    members.forEach(m => balances[m] = 0);
                    bills.forEach(b => {
                        const cost = b.total / b.participants.length;
                        balances[b.payer] += b.total;
                        b.participants.forEach(p => balances[p] -= cost);
                    });

                    const debtors = [], creditors = [];
                    Object.keys(balances).forEach(m => {
                        if (balances[m] < -0.01) debtors.push({ name: m, bal: balances[m] });
                        else if (balances[m] > 0.01) creditors.push({ name: m, bal: balances[m] });
                    });
                    debtors.sort((a,b) => a.bal - b.bal);
                    creditors.sort((a,b) => b.bal - a.bal);

                    const settlements = [];
                    let d = 0, c = 0;
                    while (d < debtors.length && c < creditors.length) {
                        const debtor = debtors[d], creditor = creditors[c];
                        const amt = Math.min(Math.abs(debtor.bal), creditor.bal);
                        settlements.push({ from: debtor.name, to: creditor.name, amt });
                        debtor.bal += amt; debtor.bal = parseFloat(debtor.bal.toFixed(4));
                        creditor.bal -= amt; creditor.bal = parseFloat(creditor.bal.toFixed(4));
                        if (Math.abs(debtor.bal) < 0.01) d++;
                        if (creditor.bal < 0.01) c++;
                    }
                    return settlements;
                };

                // 行李清單內部狀態
                const [newPrepText, setNewPrepText] = useState("");
                const [newPrepCate, setNewPrepCate] = useState("個人用品");

                const handleAddPrep = (e) => {
                    e.preventDefault();
                    if (!newPrepText.trim()) return;
                    setPrepList([...prepList, { id: Date.now(), text: newPrepText.trim(), checked: false, category: newPrepCate }]);
                    setNewPrepText("");
                };

                const prepGrouped = prepList.reduce((acc, curr) => {
                    if (!acc[curr.category]) acc[curr.category] = [];
                    acc[curr.category].push(curr);
                    return acc;
                }, {});

                return (
                    <div className="flex flex-col gap-4">
                        {/* 頂部子導覽列 */}
                        <div className="flex bg-white border-b sticky top-0 z-20 shadow-xs">
                            <button onClick={() => setActiveSubTab('shop')} className={`flex-1 py-3 text-xs font-black text-center border-b-2 ${activeSubTab === 'shop' ? 'border-slate-700 text-slate-800 bg-slate-50' : 'border-transparent text-slate-400'}`}>
                                <i className="fa-solid fa-basket-shopping mr-1"></i>代購購物車
                            </button>
                            <button onClick={() => setActiveSubTab('bill')} className={`flex-1 py-3 text-xs font-black text-center border-b-2 ${activeSubTab === 'bill' ? 'border-slate-700 text-slate-800 bg-slate-50' : 'border-transparent text-slate-400'}`}>
                                <i className="fa-solid fa-comments-dollar mr-1"></i>團隊分帳
                            </button>
                            <button onClick={() => setActiveSubTab('prep')} className={`flex-1 py-3 text-xs font-black text-center border-b-2 ${activeSubTab === 'prep' ? 'border-slate-700 text-slate-800 bg-slate-50' : 'border-transparent text-slate-400'}`}>
                                <i className="fa-solid fa-list-check mr-1"></i>行李檢查表
                            </button>
                        </div>

                        {/* 子功能內容渲染區 */}
                        <div className="p-4 pt-0 flex flex-col gap-4">
                            {activeSubTab === 'shop' && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-3 flex items-center gap-1.5"><i className="fa-solid fa-cart-plus text-indigo-500"></i>新增購物清單項目</h3>
                                        <form onSubmit={handleAddShopItem} className="flex flex-col gap-2.5">
                                            <div className="grid grid-cols-2 gap-2">
                                                <CreatableSelect options={RECOMMENDED_SHOPS[currentCurrencyCode] || []} value={shopName} onChange={setShopName} placeholder="商店品牌/通路" />
                                                <input type="text" placeholder="商品品名" className="p-2 border rounded-xl text-sm" value={itemName} onChange={e => setItemName(e.target.value)} required />
                                            </div>
                                            <div className="grid grid-cols-3 gap-2">
                                                <div className="col-span-2 relative">
                                                    <span className="absolute left-2.5 top-2.5 text-xs text-slate-400 font-bold">{currentCurrencySymbol}</span>
                                                    {/* 已完全修正：onChange 呼叫正確的狀態設定函數 setItemPrice */}
                                                    <input type="number" step="any" placeholder="當地價格" className="p-2 pl-6 border rounded-xl text-sm w-full font-mono" value={itemPrice} onChange={e => setItemPrice(e.target.value)} required />
                                                </div>
                                                <input type="number" placeholder="數量" className="p-2 border rounded-xl text-sm w-full text-center font-mono" value={itemQty} onChange={e => setItemQty(e.target.value)} required />
                                            </div>
                                            <input type="text" placeholder="詳細規格 / 備註說明" className="p-2 border rounded-xl text-sm w-full" value={itemMemo} onChange={e => setItemMemo(e.target.value)} />
                                            <label className="border-2 border-dashed rounded-xl p-2 text-center text-xs text-slate-500 font-bold bg-slate-50 cursor-pointer hover:bg-slate-100 flex items-center justify-center gap-1">
                                                <i className="fa-solid fa-camera"></i> {itemPic ? '📸 已夾帶照片' : '附加外包裝/商品照片'}
                                                <input type="file" accept="image/*" ref={fileInputRef} className="hidden" onChange={handleFileChange} />
                                            </label>
                                            <button type="submit" className="w-full py-2 bg-indigo-600 text-white font-bold rounded-xl text-xs shadow-sm">新增至列表</button>
                                        </form>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        {shopItems.map(item => (
                                            <ShopListItem key={item.id} item={item} shopItems={shopItems} setShopItems={setShopItems} getTwdEquivalent={getTwdEquivalent} handleLongPressDeleteShopItem={handleLongPressDeleteShopItem} currentCurrencySymbol={currentCurrencySymbol} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeSubTab === 'bill' && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-2">👥 旅伴成員編輯</h3>
                                        <form onSubmit={handleAddMember} className="flex gap-2">
                                            <input type="text" placeholder="旅伴名字" className="flex-1 p-2 border rounded-xl text-sm" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} required />
                                            <button type="submit" className="px-4 py-2 bg-slate-700 text-white font-bold rounded-xl text-xs">+</button>
                                        </form>
                                        <div className="flex gap-1 flex-wrap mt-2">
                                            {members.map(m => <span key={m} className="px-2 py-0.5 bg-slate-100 rounded text-xs font-bold text-slate-600">👤 {m}</span>)}
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-3">💰 紀錄一筆共同開銷</h3>
                                        <form onSubmit={handleAddBill} className="flex flex-col gap-2.5">
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="text" placeholder="花費項目目的" className="p-2 border rounded-xl text-sm" value={billTitle} onChange={e => setBillTitle(e.target.value)} required />
                                                <input type="number" placeholder="開銷總金額" className="p-2 border rounded-xl text-sm w-full font-mono" value={billTotal} onChange={e => setBillTotal(e.target.value)} required />
                                            </div>
                                            <div className="text-xs font-bold text-slate-400">付款代墊人：</div>
                                            <select className="p-2 border rounded-xl text-sm bg-white" value={billPayer} onChange={e => setBillPayer(e.target.value)}>
                                                {members.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                            <div className="text-xs font-bold text-slate-400">參與平分人員：</div>
                                            <div className="flex gap-1 flex-wrap p-2 bg-slate-50 rounded-xl border">
                                                {members.map(m => (
                                                    <button key={m} type="button" onClick={() => toggleShareParticipant(m)} className={`px-2.5 py-1 rounded-lg text-xs font-bold border ${billShares.includes(m) ? 'bg-indigo-500 text-white' : 'bg-white text-slate-500'}`}>{m}</button>
                                                ))}
                                            </div>
                                            <button type="submit" className="w-full py-2 bg-slate-700 text-white font-bold rounded-xl text-xs">新增至流水帳</button>
                                        </form>
                                    </div>

                                    {calculateSettlements().length > 0 && (
                                        <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-2xl shadow-sm">
                                            <h3 className="font-black text-sm text-emerald-800 mb-2"><i className="fa-solid fa-calculator"></i> 清算最佳還款沖銷方案</h3>
                                            <div className="flex flex-col gap-1.5">
                                                {calculateSettlements().map((t, i) => (
                                                    <div key={i} className="flex justify-between items-center text-xs bg-white p-2.5 rounded-xl border">
                                                        <span>👤 <strong>{t.from}</strong> 應付給 👤 <strong>{t.to}</strong></span>
                                                        <span className="font-black text-indigo-600 font-mono text-sm">{currentCurrencySymbol} {Math.ceil(t.amt).toLocaleString()}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex flex-col gap-2">
                                        {bills.map(b => (
                                            <BillHistoryItem key={b.id} b={b} handleLongPressDeleteBill={handleLongPressDeleteBill} currentCurrencySymbol={currentCurrencySymbol} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeSubTab === 'prep' && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-sm text-slate-800 mb-3">➕ 增加客製化檢查備品</h3>
                                        <form onSubmit={handleAddPrep} className="flex gap-2">
                                            <input type="text" placeholder="例如：萬用轉接頭" className="flex-1 p-2 border rounded-xl text-sm" value={newPrepText} onChange={e => setNewPrepText(e.target.value)} required />
                                            <select className="p-2 border rounded-xl text-sm bg-slate-50 font-bold text-slate-500" value={newPrepCate} onChange={e => setNewPrepCate(e.target.value)}>
                                                <option value="必備證件">必備證件</option>
                                                <option value="通訊網路">通訊網路</option>
                                                <option value="金流準備">金流準備</option>
                                                <option value="電子產品">電子產品</option>
                                                <option value="個人用品">個人用品</option>
                                            </select>
                                            <button type="submit" className="px-4 py-2 bg-slate-700 text-white font-bold rounded-xl text-xs">+</button>
                                        </form>
                                    </div>

                                    <div className="flex flex-col gap-3">
                                        {Object.keys(prepGrouped).map(category => (
                                            <div key={category} className="flex flex-col gap-1">
                                                <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded self-start">{category}</span>
                                                {prepGrouped[category].map(item => (
                                                    <div key={item.id} className={`bg-white p-2.5 rounded-xl border flex items-center gap-3 ${item.checked ? 'opacity-40 line-through' : ''}`}>
                                                        <button onClick={() => setPrepList(prepList.map(x => x.id === item.id ? {...x, checked: !x.checked} : x))} className={`w-4.5 h-4.5 rounded border flex items-center justify-center text-xs ${item.checked ? 'bg-emerald-500 text-white' : 'border-slate-300'}`}>
                                                            {item.checked && <i className="fa-solid fa-check text-[10px]"></i>}
                                                        </button>
                                                        <span className="text-xs font-bold text-slate-700">{item.text}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const RenderBackup = () => {
                const [importText, setImportText] = useState('');
                const handleExport = () => {
                    const data = { destinations, currentTrip, itinerary, shopItems, bills, members, prepList };
                    navigator.clipboard.writeText(JSON.stringify(data));
                    alert("已成功將完整的旅遊 JSON 備份代碼複製到剪貼簿中！");
                };

                const handleImport = () => {
                    try {
                        const parsed = JSON.parse(importText.trim());
                        if (parsed.destinations) setDestinations(parsed.destinations);
                        if (parsed.currentTrip) setCurrentTrip(parsed.currentTrip);
                        if (parsed.itinerary) setItinerary(parsed.itinerary);
                        if (parsed.shopItems) setShopItems(parsed.shopItems);
                        if (parsed.bills) setBills(parsed.bills);
                        if (parsed.members) setMembers(parsed.members);
                        if (parsed.prepList) setPrepList(parsed.prepList);
                        alert("備份資料已成功載入還原！");
                        setActiveTab('home');
                    } catch (e) { alert("格式錯誤，匯入失敗！"); }
                };

                const handleResetAll = () => {
                    if (window.confirm("🔥 警告：這將會清除瀏覽器中目前所有修改過的行程與資料，並完全重置還原。確定要清除嗎？")) {
                        localStorage.clear();
                        window.location.reload();
                    }
                };

                return (
                    <div className="p-4 flex flex-col gap-4 animate-fade-in">
                        <div className="bg-white p-4 rounded-2xl border text-center shadow-sm">
                            <h3 className="font-black text-sm text-slate-800">📤 導出目前本機旅遊備份</h3>
                            <button onClick={handleExport} className="mt-3 w-full py-2 bg-slate-700 text-white rounded-xl text-xs font-bold">點擊複製 JSON 備份字串</button>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border shadow-sm">
                            <h3 className="font-black text-sm text-slate-800 mb-2">📥 匯入覆蓋還原備份</h3>
                            <textarea className="w-full p-2 border rounded-xl text-xs font-mono h-20 bg-slate-50" placeholder="在此貼上導出的 JSON 代碼..." value={importText} onChange={e => setImportText(e.target.value)} />
                            <button onClick={handleImport} className="mt-2 w-full py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold">確認匯入還原</button>
                        </div>
                        <div className="bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm mt-4">
                            <h3 className="font-black text-sm text-red-800 flex items-center gap-1.5"><i className="fa-solid fa-triangle-exclamation"></i>危險區域 (重置還原)</h3>
                            <button onClick={handleResetAll} className="mt-3 px-4 py-2 bg-red-600 text-white rounded-xl text-xs font-bold w-full shadow-md">強制重置全清空</button>
                        </div>
                    </div>
                );
            };

            const NavBar = () => {
                return (
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-40 flex justify-around items-center py-2 max-w-[480px] margin-0-auto shadow-md">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === 'home' ? 'text-slate-800 scale-105' : 'opacity-40'}`}><i className="fa-solid fa-house text-base"></i>首頁</button>
                        <button onClick={() => setActiveTab('dest')} className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === 'dest' ? 'text-slate-800 scale-105' : 'opacity-40'}`}><i className="fa-solid fa-earth-asia text-base"></i>景點庫</button>
                        <button onClick={() => setActiveTab('itin')} className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === 'itin' ? 'text-slate-800 scale-105' : 'opacity-40'}`}><i className="fa-solid fa-route text-base"></i>行程表</button>
                        <button onClick={() => setActiveTab('tools')} className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === 'tools' ? 'text-slate-800 scale-105' : 'opacity-40'}`}><i className="fa-solid fa-briefcase text-base"></i>工具箱</button>
                        <button onClick={() => setActiveTab('back')} className={`flex flex-col items-center gap-1 text-[10px] font-bold ${activeTab === 'back' ? 'text-slate-800 scale-105' : 'opacity-40'}`}><i className="fa-solid fa-cloud-arrow-down text-base"></i>備份</button>
                    </div>
                );
            };

            return (
                <div className="app-container hide-scrollbar">
                    {activeTab === 'home' && <RenderHome />}
                    {activeTab === 'dest' && <RenderDestinations />}
                    {activeTab === 'itin' && <RenderItinerary />}
                    {activeTab === 'tools' && <RenderTools />}
                    {activeTab === 'back' && <RenderBackup />}

                    {addToItinModal.isOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-5 shadow-xl">
                                <h3 className="font-bold text-sm mb-4">安排加入行程</h3>
                                <select className="w-full p-2 border rounded-lg mb-4 text-sm bg-white" value={modalDayChoice} onChange={e=>setModalDayChoice(e.target.value)}>
                                    {Array.from(new Set(itinerary.map(item => item.day))).sort().map(d=><option key={d}>{d}</option>)}
                                    <option value="__CUSTOM__">+ 新增天數...</option>
                                </select>
                                {modalDayChoice === '__CUSTOM__' && <input type="text" className="w-full p-2 border rounded-lg mb-4 text-sm" placeholder="例如 Day 3" value={modalCustomDay} onChange={e=>setModalCustomDay(e.target.value)} autoFocus />}
                                <input type="time" className="w-full p-2 border rounded-lg mb-6 text-sm" value={modalTime} onChange={e=>setModalTime(e.target.value)} />
                                <div className="flex gap-3">
                                    <button onClick={() => setAddToItinModal({isOpen:false})} className="flex-1 py-2 bg-gray-200 rounded-lg text-sm font-bold">取消</button>
                                    <button onClick={confirmAddToItinerary} className="flex-1 py-2 bg-slate-700 text-white rounded-lg text-sm font-bold">確定加入</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <NavBar />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
